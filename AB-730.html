            /* Highlight */

            /* Testimonial */

            --module-list-bg: #1e293b;

            /* Score */

            /* Intro section */

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) {
                --bg-body: #0f172a;
                --bg-card: #1e293b;
                --bg-card-alt: #1e293b;
                --bg-input: #334155;
                --bg-hover: #334155;
                --text-primary: #f1f5f9;
                --text-body: #e2e8f0;

            }
        }

        /* ==========================================
           RESET & BASE STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-body);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ==========================================
           HEADER - Minimalista e focado
           ========================================== */
        .header {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            border-left: 4px solid var(--accent);
            position: relative;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 2em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 .icon {
            color: var(--accent);
        }

        .header p.subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            font-weight: 400;
        }

        /* Toggle buttons */
        .header-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            top: 16px;
            right: 16px;
        }

        .toggle-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Progress bar - Clean and minimal */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 8px;
            margin-top: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95em;
        }

        /* ==========================================
           TABS - Simples e claros
           ========================================== */
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .tab {
            background: var(--bg-card);
            padding: 20px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
            position: relative;
        }

        .tab:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px var(--accent-shadow);
        }

        .tab-title {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 6px;
            color: inherit;
        }

        .tab-duration {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .tab.active .tab-duration {
            opacity: 0.9;
        }

        .tab-checkmark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .tab.completed .tab-checkmark {
            display: flex;
        }

        /* ==========================================
           CONTENT AREA - Espaçoso e limpo
           ========================================== */
        .content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 48px;
            box-shadow: var(--shadow-md);
        }

        .module {
            display: none;
        }

        .module.active {
            display: block;
        }

        /* ==========================================
           LESSON BLOCKS - Chunking para reduzir carga cognitiva
           ========================================== */
        .lesson {
            margin-bottom: 48px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .lesson h3 {
            color: var(--text-primary);
            font-size: 1.75em;
            margin-bottom: 8px;
            font-weight: 700;
            line-height: 1.3;
        }

        .lesson h4 {
            color: var(--text-body);
            font-size: 1.25em;
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mark-complete {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .mark-complete:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px var(--accent-shadow);
            transform: translateY(-1px);
        }

        .mark-complete:active {
            transform: translateY(0);
        }

        .mark-complete.completed {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(72,187,120,0.2);
        }

        .mark-complete.completed:hover {
            background: var(--success-hover);
            box-shadow: 0 4px 12px rgba(72,187,120,0.4);
        }

        /* ==========================================
           CONTENT BOXES - Redução de carga cognitiva
           Cores baseadas em psicologia cognitiva
           ========================================== */
        .macete {
            background: var(--macete-bg);
            border-left: 4px solid var(--macete-border);
            color: var(--macete-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .macete::before {
            content: "🔑 MACETE";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--macete-border);
        }

        .tip {
            background: var(--tip-bg);
            border-left: 4px solid var(--tip-border);
            color: var(--tip-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .tip::before {
            content: "💡 DICA";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--tip-border);
        }

        .warning {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            color: var(--warning-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .warning::before {
            content: "⚠️ ATENÇÃO";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--warning-border);
        }

        .example {
            background: var(--example-bg);
            border-left: 4px solid var(--example-border);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            color: var(--example-text);
            box-shadow: var(--shadow-sm);
        }

        .example::before {
            content: "📝 EXEMPLO";
            display: block;
            font-weight: 700;
            color: var(--example-border);
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Bilingual ::before labels */
        html[lang="en"] .macete::before { content: "🔑 MNEMONIC"; }
        html[lang="en"] .tip::before { content: "💡 TIP"; }
        html[lang="en"] .warning::before { content: "⚠️ WARNING"; }
        html[lang="en"] .example::before { content: "📝 EXAMPLE"; }
        html[lang="en"] .explanation::before { content: "💬 EXPLANATION"; }

        /* ==========================================
           TYPOGRAPHY - Legibilidade otimizada
           ========================================== */
        ul, ol {
            margin-left: 24px;
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 12px;
            line-height: 1.7;
        }

        p {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        strong {
            color: var(--text-body);
            font-weight: 700;
        }

        /* ==========================================
           EXERCISES - Feedback imediato e claro
           ========================================== */
        .exercises {
            margin-top: 64px;
            padding-top: 48px;
            border-top: 2px solid var(--border);
        }

        .exercises > h3 {
            color: var(--text-primary);
            font-size: 1.5em;
            margin-bottom: 32px;
            font-weight: 700;
        }

        .exercise-card {
            background: var(--bg-card-alt);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            border: 2px solid var(--border);
            transition: all 0.2s ease;
        }

        .exercise-card:hover {
            border-color: var(--border-hover);
        }

        .exercise-card.correct {
            border-color: var(--success);
            background: var(--example-bg);
        }

        .exercise-card.incorrect {
            border-color: var(--danger);
            background: var(--warning-bg);
        }

        .question {
            font-weight: 600;
            font-size: 1.05em;
            margin-bottom: 24px;
            color: var(--text-body);
            line-height: 1.6;
        }

        .options {
            list-style: none;
            margin: 0;
        }

        .option {
            background: var(--bg-card);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
        }

        .option.selected {
            background: var(--tip-bg);
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--example-bg);
            border-color: var(--success);
        }

        .option.incorrect {
            background: var(--warning-bg);
            border-color: var(--danger);
        }

        .explanation {
            margin-top: 24px;
            padding: 20px;
            background: var(--explanation-bg);
            border-radius: 6px;
            border-left: 4px solid var(--explanation-border);
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation::before {
            content: "💬 EXPLICAÇÃO";
            display: block;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 0.85em;
        }

        /* Botão de ação principal (laranja para engajamento) */
        .check-answers-btn {
            background: var(--warning-accent);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            margin: 40px auto;
            box-shadow: 0 2px 8px rgba(237,137,54,0.3);
        }

        .check-answers-btn:hover {
            background: var(--warning-hover);
            box-shadow: 0 4px 12px rgba(237,137,54,0.4);
        }

        .check-answers-btn:active {
            transform: scale(0.98);
        }

        .score {
            text-align: center;
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text-body);
            margin-top: 32px;
            padding: 24px;
            background: var(--score-bg);
            border-radius: 8px;
            display: none;
            border: 2px solid var(--score-border);
        }

        .score.show {
            display: block;
        }

        /* ==========================================
           NAVIGATION - Simples e funcional
           ========================================== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 48px;
            gap: 16px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }

        .nav-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .nav-btn.prev {
            background: var(--border);
            color: var(--text-secondary);
        }

        .nav-btn.prev:hover {
            background: var(--border-hover);
        }

        .nav-btn.next {
            background: var(--accent);
            color: white;
        }

        .nav-btn.next:hover {
            background: var(--accent-hover);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            background: var(--border);
        }

        /* ==========================================
           ACTIVE RECALL - Técnica de recuperação ativa
           ========================================== */
        .active-recall {
            background: var(--recall-bg);
            border: 2px dashed var(--recall-border);
            border-radius: 8px;
            padding: 24px;
            margin: 32px 0;
        }

        .active-recall summary {
            font-weight: 700;
            color: var(--recall-border);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95em;
            user-select: none;
        }

        .active-recall summary::-webkit-details-marker {
            display: none;
        }

        .active-recall summary::before {
            content: "🤔";
            font-size: 1.2em;
        }

        .active-recall[open] summary::before {
            content: "💡";
        }

        .active-recall summary:hover {
            color: var(--recall-border);
        }

        .active-recall .recall-content {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--recall-divider);
            color: var(--recall-text);
        }

        /* ==========================================
           UTILITIES
           ========================================== */
        .separator {
            height: 1px;
            background: var(--border);
            margin: 32px 0;
        }

        .highlight {
            background: var(--highlight-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            color: var(--highlight-text);
        }

        code {
            background: var(--code-bg);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--code-text);
            font-size: 0.9em;
        }

        .icon {
            font-size: 1.3em;
        }

        /* ==========================================
           INTRO PAGE STYLES - Específicos para módulo de introdução
           ========================================== */
        .intro-section {
            background: var(--intro-section-bg);
            padding: 32px;
            margin: 24px 0;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .intro-section h4 {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.3em;
        }

        .intro-section p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .intro-highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            margin: 32px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .intro-highlight h3 {
            color: white;
            margin-bottom: 12px;
            font-size: 1.5em;
        }

        .intro-highlight p {
            color: rgba(255,255,255,0.95);
            font-size: 1.1em;
            margin: 0;
        }

        .study-tips {
            background: var(--study-bg);
            border: 2px solid var(--study-border);
            border-radius: 10px;
            padding: 28px;
            margin: 28px 0;
        }

        .study-tips h4 {
            color: var(--study-title);
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.2em;
        }

        .study-tips ul {
            margin-left: 20px;
        }

        .study-tips li {
            color: var(--text-body);
            margin-bottom: 12px;
            line-height: 1.7;
        }

        /* ==========================================
           FOOTER - Copyright
           ========================================== */
        .footer {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 32px;
            margin-top: 40px;
            text-align: center;
            box-shadow: var(--shadow-md);
            border-top: 3px solid var(--accent);
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 1.2em;
        }

        .footer p {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .footer-license {
            background: var(--footer-license-bg);
            border: 1px solid var(--footer-license-border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .footer-license strong {
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .footer-license p {
            color: var(--footer-license-text);
            margin: 0;
            font-size: 0.9em;
        }

        .footer-author {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-body);
            font-weight: 500;
        }

        .footer-author span {
            color: var(--accent);
            font-weight: 600;
        }

        .action-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 24px 32px;
            border-radius: 10px;
            margin: 28px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .action-box h4 {
            color: white;
            margin: 0 0 12px 0;
            font-size: 1.3em;
        }

        .action-box p {
            color: rgba(255,255,255,0.95);
            margin: 0;
            font-size: 1.05em;
        }

        .action-box a {
            color: white;
            text-decoration: underline;
            font-weight: 600;
        }

        .testimonial {
            background: var(--testimonial-bg);
            border-left: 4px solid var(--testimonial-border);
            padding: 28px;
            margin: 32px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.15);
        }

        .testimonial-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .testimonial-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: white;
        }

        .testimonial-author {
            font-weight: 700;
            color: var(--testimonial-author);
            font-size: 1.1em;
        }

        .testimonial-content {
            color: var(--testimonial-text);
            line-height: 1.8;
            font-style: italic;
            font-size: 1.05em;
        }

        .module-list {
            background: var(--module-list-bg);
            padding: 24px;
            border-radius: 10px;
            margin: 24px 0;
        }

        .module-list h4 {
            color: var(--module-item-text);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .module-item {
            background: var(--module-item-bg);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .module-item strong {
            color: var(--module-item-text);
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
        }

        .module-item ul {
            margin: 8px 0 0 20px;
        }

        .module-item li {
            color: var(--module-item-sub);
            font-size: 0.95em;
            margin-bottom: 6px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 16px 40px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1em;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        /* ==========================================
           RESPONSIVE
           ========================================== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header {
                padding: 24px;
                padding-top: 48px;
            }

            .header-controls {
                position: static;
                margin-bottom: 16px;
                justify-content: flex-end;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .tabs {
                grid-template-columns: 1fr;
            }

            .content {
                padding: 24px;
            }

            .lesson h3 {
                font-size: 1.4em;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .lesson-header {
                flex-direction: column;
                gap: 16px;
            }

            .mark-complete {
                width: 100%;
            }

            /* Simulado responsive */
            .sim-match-container { grid-template-columns: 1fr; }
            .sim-meta-grid { grid-template-columns: repeat(2, 1fr); }
            .sim-score-value { font-size: 3em; }
            .sim-exam-nav { flex-direction: column; }
            .sim-nav-prev, .sim-nav-next, .sim-submit-btn { width: 100%; }
            .sim-report-actions { flex-direction: column; }
        }

        /* ==========================================
           SIMULADO FINAL — EXAM ENGINE STYLES
           ========================================== */

        /* --- Screens --- */
        .sim-screen { display: none; }
        .sim-screen.active { display: block; }

        /* --- Intro Screen --- */
        .sim-intro-hero {
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white; padding: 40px; border-radius: 12px; margin-bottom: 32px; text-align: center;
        }
        .sim-intro-hero h2 { color: white; font-size: 1.8em; margin-bottom: 8px; }
        .sim-intro-hero p { color: rgba(255,255,255,0.88); font-size: 1.1em; margin: 0; }
        .sim-meta-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px; margin: 28px 0;
        }
        .sim-meta-item {
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px 16px; text-align: center;
        }
        .sim-meta-item .sim-meta-icon { font-size: 1.8em; margin-bottom: 8px; }
        .sim-meta-item .sim-meta-value { font-size: 1.3em; font-weight: 700; color: var(--text-primary); }
        .sim-meta-item .sim-meta-label { font-size: 0.8em; color: var(--text-muted); margin-top: 2px; }
        .sim-domains-list { margin: 24px 0; }
        .sim-domain-item {
            display: flex; align-items: center; gap: 14px;
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
        }
        .sim-domain-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .sim-domain-name { font-weight: 600; color: var(--text-body); flex: 1; }
        .sim-domain-weight { font-size: 0.85em; color: var(--text-muted); font-weight: 500; }
        .sim-instructions { background: var(--tip-bg); border-left: 4px solid var(--tip-border); border-radius: 8px; padding: 20px 24px; margin: 24px 0; color: var(--tip-text); }
        .sim-instructions ul { margin: 10px 0 0 20px; }
        .sim-instructions li { margin-bottom: 6px; font-size: 0.95em; }
        .sim-start-btn {
            background: linear-gradient(135deg, #2c5282 0%, #3182ce 100%);
            color: white; border: none; padding: 18px 60px; border-radius: 10px;
            font-size: 1.15em; font-weight: 700; cursor: pointer; display: block;
            margin: 32px auto 0; box-shadow: 0 4px 14px rgba(49,130,206,0.35);
            transition: all 0.2s ease;
        }
        .sim-start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(49,130,206,0.45); }

        /* --- Exam Screen --- */
        .sim-exam-header {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; gap: 16px;
        }
        .sim-timer {
            font-size: 1.25em; font-weight: 700; color: var(--accent);
            font-variant-numeric: tabular-nums; min-width: 70px; text-align: center;
        }
        .sim-timer.warning { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sim-q-counter { color: var(--text-muted); font-size: 0.9em; font-weight: 500; }
        .sim-flag-btn {
            background: none; border: 1.5px solid var(--border); border-radius: 6px;
            padding: 6px 12px; cursor: pointer; color: var(--text-muted); font-size: 0.85em;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .sim-flag-btn.flagged { border-color: var(--warning-accent); color: var(--warning-accent); background: var(--recall-bg); }
        .sim-flag-btn:hover { border-color: var(--warning-accent); color: var(--warning-accent); }

        /* Timer progress bar */
        .sim-timer-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .sim-timer-fill { height: 100%; background: var(--accent); transition: width 1s linear; border-radius: 2px; }
        .sim-timer-fill.warning { background: var(--danger); }

        /* Question area */
        .sim-question-area { margin-bottom: 24px; }
        .sim-question-type-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 12px; font-size: 0.78em;
            font-weight: 600; color: var(--text-muted); margin-bottom: 14px;
        }
        .sim-scenario {
            background: var(--example-bg); border-left: 4px solid var(--example-border);
            border-radius: 8px; padding: 18px 22px; margin-bottom: 18px;
            color: var(--example-text); font-size: 0.95em; line-height: 1.7;
        }
        .sim-scenario::before { content: "📋 CENÁRIO"; display: block; font-weight: 700; font-size: 0.82em; margin-bottom: 8px; color: var(--example-border); letter-spacing: 0.5px; }
        .sim-q-text { font-weight: 600; font-size: 1.05em; color: var(--text-body); margin-bottom: 18px; line-height: 1.6; }
        .sim-multi-hint { font-size: 0.82em; color: var(--accent); font-weight: 600; margin-bottom: 12px; }

        /* Options (single/multi) */
        .sim-options { list-style: none; margin: 0; }
        .sim-option {
            display: flex; align-items: flex-start; gap: 12px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
            cursor: pointer; transition: all 0.2s; line-height: 1.55;
        }
        .sim-option:hover { border-color: var(--accent); background: var(--bg-hover); }
        .sim-option.selected { border-color: var(--accent); background: var(--tip-bg); }
        .sim-option input { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
        .sim-option label { cursor: pointer; flex: 1; color: var(--text-body); }

        /* --- Drag-and-Drop --- */
        /* Match type */
        .sim-match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 8px 0; }
        .sim-match-pool-label, .sim-match-targets-label { font-size: 0.82em; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
        .sim-match-pool { display: flex; flex-direction: column; gap: 8px; }
        .sim-match-item {
            background: var(--bg-card); border: 2px solid var(--accent);
            border-radius: 8px; padding: 10px 14px; cursor: grab; user-select: none;
            touch-action: none; font-size: 0.92em; font-weight: 500; color: var(--text-body);
            transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
            display: flex; align-items: center;
        }
        .sim-match-item:hover { box-shadow: 0 2px 8px var(--accent-shadow); }
        .sim-match-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-match-item.placed { border-color: var(--success); background: var(--example-bg); color: var(--example-text); }
        .sim-match-targets { display: flex; flex-direction: column; gap: 8px; }
        .sim-match-target-row { display: flex; flex-direction: column; gap: 4px; }
        .sim-match-target-label { font-size: 0.82em; color: var(--text-secondary); font-weight: 500; line-height: 1.4; }
        .sim-match-slot {
            min-height: 44px; border: 2px dashed var(--border); border-radius: 8px;
            padding: 6px; transition: border-color 0.15s, background 0.15s;
            display: flex; align-items: center;
        }
        .sim-match-slot.over { border-color: var(--accent); background: var(--tip-bg); border-style: solid; }
        .sim-match-slot.filled { border-style: solid; border-color: var(--success); background: var(--example-bg); }
        .sim-match-slot-placeholder { color: var(--text-muted); font-size: 0.82em; padding: 4px 8px; font-style: italic; }

        /* Order type */
        .sim-order-list { display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
        .sim-order-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; padding: 12px 16px; cursor: grab; user-select: none;
            touch-action: none; transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
        }
        .sim-order-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
        .sim-order-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-order-handle { color: var(--text-muted); font-size: 1.1em; flex-shrink: 0; user-select: none; }
        .sim-order-num { font-weight: 700; color: var(--accent); font-size: 0.95em; min-width: 22px; flex-shrink: 0; }
        .sim-order-text { flex: 1; color: var(--text-body); font-size: 0.95em; line-height: 1.5; }
        .sim-order-drop-indicator { height: 3px; background: var(--accent); border-radius: 2px; margin: -4px 0; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
        .sim-order-drop-indicator.visible { opacity: 1; }

        /* Categorize type */
        .sim-categorize-pool {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
            min-height: 52px; padding: 10px; border: 2px dashed var(--border);
            border-radius: 10px; background: var(--bg-card-alt);
        }
        .sim-categorize-pool.over { border-color: var(--accent); background: var(--tip-bg); }
        .sim-categorize-item {
            background: var(--bg-card); border: 2px solid var(--accent);
            border-radius: 6px; padding: 8px 14px; cursor: grab; user-select: none;
            touch-action: none; font-size: 0.88em; font-weight: 500; color: var(--text-body);
            transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
            display: flex; align-items: center;
        }
        .sim-categorize-item:hover { box-shadow: 0 2px 6px var(--accent-shadow); }
        .sim-categorize-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-categorize-buckets { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .sim-bucket {
            border: 2px solid var(--border); border-radius: 10px; min-height: 100px;
            transition: border-color 0.15s, background 0.15s;
        }
        .sim-bucket.over { border-color: var(--accent); background: var(--tip-bg); }
        .sim-bucket-header {
            padding: 10px 14px; font-weight: 700; font-size: 0.88em;
            background: var(--bg-card-alt); border-bottom: 1px solid var(--border);
            border-radius: 8px 8px 0 0; color: var(--text-body);
        }
        .sim-bucket-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 60px; }

        /* Ghost element during drag */
        .sim-drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999; opacity: 0.9;
            transform: rotate(2deg) scale(1.04);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18); border-radius: 8px;
        }

        /* --- Nav Grid --- */
        .sim-nav-section { margin-bottom: 20px; }
        .sim-nav-label { font-size: 0.82em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .sim-nav-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .sim-nav-btn {
            width: 36px; height: 36px; border-radius: 6px; border: 1.5px solid var(--border);
            background: var(--bg-card-alt); color: var(--text-muted); font-size: 0.78em;
            font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex;
            align-items: center; justify-content: center;
        }
        .sim-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sim-nav-btn.answered { background: var(--accent); border-color: var(--accent); color: white; }
        .sim-nav-btn.flagged { background: var(--recall-bg); border-color: var(--warning-accent); color: var(--warning-accent); }
        .sim-nav-btn.current { box-shadow: 0 0 0 3px var(--accent-shadow); border-color: var(--accent); font-weight: 700; }
        .sim-nav-btn.answered.flagged { background: var(--warning-accent); border-color: var(--warning-accent); color: white; }

        /* --- Exam Navigation Buttons --- */
        .sim-exam-nav { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .sim-nav-prev, .sim-nav-next {
            flex: 1; padding: 13px 20px; border: none; border-radius: 8px; font-weight: 600;
            font-size: 0.95em; cursor: pointer; transition: all 0.2s; min-width: 100px;
        }
        .sim-nav-prev { background: var(--border); color: var(--text-secondary); }
        .sim-nav-prev:hover { background: var(--border-hover); }
        .sim-nav-prev:disabled { opacity: 0.35; cursor: not-allowed; }
        .sim-nav-next { background: var(--accent); color: white; }
        .sim-nav-next:hover { background: var(--accent-hover); }
        .sim-submit-btn {
            background: var(--success); color: white; border: none; padding: 13px 28px;
            border-radius: 8px; font-weight: 700; font-size: 0.95em; cursor: pointer;
            transition: all 0.2s;
        }
        .sim-submit-btn:hover { background: var(--success-hover); }

        /* --- Score Report --- */
        .sim-report-hero {
            text-align: center; padding: 40px 24px; border-radius: 12px; margin-bottom: 32px;
        }
        .sim-report-hero.pass { background: linear-gradient(135deg, #1c4532 0%, #276749 100%); }
        .sim-report-hero.fail { background: linear-gradient(135deg, #63171b 0%, #9b2c2c 100%); }
        .sim-score-value { font-size: 4em; font-weight: 800; color: white; line-height: 1; }
        .sim-score-max { font-size: 1.3em; color: rgba(255,255,255,0.7); margin-bottom: 16px; }
        .sim-pass-badge {

        // ============================================================
        // SIMULADO FINAL — CONFIG

            timeLimit: 45,       // minutos (tempo real do exame)
            passScore: 700,      // nota de aprovação (padrão Microsoft)
            totalScore: 1000,    // pontuação máxima
            questionCount: 40    // número de questões (pesquisar contagem oficial)

        // ============================================================
        // SIMULADO FINAL — DOMAINS
        // SUBSTITUIR: mapear os domínios dos skills measured oficiais
        // Cores: #3182ce (azul), #48bb78 (verde), #ed8936 (laranja), #9f7aea (roxo), #e53e3e (vermelho)
        // ============================================================
        const SIMULADO_DOMAINS = [
            { id: 0, pt: "Fundamentos da IA Gerativa", en: "Generative AI Fundamentals", weight: "25–30%", color: "#3182ce", icon: "💡" },
            { id: 1, pt: "Prompts, Conversas e Agentes", en: "Prompts, Conversations & Agents", weight: "35–40%", color: "#9f7aea", icon: "🎯" },
            { id: 2, pt: "Conteúdo de Negócios com IA", en: "AI-Powered Business Content", weight: "25–30%", color: "#48bb78", icon: "📄" }

        // ============================================================
        // SIMULADO FINAL — QUESTIONS
        // SUBSTITUIR: 40 questões (ajustar ao questionCount acima)
        // Mix obrigatório: single(20-26), multi(4-8), match(2-4), order(2-4), categorize(1-2)
        // Distribuir proporcionalmente aos pesos dos domínios
        // Basear em simulados reais, ExamTopics, Whizlabs e Microsoft Learn
        // ============================================================
        const SIMULADO_QUESTIONS = [
            // ── Q1–Q20 ────────────────────────────────────────────────────────
            {
                id: 1, domain: 0, type: 'single',
                question: "Uma organização precisa garantir que os dados processados pelo Microsoft 365 Copilot não saiam do ambiente controlado da empresa. Qual afirmação descreve corretamente como o Copilot protege esses dados?",
                options: [
                    "O Copilot envia dados para servidores externos da Microsoft para processamento e os retorna após anonimização",
                    "O Copilot pode enviar dados para treinar modelos públicos, mas apenas com consentimento do administrador",
                    "O Copilot opera dentro dos limites de conformidade do Microsoft 365 — os dados do tenant não são usados para treinar modelos públicos e permanecem no ambiente seguro",
                    "Os dados ficam no tenant por 90 dias e depois são automaticamente excluídos pela Microsoft"
                ],
                correct: 2,
                explanation: "✅ <strong>Opção C correta!</strong><br>O Microsoft 365 Copilot opera dentro do Microsoft 365 Trust Boundary. Os dados do cliente não saem para treinar modelos públicos e são processados respeitando todos os controles de conformidade do tenant.<br><br>❌ A: O processamento ocorre dentro do trust boundary, não em servidores externos.<br>❌ B: Dados de clientes nunca são usados para treinar modelos públicos, nem com consentimento.<br>❌ D: A Microsoft não exclui automaticamente dados de tenant após 90 dias por inatividade."
            },
            {
                id: 2, domain: 0, type: 'single',
                question: "Qual é a principal característica que define um modelo de linguagem grande (LLM) como o que alimenta o Microsoft 365 Copilot?",
                options: [
                    "Ele pesquisa respostas em tempo real na internet e as apresenta ao usuário",
                    "Ele processa e gera texto prevendo os tokens mais prováveis com base em padrões aprendidos durante o treinamento",
                    "Ele consulta uma base de dados estruturada de respostas pré-aprovadas pela Microsoft",
                    "Ele executa algoritmos matemáticos determinísticos para encontrar a resposta exata"
                ],
                correct: 1,
                explanation: "✅ <strong>Opção B correta!</strong><br>LLMs (Large Language Models) funcionam prevendo os tokens mais prováveis baseados em padrões estatísticos aprendidos em bilhões de exemplos durante o treinamento. Não consultam internet em tempo real nem banco de dados de respostas fixas.<br><br>❌ A: LLMs por padrão não buscam na internet em tempo real (isso requer plugins).<br>❌ C: Não há base de dados de respostas pré-aprovadas — o modelo gera texto dinamicamente.<br>❌ D: O processo é probabilístico, não determinístico — a mesma pergunta pode gerar respostas diferentes."
            },
            {
                id: 3, domain: 0, type: 'single',
                question: "Uma profissional de RH usa o Copilot para gerar uma proposta de benefícios e percebe que os valores percentuais apresentados são precisos e convincentes, mas completamente inventados. Qual ação representa a prática mais adequada de IA Responsável?",
                options: [
                    "Reiniciar o Copilot e refazer a pergunta com mais contexto para obter valores corretos",
                    "Reportar o incidente ao time de TI como falha de segurança do sistema",
                    "Verificar todas as informações críticas em fontes primárias antes de usar o conteúdo gerado",
                    "Evitar usar o Copilot para qualquer tarefa relacionada a benefícios no futuro"
                ],
                correct: 2,
                explanation: "✅ <strong>Opção C correta!</strong><br>A fabricação (hallucination) é um risco inerente a LLMs — o modelo pode gerar dados estatisticamente plausíveis mas factualmente incorretos. O princípio de IA Responsável exige sempre verificar informações críticas em fontes primárias antes do uso.<br><br>❌ A: Refazer a pergunta não garante dados corretos — o problema é estrutural no LLM.<br>❌ B: Fabricação não é falha de segurança — é característica conhecida dos LLMs.<br>❌ D: A solução não é evitar o Copilot, mas usá-lo com verificação humana adequada."
            },
            {
                id: 4, domain: 0, type: 'single',
                question: "A Microsoft define 6 princípios de IA Responsável. Uma empresa descobre que seu modelo de análise de candidatos a emprego sistematicamente desfavorece mulheres com mais de 40 anos, perpetuando vieses dos dados históricos. Qual princípio de IA Responsável está sendo violado?",
                options: [
                    "Confiabilidade e Segurança — o modelo não funciona de forma consistente",
                    "Equidade (Fairness) — o sistema discrimina grupos de pessoas de forma injusta",
                    "Privacidade e Segurança — dados pessoais estão sendo usados indevidamente",
                    "Transparência — o processo de tomada de decisão não é explicável"
                ],
                correct: 1,
                explanation: "✅ <strong>Opção B correta!</strong><br>O princípio de Equidade (Fairness) exige que sistemas de IA tratem todas as pessoas de forma justa, sem discriminação baseada em características protegidas como gênero, idade, raça ou etnia. Um modelo que sistematicamente desfavorece grupos específicos viola este princípio, mesmo que seja resultado de viés nos dados históricos.<br><br>❌ A: Confiabilidade trata de consistência de funcionamento, não de viés.<br>❌ C: Privacidade trata de proteção de dados pessoais, não de discriminação algorítmica.<br>❌ D: Transparência é um problema relacionado mas não é o princípio primário violado aqui."
            },
            {
                id: 5, domain: 0, type: 'single',
                question: "Um analista de inteligência de mercado precisa investigar profundamente as tendências de consolidação no setor de energia renovável, sintetizando informações de relatórios setoriais, notícias e publicações acadêmicas. Qual agente especializado do M365 Copilot é mais adequado para esta tarefa?",
                options: [
                    "Copilot Chat (BizChat) — para pesquisas gerais usando o contexto de emails e arquivos do usuário",
                    "Copilot Researcher — especializado em investigação aprofundada e síntese de múltiplas fontes complexas",
                    "Copilot Analyst — especializado em análise quantitativa de dados estruturados como planilhas",
                    "Copilot no Teams — otimizado para pesquisas colaborativas durante reuniões"
                ],
                correct: 1,
                explanation: "✅ <strong>Opção B correta!</strong><br>O Copilot Researcher é projetado para investigações aprofundadas — pesquisa em múltiplas fontes heterogêneas, síntese de informações complexas e análise de tópicos que requerem raciocínio extenso e conexão entre conceitos de diferentes fontes.<br><br>❌ A: BizChat é um assistente geral sem especialização em pesquisa aprofundada multifonte.<br>❌ C: Copilot Analyst é especializado em dados estruturados (planilhas), não em pesquisa qualitativa multifonte.<br>❌ D: Copilot no Teams é otimizado para contexto de reuniões, não para pesquisa aprofundada."
            },
            {
                id: 6, domain: 0, type: 'single',
                scenario: "Um gerente de projetos usa o Copilot para analisar um documento de contrato enviado por um fornecedor externo. Ao processar o arquivo, o Copilot começa a executar instruções não solicitadas, como tentar acessar emails confidenciais do usuário.",
                question: "Qual tipo de ataque de segurança de IA este cenário descreve?",
                options: [
                    "Fabricação adversarial — o modelo inventou instruções para parecer mais útil",
                    "Violação de conformidade do tenant pelo fornecedor externo",
                    "Excesso de permissões do usuário no Microsoft 365",
                    "Injeção de prompt (prompt injection) via conteúdo malicioso no documento"

                correct: 3,
                explanation: "✅ <strong>Opção D correta!</strong><br>A Injeção de Prompt ocorre quando conteúdo malicioso incorporado em um documento ou input tenta manipular o modelo de IA para executar ações não autorizadas, revelar dados sensíveis ou desviar do comportamento esperado. É um vetor de ataque crítico ao usar IA com documentos externos.<br><br>❌ A: Fabricação é geração de dados incorretos, não execução de instruções maliciosas.<br>❌ B e C: O problema é o conteúdo malicioso no documento, não configurações de tenant ou permissões."
            },
            {
                id: 7, domain: 1, type: 'single',
                question: "Um gerente de projetos quer criar um cronograma de implementação de ERP de 8 meses com o Copilot. Qual dos prompts abaixo produzirá o resultado mais útil e profissional?",
                options: [
                    "Crie um cronograma de projeto",
                    "Preciso de um cronograma de ERP, pode ajudar?",
                    "Crie um cronograma de implementação para projeto de migração de ERP de 8 meses, com fases (planejamento, configuração, testes UAT, treinamento, go-live), incluindo dependências entre fases e marcos mensais, no formato de tabela com colunas: Fase, Duração, Responsável, Dependências, Marco",
                    "Ajude a organizar as fases de um projeto de ERP em uma tabela"
                ],
                correct: 2,
                explanation: "✅ <strong>Opção C correta!</strong><br>O prompt mais eficaz especifica todos os elementos necessários: contexto (migração de ERP, 8 meses), estrutura esperada (fases nomeadas), conteúdo de cada fase (dependências, marcos) e formato de saída (tabela com colunas específicas). Um prompt completo = resultado de qualidade profissional sem necessidade de iterações.<br><br>❌ A e B: São vagos demais — o Copilot gerará um resultado genérico que exigirá múltiplas iterações.<br>❌ D: Especifica o formato (tabela) mas não o conteúdo esperado, resultando em estrutura incompleta."
            },
            {
                id: 8, domain: 1, type: 'single',
                question: "Uma analista deseja que o Copilot compare dados de um relatório de vendas no Excel com metas em um documento Word, ambos salvos no SharePoint. Como ela deve referenciar os dois arquivos no mesmo prompt?",
                options: [
                    "Copiar e colar o conteúdo de ambos os arquivos no campo de texto antes da pergunta",
                    "Usar o símbolo / seguido do nome de cada arquivo para referenciar ambos diretamente no prompt",
                    "Exportar ambos para PDF e fazer upload no campo de chat do Copilot",
                    "Abrir os dois arquivos simultaneamente — o Copilot os detectará e processará automaticamente"

                correct: 1,
                explanation: "✅ <strong>Opção B correta!</strong><br>O símbolo / no Microsoft 365 Copilot abre o seletor nativo de arquivos do M365. A analista pode digitar /[nome do Excel] e /[nome do Word] no mesmo prompt para referenciar ambos os arquivos, permitindo análise cruzada de dados com contexto completo.<br><br>❌ A: Copiar e colar perde a referência nativa e pode ser impraticável para arquivos grandes.<br>❌ C: Upload de PDF não aproveita a integração nativa do M365 e perde a conexão com os arquivos originais.<br>❌ D: O Copilot não detecta arquivos automaticamente — a referência explícita com / é necessária."
            },
            {
                id: 9, domain: 1, type: 'single',
                question: "Um consultor usa um prompt complexo toda semana para analisar relatórios de clientes. Após salvar o prompt no Copilot, qual é a forma mais rápida de reutilizá-lo na semana seguinte?",
                options: [
                    "Acessar o histórico de conversas e copiar o prompt da sessão anterior",
                    "Abrir as configurações do Copilot, localizar o prompt e copiá-lo antes de cada uso",
                    "Acessar os prompts salvos diretamente da interface do Copilot e executar com um clique",
                    "Exportar o prompt como arquivo .txt e importá-lo na próxima sessão"

<h4>📌 Tópico: O que é um LLM (Large Language Model)?</h4>
<p><strong>Explicação:</strong> Um <strong>Modelo de Linguagem Grande (LLM)</strong> é o motor inteligente do Microsoft 365 Copilot. Treinado em bilhões de textos, ele aprende padrões da linguagem humana e gera respostas prevendo a sequência de <strong>tokens</strong> mais provável.</p>
<div class="macete">LLM = "Leitor Muito Literato" — ele leu mais textos do que qualquer humano poderia em toda uma vida, aprendendo a prever o que vem a seguir com base em padrões estatísticos.</div>

<h4>📌 Tópico: Os 4 Elementos de um Prompt Eficaz (Framework Microsoft)</h4>
<p>A Microsoft recomenda 4 elementos-chave para prompts de qualidade profissional:</p>
<table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:0.93em">
  <tr style="background:var(--primary);color:#fff">
    <th style="padding:8px 10px">Elemento</th>
    <th style="padding:8px 10px">Pergunta-guia</th>
    <th style="padding:8px 10px">Exemplo</th>
  </tr>
  <tr style="border-bottom:1px solid var(--border)">
    <td style="padding:8px 10px">🎯 <strong>Objetivo</strong></td>
    <td style="padding:8px 10px">O que você precisa que o Copilot faça?</td>
    <td style="padding:8px 10px">"Gere um resumo executivo..."</td>
  </tr>
  <tr style="border-bottom:1px solid var(--border);background:var(--bg-secondary)">
    <td style="padding:8px 10px">📋 <strong>Contexto</strong></td>
    <td style="padding:8px 10px">Por quê? Para quem? Qual o cenário?</td>
    <td style="padding:8px 10px">"...para o CEO, sobre o projeto de migração de ERP..."</td>
  </tr>
  <tr style="border-bottom:1px solid var(--border)">
    <td style="padding:8px 10px">📂 <strong>Fonte</strong></td>
    <td style="padding:8px 10px">Em quais dados o Copilot deve se basear?</td>
    <td style="padding:8px 10px">"...com base no /Relatório Q3 2026.docx e /Atas de Reunião.docx..."</td>
  </tr>
  <tr style="background:var(--bg-secondary)">
    <td style="padding:8px 10px">📐 <strong>Expectativas</strong></td>
    <td style="padding:8px 10px">Qual formato, tom e estrutura?</td>
    <td style="padding:8px 10px">"...em 3 tópicos, tom formal, máx. 200 palavras"</td>
  </tr>
</table>
<div class="macete">Mnemônico: <strong>OCFE</strong> — Objetivo, Contexto, Fonte, Expectativas.<br>Ou a pergunta: <strong>"O que? Por quê? Com o quê? Como?"</strong></div>
<div class="separator"></div>

<h4>📌 Tópico: Comparativo — Prompt Fraco vs. Prompt Forte</h4>
<div class="example">
  <strong>❌ Prompt Fraco:</strong> "Crie uma política de home office"<br>
  <strong>Resultado:</strong> Documento genérico que pode não atender às necessidades reais da empresa.<br><br>
  <strong>✅ Prompt Forte:</strong><br>
  "Crie uma política de home office [<em>Objetivo</em>] para nossa empresa de 500 funcionários do setor financeiro [<em>Contexto</em>], baseada nas diretrizes do /Manual de RH 2026.docx [<em>Fonte</em>], no formato de documento oficial com seções numeradas: Elegibilidade, Equipamentos, Disponibilidade e Processo de Aprovação, em linguagem clara e profissional [<em>Expectativas</em>]."<br><br>
  <strong>Resultado:</strong> Documento estruturado, alinhado com a política interna existente, no formato e tom corretos — pronto para revisão.
</div>
<div class="separator"></div>

<h4>📌 Tópico: O Símbolo / — Referenciando Fontes no Prompt</h4>
<p>O símbolo <code>/</code> é o atalho nativo do Copilot para referenciar conteúdo do M365 diretamente no prompt:</p>
<p>📁 <strong>/arquivo</strong> — Documentos Word, Excel, PowerPoint do OneDrive/SharePoint<br>
📧 <strong>/email</strong> — Emails específicos do Outlook<br>
📅 <strong>/reunião</strong> — Transcrições e notas de reuniões do Teams<br>
👤 <strong>/pessoa</strong> — Perfil e contexto de colegas</p>

<h4>📌 Tópico: Histórico de Conversas — Retomar o Trabalho</h4>
<p>O Microsoft 365 Copilot mantém o histórico de todas as conversas acessível pelo painel lateral. Você pode retomar qualquer conversa anterior exatamente de onde parou — mesmo dias ou semanas depois.</p>

✏️ <strong>Renomear</strong> — dar nomes descritivos para encontrar facilmente depois<br>
🗑️ <strong>Excluir</strong> — remover conversas obsoletas individualmente ou em lote<br>
📓 <strong>Exportar ao OneNote</strong> — preservar insights para uso futuro e compartilhamento</p>

<h4>📌 Tópico: Renomear e Organizar Conversas</h4>
<p>Por padrão, o Copilot gera nomes automáticos baseados na data. Renomear com nomes descritivos torna o histórico muito mais útil e navegável.</p>
<div class="example">
  <strong>❌ Nome automático:</strong> "Conversa de 15 de maio 14:32"<br>
  <strong>✅ Renomeado:</strong> "Análise de mercado — Concorrentes Europa Q2 2026"<br>
  <strong>Benefício:</strong> Encontrar a conversa certa em segundos, sem precisar abrir cada uma para verificar o conteúdo.
</div>
<div class="tip">Crie uma convenção de nomenclatura para suas conversas, como: "[Projeto] — [Tópico] — [Data]"</div>
<div class="separator"></div>

<h4>📌 Tópico: Integração com OneNote — Preservar e Compartilhar Insights</h4>
<p>O Copilot permite adicionar conversas diretamente a um bloco de anotações do OneNote — sem copiar e colar manualmente. Ideal para preservar insights após sessões de brainstorming.</p>
<p><strong>Casos de uso:</strong><br>

📋 Criar base de conhecimento a partir de conversas do Copilot</p>

<h4>📌 Topic: What is a Large Language Model (LLM)?</h4>
<p><strong>Explanation:</strong> A <strong>Large Language Model (LLM)</strong> is the intelligent engine powering Microsoft 365 Copilot. Trained on billions of texts, it learns patterns of human language and generates responses by predicting the most probable sequence of <strong>tokens</strong>.</p>
<div class="macete">LLM = "Massively Literate Reader" — it has processed more text than any human could in a lifetime, learning to predict what comes next using statistical patterns.</div>
<div class="tip">A <strong>token</strong> is the minimum processing unit — a word, part of a word, or punctuation. "Microsoft" ≈ 2 tokens. Each conversation has a token (context) limit.</div>
<div class="example">
  <strong>Analogy:</strong> Think of your keyboard's autocomplete. You type "Good" → it suggests "morning". LLMs do this at massive scale with complex context and chained reasoning.<br>
  <strong>In Copilot:</strong> You ask "Summarize this document" → LLM processes the document tokens and generates the most useful and probable summary.
</div>
<div class="separator"></div>

<h4>📌 Topic: How M365 Copilot Processes a Prompt</h4>
<p><strong>Processing flow (from prompt to response):</strong></p>
<p>1️⃣ <strong>Receives</strong> the user's prompt<br>
2️⃣ <strong>Queries</strong> Microsoft Graph — your emails, files, calendar, and meetings<br>
3️⃣ <strong>Enriches</strong> the prompt with relevant tenant context<br>
4️⃣ <strong>Processes</strong> via LLM inside the Microsoft 365 Trust Boundary<br>
5️⃣ <strong>Returns</strong> the response with source references when available</p>
<div class="warning">Your tenant data stays inside the <strong>Microsoft 365 Trust Boundary</strong> — it never leaves to train public models and M365 permissions are always respected.</div>
<div class="example">
  <strong>Scenario:</strong> "Summarize my last meeting with Contoso."<br>
  <strong>Process:</strong> Copilot → Graph → finds Teams meeting → retrieves transcript → generates summary in LLM → returns to user.<br>
  <strong>Everything inside the tenant:</strong> Your data never leaves the secure organizational environment.
</div>
<div class="separator"></div>

<details class="active-recall">
  <summary>🤔 ACTIVE RECALL: Why is Microsoft Graph essential for Copilot?</summary>
  <div class="recall-content">
    <strong>Answer:</strong><br>
    Microsoft Graph is the layer connecting Copilot to all user data in M365 — emails, calendar, files, meetings, and contacts. It personalizes responses by making individual context accessible to the model. Without Graph, Copilot would respond generically, without using specific corporate data.

</details>

<div class="macete">Mnemonic: <strong>FRPITA</strong> — Fairness, Reliability, Privacy, Inclusiveness, Transparency, Accountability.<br>Or: <strong>"For Responsible Products, Include Transparent AI"</strong></div>
<div class="separator"></div>

<h4>📌 Topic: Hallucination (Fabrication) — The Main LLM Risk</h4>
<p>LLMs can generate <strong>plausible but factually incorrect</strong> information. The model doesn't "know" it's wrong — it generates the statistically most probable text, even if factually incorrect.</p>
<div class="warning">NEVER use data, statistics, citations, or references generated by Copilot in important documents without first verifying against primary sources.</div>
<div class="example">
  <strong>Scenario:</strong> A lawyer asks Copilot to list case law references for a case.<br>
  <strong>Risk:</strong> Copilot may "invent" references with plausible case numbers and dates that don't actually exist.<br>
  <strong>Best practice:</strong> Verify each citation in official legal databases before using in filings.
</div>
<div class="separator"></div>

<h4>📌 Topic: Prompt Injection Attack</h4>
<p>An attack where malicious instructions are embedded in content that Copilot processes (external documents, partner emails), attempting to manipulate the model into performing unauthorized actions or revealing sensitive data.</p>
<div class="macete">Prompt Injection = "Trojan Horse in the document" — hidden instructions in content that try to hijack Copilot's behavior.</div>
<div class="tip">For the exam: Injection ≠ Hallucination.<br>🔹 Hallucination = the model makes involuntary errors (internal limitation).<br>🔹 Injection = intentional external attack via malicious content.</div>
<details class="active-recall">
  <summary>🤔 ACTIVE RECALL: What is the difference between Hallucination and Prompt Injection?</summary>
  <div class="recall-content">
    <strong>Hallucination:</strong> The model generates incorrect data involuntarily — an inherent limitation of statistical LLMs.<br><br>
    <strong>Prompt Injection:</strong> An attacker embeds malicious instructions in content processed by AI to manipulate its behavior — an intentional external attack.<br><br>
    Analogy: Hallucination = teacher who answers incorrectly. Injection = student who writes answers on the teacher's exam.
  </div>
</details>
<div class="separator"></div>

<h4>📌 Topic: Grounding and the Microsoft 365 Trust Boundary</h4>
<p><strong>Grounding</strong> is the technique of anchoring model responses in verified data sources, drastically reducing hallucination.</p>
<div class="example">
  <strong>Without grounding:</strong> "What were our Q1 revenues?" → Copilot may invent convincing numbers.<br>
  <strong>With grounding:</strong> "Based on /Q1 2026 Report.xlsx, what were our revenues?" → Copilot extracts real data from the file.<br>
  <strong>Rule:</strong> The more verified context you provide with /, the lower the hallucination risk.
</div>
<p><strong>Microsoft 365 Trust Boundary guarantees:</strong></p>
<p>✅ Tenant data never leaves to train public models<br>
✅ Copilot respects all existing M365 permissions<br>
✅ Microsoft Purview confidentiality classifications are honored<br>
✅ No data is shared between different tenants</p>
<div class="warning">Copilot does NOT elevate permissions. If a user doesn't have access to a file, Copilot will not reveal it — even if it's relevant to the question asked.</div>
<details class="active-recall">

    <strong>Answer:</strong><br>

  </div>
</details>
<div class="separator"></div>

<h4>📌 Topic: Over-reliance and Citation Checks</h4>
<p><strong>Over-reliance</strong> is the third official risk listed by Microsoft for generative AI — alongside Fabrication and Prompt Injection.</p>
<p>⚠️ <strong>Definition:</strong> Accepting AI outputs without proper verification, especially for critical business decisions.</p>
<p><strong>Verification steps appropriate to the task:</strong><br>
🔍 <strong>Citation checks</strong> — verify that the sources Copilot indicates actually exist and say what it claims<br>
👤 <strong>Human review</strong> — specialist review before using in final decisions<br>
📊 <strong>Cross-reference</strong> — check against primary sources for numerical or factual data</p>
<div class="macete">3 Official Generative AI Risks: <strong>F.I.O.</strong> = Fabrication + Injection + Over-reliance</div>

                        { title: "2.1 Anatomy of an Effective Prompt", content: `
<h4>📌 Topic: The 4 Elements of an Effective Prompt (Microsoft Framework)</h4>
<p>Microsoft recommends 4 key elements for professional-quality prompts:</p>
<table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:0.93em">
  <tr style="background:var(--primary);color:#fff">
    <th style="padding:8px 10px">Element</th>
    <th style="padding:8px 10px">Guiding question</th>
    <th style="padding:8px 10px">Example</th>
  </tr>
  <tr style="border-bottom:1px solid var(--border)">
    <td style="padding:8px 10px">🎯 <strong>Goal</strong></td>
    <td style="padding:8px 10px">What do you need Copilot to do?</td>
    <td style="padding:8px 10px">"Generate an executive summary..."</td>
  </tr>
  <tr style="border-bottom:1px solid var(--border);background:var(--bg-secondary)">
    <td style="padding:8px 10px">📋 <strong>Context</strong></td>
    <td style="padding:8px 10px">Why? For whom? What's the scenario?</td>
    <td style="padding:8px 10px">"...for the CEO, about the ERP migration project..."</td>
  </tr>
  <tr style="border-bottom:1px solid var(--border)">
    <td style="padding:8px 10px">📂 <strong>Source</strong></td>
    <td style="padding:8px 10px">What data should Copilot base this on?</td>
    <td style="padding:8px 10px">"...based on /Q3 2026 Report.docx and /Meeting Notes.docx..."</td>
  </tr>
  <tr style="background:var(--bg-secondary)">
    <td style="padding:8px 10px">📐 <strong>Expectations</strong></td>
    <td style="padding:8px 10px">What format, tone and structure?</td>
    <td style="padding:8px 10px">"...in 3 bullet points, formal tone, max. 200 words"</td>
  </tr>
</table>
<div class="macete">Mnemonic: <strong>GCSE</strong> — Goal, Context, Source, Expectations.<br>Or the question: <strong>"What? Why? From what? How?"</strong></div>
<div class="separator"></div>

<h4>📌 Topic: Comparison — Weak Prompt vs. Strong Prompt</h4>
<div class="example">
  <strong>❌ Weak Prompt:</strong> "Create a remote work policy"<br>
  <strong>Result:</strong> A generic document that may not meet the company's actual needs.<br><br>
  <strong>✅ Strong Prompt:</strong><br>
  "Create a remote work policy [<em>Goal</em>] for our 500-employee financial services company [<em>Context</em>], based on the guidelines in /HR Manual 2026.docx [<em>Source</em>], in an official document format with numbered sections: Eligibility, Equipment, Availability and Approval Process, in clear and professional language [<em>Expectations</em>]."<br><br>
  <strong>Result:</strong> A structured document aligned with existing internal policy, in the right format and tone — ready for review.
</div>
<div class="separator"></div>

<h4>📌 Topic: The / Symbol — Referencing Sources in Prompts</h4>
<p>The <code>/</code> symbol is Copilot's native shortcut to reference M365 content directly in a prompt:</p>
<p>📁 <strong>/file</strong> — Word, Excel, PowerPoint documents from OneDrive/SharePoint<br>
📧 <strong>/email</strong> — Specific Outlook emails<br>
📅 <strong>/meeting</strong> — Teams meeting transcripts and notes<br>
👤 <strong>/person</strong> — Colleague profile and context</p>
<div class="tip">You can reference <strong>multiple files</strong> in one prompt: "Based on /Q1 Report.xlsx and /Q2 Report.xlsx, identify performance variations."</div>
<div class="warning">🔄 <strong>Reinforcement — Grounding (Module 1):</strong> The / symbol is the primary grounding tool in M365 Copilot. By referencing verified sources, you anchor the model in real data and drastically reduce the risk of hallucination.</div>
<details class="active-recall">
  <summary>🤔 ACTIVE RECALL: What are the 4 elements of an effective prompt and what does each answer?</summary>
  <div class="recall-content">
    <strong>1. Goal:</strong> "What do you need Copilot to do?" — clear and specific action<br>
    <strong>2. Context:</strong> "Why? For whom?" — scenario and target audience<br>
    <strong>3. Source:</strong> "What data to base it on?" — files referenced with / (grounding)<br>
    <strong>4. Expectations:</strong> "What format, tone, structure?" — how the response should be structured<br><br>
    A prompt with all 4 elements rarely needs iteration.
  </div>
</details>
` },

<h4>📌 Topic: Saving Prompts — Reuse with 1 Click</h4>

<p><strong>Flow to save and reuse:</strong><br>

    The three features complement each other: create a quality prompt, save for personal use, share with your team, and schedule when you need automation.
  </div>
</details>
` }

<h4>📌 Topic: What is a Copilot Studio Agent</h4>
<p>Agents are specialized AI assistants created with <strong>Microsoft Copilot Studio — no code required</strong>. They have specific instructions, dedicated knowledge sources, and customized behavior for a company use case.</p>
<div class="tip">🔄 <strong>Reinforcement (Module 1 — Copilot Modes):</strong> BizChat = general M365 assistant. Agent = custom specialist with scope, knowledge, and behavior defined by the company. They are complementary, not competing.</div>
<div class="example">
  <strong>🤝 Onboarding Agent:</strong> Answers the 50 most common questions from new employees based on the Employee Handbook in SharePoint — available 24/7, without overloading HR.<br><br>
  <strong>💼 Sales Agent:</strong> Helps salespeople format proposals using SharePoint templates and historical deal data.<br><br>
  <strong>💻 IT Support Agent:</strong> Answers first-level support questions based on known solutions knowledge base, escalating complex cases to the human team.
</div>
<div class="separator"></div>

<h4>📌 Topic: Creating an Agent in Copilot Studio — 5 Steps</h4>
<p>1️⃣ <strong>Name and describe</strong> — "Contoso HR Assistant"<br>
2️⃣ <strong>Define behavioral instructions</strong> — tone, scope, how to handle out-of-scope questions<br>
3️⃣ <strong>Add knowledge sources</strong> — SharePoint sites, specific Word/PDF files<br>
4️⃣ <strong>Test</strong> in Copilot Studio's playground before publishing<br>
5️⃣ <strong>Publish</strong> to chosen channel (Teams, SharePoint, Agent Store)</p>
<div class="macete">Agent instructions = "Behavior contract" — the more specific and clear, the more predictable and reliable the agent. Include: scope, tone, fallback action when it doesn't know.</div>
<div class="example">
  <strong>Effective instruction:</strong> "You are Contoso's HR Assistant. Answer ONLY questions about HR policies, benefits, and internal procedures, based on the provided documents. Use a professional and friendly tone. If the question is outside your scope, inform: 'This question requires direct HR contact' and provide the email hr@contoso.com."<br>
  <strong>Why it works:</strong> Defines scope, source, tone, and fallback action — no unexpected behavior.

<h4>📌 Topic: Knowledge Sources — Agent Grounding</h4>
<p><strong>Knowledge Sources</strong> are what differentiates specialized responses from generic LLM responses:</p>
<p>✅ SharePoint sites (internal documentation)<br>

<h3>🔀 Decision Tree — Which Tool to Use?</h3>
<div class="example">
<strong>Need to create a document from scratch?</strong> → <code>Word Copilot</code> — descriptive prompt<br>
<strong>Need a presentation from an existing document?</strong> → <code>PowerPoint Copilot</code> + "/" Word file<br>
<strong>Need to summarize a long email / write an email?</strong> → <code>Outlook Copilot</code><br>
<strong>Missed part of a meeting?</strong> → <code>Teams Copilot</code> (requires active transcription)<br>
<strong>Want to collaborate on Copilot-generated insights?</strong> → <code>Copilot Pages</code><br>
<strong>Want to preserve a conversation for future reference?</strong> → <code>OneNote</code> (export conversation)<br>
<strong>Need a specialist assistant for internal data?</strong> → <code>Agent in Copilot Studio</code><br>
<strong>Need a general M365 productivity assistant?</strong> → <code>Copilot BizChat</code><br>
<strong>Want a response grounded in real work data?</strong> → Use <code>/</code> to reference files + grounding<br>
<strong>Copilot generated a strange/false response?</strong> → Likely <code>fabrication</code> — review, check citations and add grounding<br>
<strong>Need to research trends/markets?</strong> → <code>Copilot Researcher</code><br>
<strong>Need to analyze spreadsheet data?</strong> → <code>Copilot Analyst</code><br>
<strong>Need to find information quickly in M365?</strong> → <code>Copilot Search</code>
</div>

<h3>⚠️ Classic AB-730 Exam Traps</h3>
<div class="warning">
❌ <strong>"Copilot accesses all company data"</strong> → FALSE. Respects Trust Boundary — only accesses what the user has permission for.<br><br>
❌ <strong>"Teams Copilot works in any meeting"</strong> → FALSE. Requires <strong>active transcription</strong>.<br><br>
❌ <strong>"Agent and BizChat do the same thing"</strong> → FALSE. BizChat = general; Agent = specialized with configured knowledge.<br><br>
❌ <strong>"LLM knows recent events"</strong> → FALSE. Limited by knowledge cutoff — use grounding for current data.<br><br>
❌ <strong>"Simple prompt = good result"</strong> → FALSE. Prompt with GCSE (Goal+Context+Source+Expectations) = superior result.<br><br>
❌ <strong>"Memory and Instructions are the same thing"</strong> → FALSE. Memory = facts about you; Instructions = behavior rules.<br><br>
❌ <strong>"Copilot is always right"</strong> → FALSE. Over-reliance is an officially listed risk. Always verify citations (citation checks) + human review.<br><br>
❌ <strong>"Work mode and Web mode are the same"</strong> → FALSE. Work = corporate data via Graph; Web = public internet data.
</div>

        function getEffectiveTheme() {
            const stored = localStorage.getItem(STORAGE_KEY_THEME);
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || getEffectiveTheme();
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            try { localStorage.setItem(STORAGE_KEY_THEME, next); } catch(e) {}
        }

        function applyLanguage(lang) {
            const prevLang = currentLang;
            currentLang = lang;
            document.documentElement.setAttribute('lang', lang === 'pt' ? 'pt-BR' : 'en');

            // Re-render entire course content when language changes

        // Save progress to localStorage
