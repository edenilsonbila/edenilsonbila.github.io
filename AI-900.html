                    return;
                }
                let lessonsHTML = '';
                module.lessons.forEach((lesson, lessonIndex) => {
                    const lessonId = `${moduleIndex}-${lessonIndex}`;
                    lessonsHTML += `
                        <div class="lesson">
                            <div class="lesson-header"><h3>${lesson.title}</h3></div>
                            ${lesson.content}
                            <div class="separator"></div>
                            <div style="text-align:center;margin-top:32px">
                                <button class="mark-complete" data-lesson="${lessonId}" data-i18n="markComplete" onclick="toggleLesson('${lessonId}')">✓ Marcar como completo</button>
                            </div>
                        </div>`;
                });
                let exercisesHTML = '';
                if (module.exercises && module.exercises.length > 0) {
                    exercisesHTML = `<div class="exercises"><h3 data-i18n="exercises">✏️ Exercícios — ${module.title}</h3><div class="separator"></div>`;
                    module.exercises.forEach((exercise, exerciseIndex) => {
                        if (!exercise || !exercise.options) return;
                        const questionId = `${moduleIndex}-${exerciseIndex}`;
                        exercisesHTML += `<div class="exercise-card" id="card-${questionId}"><div class="question">${exerciseIndex + 1}. ${exercise.question}</div><ul class="options">`;
                        exercise.options.forEach((option, optionIndex) => {
                            exercisesHTML += `<li class="option" onclick="selectOption('${questionId}', ${optionIndex})"><input type="radio" name="q-${questionId}" value="${optionIndex}" id="opt-${questionId}-${optionIndex}"><label for="opt-${questionId}-${optionIndex}">${option}</label></li>`;
                        });
                        exercisesHTML += `</ul><div class="explanation" id="exp-${questionId}">${exercise.explanation}</div></div>`;
                    });
                    exercisesHTML += `<button class="check-answers-btn" onclick="checkAnswers(${moduleIndex})" data-i18n="checkAnswers">Verificar Respostas</button><div class="score" id="score-${moduleIndex}"></div></div>`;
                }
                moduleDiv.innerHTML = lessonsHTML + exercisesHTML;
                modulesContainer.appendChild(moduleDiv);
            });
            document.getElementById('totalLessons').textContent = courseData.modules.reduce((s, m) => s + m.lessons.length, 0);
        }

        function loadModule(index, skipScroll = false) {
            document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
            document.querySelectorAll('.module').forEach((mod, i) => mod.classList.toggle('active', i === index));
            currentModule = index;
            updateNavButtons();
            updateProgress();
            saveProgress();
            if (!skipScroll) { window.scrollTo({ top: 0, behavior: 'smooth' }); saveScrollPosition(); }
        }

        function navigateModule(direction) {
            if (direction === 1) {
                const module = courseData.modules[currentModule];
                const hasExercises = module.exercises && module.exercises.length > 0;
                const scoreDiv = document.getElementById(`score-${currentModule}`);
                const exercisesChecked = scoreDiv && scoreDiv.classList.contains('show');
                if (hasExercises && !exercisesChecked) {
                    if (!confirm(translations[currentLang].skipExercisesConfirm)) return;
                }
                autoCompleteModule(currentModule);
            }
            const n = currentModule + direction;
            if (n >= 0 && n < courseData.modules.length) { saveScrollPosition(); loadModule(n); }
        }

        function autoCompleteModule(moduleIndex) {
            const t = translations[currentLang];
            const module = courseData.modules[moduleIndex];
            module.lessons.forEach((_, lessonIndex) => {
                const lessonId = `${moduleIndex}-${lessonIndex}`;
                if (!completedLessons.has(lessonId)) {
                    completedLessons.add(lessonId);
                    const button = document.querySelector(`[data-lesson="${lessonId}"]`);
                    if (button) { button.classList.add('completed'); button.textContent = t.completed; }
                }
            });
            checkModuleCompletion();
            updateProgress();
            saveProgress();
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentModule === 0;
            document.getElementById('nextBtn').disabled = currentModule === courseData.modules.length - 1;
        }

        function toggleLesson(lessonId) {
            const t = translations[currentLang];
            const button = document.querySelector(`[data-lesson="${lessonId}"]`);
            if (completedLessons.has(lessonId)) {
                completedLessons.delete(lessonId);
                button.classList.remove('completed');
                button.textContent = t.markComplete;
            } else {
                completedLessons.add(lessonId);
                button.classList.add('completed');
                button.textContent = t.completed;
            }
            updateProgress(); checkModuleCompletion(); saveProgress();
        }

        function restoreCompletedButtons() {
            const t = translations[currentLang];
            completedLessons.forEach(lessonId => {
                const button = document.querySelector(`[data-lesson="${lessonId}"]`);
                if (button) { button.classList.add('completed'); button.textContent = t.completed; }
            });
        }

        function restoreSelectedAnswers() {
            Object.keys(selectedAnswers).forEach(questionId => {
                const optionIndex = selectedAnswers[questionId];
                const card = document.getElementById(`card-${questionId}`);
                if (card) {
                    card.querySelectorAll('.option').forEach((opt, i) => { if (i === optionIndex) opt.classList.add('selected'); });
                    const radio = document.getElementById(`opt-${questionId}-${optionIndex}`);
                    if (radio) radio.checked = true;
                }
            });
        }

        function checkModuleCompletion() {
            courseData.modules.forEach((module, moduleIndex) => {
                const allCompleted = module.lessons.every((_, li) => completedLessons.has(`${moduleIndex}-${li}`));
                const tab = document.querySelectorAll('.tab')[moduleIndex];
                if (tab) tab.classList.toggle('completed', allCompleted);
            });
        }

        function updateProgress() {
            const t = translations[currentLang];
            const totalLessons = courseData.modules.reduce((s, m) => s + m.lessons.length, 0);
            const completed = completedLessons.size;
            const pct = totalLessons > 0 ? (completed / totalLessons * 100).toFixed(0) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '% ' + t.progressComplete;
            document.getElementById('lessonsCompleted').textContent = completed;
        }

        function selectOption(questionId, optionIndex) {
            selectedAnswers[questionId] = optionIndex;
            const card = document.getElementById(`card-${questionId}`);
            card.querySelectorAll('.option').forEach((opt, i) => opt.classList.toggle('selected', i === optionIndex));
            document.getElementById(`opt-${questionId}-${optionIndex}`).checked = true;
            saveProgress();
        }

        function checkAnswers(moduleIndex) {
            const t = translations[currentLang];
            const module = courseData.modules[moduleIndex];
            let correct = 0;
            module.exercises.forEach((exercise, exerciseIndex) => {
                const questionId = `${moduleIndex}-${exerciseIndex}`;
                const card = document.getElementById(`card-${questionId}`);
                const explanation = document.getElementById(`exp-${questionId}`);
                const userAnswer = selectedAnswers[questionId];
                if (userAnswer !== undefined) {
                    const isCorrect = userAnswer === exercise.correct;
                    if (isCorrect) { correct++; card.classList.add('correct'); card.classList.remove('incorrect'); }
                    else { card.classList.add('incorrect'); card.classList.remove('correct'); }
                    explanation.classList.add('show');
                    card.querySelectorAll('.option').forEach((opt, i) => {
                        if (i === exercise.correct) opt.classList.add('correct');
                        else if (i === userAnswer && !isCorrect) opt.classList.add('incorrect');
                    });
                }
            });
            const total = module.exercises.length;
            const pct = (correct / total * 100).toFixed(0);
            const scoreDiv = document.getElementById(`score-${moduleIndex}`);
            scoreDiv.innerHTML = `<strong>${t.resultLabel}: ${correct}/${total} ${t.correct} (${pct}%)</strong><br>${pct >= 70 ? t.congratulations : t.tryAgain}`;
            scoreDiv.classList.add('show');
            autoCompleteModule(moduleIndex);
            scoreDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ============================================================
        // SIMULADO FINAL — EXAM ENGINE
        // ============================================================
        let examState = { started: false, finished: false, currentQ: 0, answers: {}, flagged: new Set(), shuffledOrder: [], startTime: null, elapsedSeconds: 0, autoSubmitted: false };
        let examTimerInterval = null;

        function saveExamState() { try { localStorage.setItem(SIM_STORAGE_KEY, JSON.stringify({ ...examState, flagged: [...examState.flagged] })); } catch(e) {} }
        function loadExamState() { try { const r = localStorage.getItem(SIM_STORAGE_KEY); if (!r) return false; const s = JSON.parse(r); examState = { ...s, flagged: new Set(s.flagged || []) }; return true; } catch(e) { return false; } }
        function clearExamState() { try { localStorage.removeItem(SIM_STORAGE_KEY); } catch(e) {} examState = { started: false, finished: false, currentQ: 0, answers: {}, flagged: new Set(), shuffledOrder: [], startTime: null, elapsedSeconds: 0, autoSubmitted: false }; }

        function initSimuladoModule(moduleDiv) {
            moduleDiv.innerHTML = `<div class="simulado-container"><div class="sim-screen sim-intro active" id="sim-screen-intro"></div><div class="sim-screen sim-exam" id="sim-screen-exam"></div><div class="sim-screen sim-results" id="sim-screen-results"></div></div>`;
            renderSimIntro(moduleDiv);
            const hasState = loadExamState();
            if (hasState && examState.started && !examState.finished) {
                try { renderExamScreen(); showSimScreen('exam'); renderExamQuestion(examState.currentQ); updateExamNavGrid(); startExamTimer(); } catch(e) { clearExamState(); showSimScreen('intro'); }
            } else if (hasState && examState.finished) {
                try { renderExamResults(); showSimScreen('results'); } catch(e) { clearExamState(); showSimScreen('intro'); }
            }
        }

        function showSimScreen(name) {
            ['intro','exam','results'].forEach(n => { const el = document.getElementById(`sim-screen-${n}`); if (el) el.classList.toggle('active', n === name); });
        }

        function renderSimIntro() {
            const t = translations[currentLang];
            const el = document.getElementById('sim-screen-intro');
            if (!el) return;
            const domainsHTML = SIMULADO_DOMAINS.map(d => `<div class="sim-domain-item"><div class="sim-domain-dot" style="background:${d.color}"></div><span class="sim-domain-name">${d.icon} ${d[currentLang] || d.pt}</span><span class="sim-domain-weight">${d.weight}</span></div>`).join('');
            const instrHTML = (t.sim_instructions || []).map(i => `<li>${i}</li>`).join('');
            el.innerHTML = `
                <div class="sim-intro-hero">
                    <h2>🎯 ${t.sim_title}</h2>
                    <p>${t.sim_subtitle}</p>
                </div>
                <div class="sim-meta-grid">
                    <div class="sim-meta-item"><div class="sim-meta-icon">⏱️</div><div class="sim-meta-value">${SIMULADO_CONFIG.timeLimit}</div><div class="sim-meta-label">${t.sim_meta_min}</div></div>
                    <div class="sim-meta-item"><div class="sim-meta-icon">📝</div><div class="sim-meta-value">${SIMULADO_CONFIG.questionCount}</div><div class="sim-meta-label">${t.sim_meta_questions}</div></div>
                    <div class="sim-meta-item"><div class="sim-meta-icon">🎯</div><div class="sim-meta-value">${SIMULADO_CONFIG.passScore}</div><div class="sim-meta-label">${t.sim_meta_pass}</div></div>
                    <div class="sim-meta-item"><div class="sim-meta-icon">📊</div><div class="sim-meta-value">${SIMULADO_CONFIG.totalScore}</div><div class="sim-meta-label">${t.sim_meta_score}</div></div>
                </div>
                <div class="sim-domains-list">${domainsHTML}</div>
                <div class="sim-instructions"><strong>${t.sim_instructions_title}</strong><ul style="margin-top:10px">${instrHTML}</ul></div>
                <button class="sim-start-btn" onclick="startExam()">${t.sim_start}</button>`;
        }

        function startExam() {
            clearExamState();
            const order = SIMULADO_QUESTIONS.map((_, i) => i);
            for (let i = order.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [order[i], order[j]] = [order[j], order[i]]; }
            examState.started = true; examState.shuffledOrder = order; examState.currentQ = 0; examState.startTime = Date.now();
            saveExamState(); renderExamScreen(); renderExamQuestion(0); updateExamNavGrid(); startExamTimer(); showSimScreen('exam');
        }

        function renderExamScreen() {
            const t = translations[currentLang];
            const navBtns = examState.shuffledOrder.map((_, i) => `<button class="sim-nav-btn" id="sim-navbtn-${i}" onclick="jumpToQuestion(${i})">${i+1}</button>`).join('');
            document.getElementById('sim-screen-exam').innerHTML = `
                <div class="sim-timer-bar"><div class="sim-timer-fill" id="sim-timer-fill" style="width:100%"></div></div>
                <div class="sim-exam-header">
                    <div class="sim-timer" id="sim-timer-display">${SIMULADO_CONFIG.timeLimit}:00</div>
                    <div class="sim-q-counter" id="sim-q-counter">${t.sim_q_label} 1 ${t.sim_q_of} ${SIMULADO_CONFIG.questionCount}</div>
                    <button class="sim-flag-btn" id="sim-flag-btn" onclick="flagCurrentQuestion()">${t.sim_flag}</button>
                </div>
                <div id="sim-question-area" class="sim-question-area"></div>
                <div class="sim-exam-nav">
                    <button class="sim-nav-prev" id="sim-prev-btn" onclick="navigateExam(-1)">${t.sim_prev}</button>
                    <button class="sim-submit-btn" onclick="confirmSubmitExam()">${t.sim_submit}</button>
                    <button class="sim-nav-next" id="sim-next-btn" onclick="navigateExam(1)">${t.sim_next}</button>
                </div>
                <div class="sim-nav-section" style="margin-top:24px">
                    <div class="sim-nav-label">Navegação</div>
                    <div class="sim-nav-grid" id="sim-nav-grid">${navBtns}</div>
                </div>`;
        }

        function renderExamQuestion(qi) {
            examState.currentQ = qi; saveExamState();
            const t = translations[currentLang];
            const realIdx = examState.shuffledOrder[qi];
            const q = SIMULADO_QUESTIONS[realIdx];
            const area = document.getElementById('sim-question-area');
            if (!area) return;
            updateExamNavGrid();
            const counter = document.getElementById('sim-q-counter');
            if (counter) counter.textContent = `${t.sim_q_label} ${qi+1} ${t.sim_q_of} ${SIMULADO_CONFIG.questionCount}`;
            const flagBtn = document.getElementById('sim-flag-btn');
            if (flagBtn) { const fl = examState.flagged.has(qi); flagBtn.textContent = fl ? t.sim_unflag : t.sim_flag; flagBtn.classList.toggle('flagged', fl); }
            const prevBtn = document.getElementById('sim-prev-btn'); const nextBtn = document.getElementById('sim-next-btn');
            if (prevBtn) prevBtn.disabled = qi === 0;
            if (nextBtn) nextBtn.disabled = qi === examState.shuffledOrder.length - 1;
            const typeLabels = { single: t.sim_type_single, multi: t.sim_type_multi, match: t.sim_type_match, order: t.sim_type_order, categorize: t.sim_type_categorize };
            const typeBadge = `<div class="sim-question-type-badge">📋 ${typeLabels[q.type] || q.type} &nbsp;·&nbsp; ${SIMULADO_DOMAINS[q.domain][currentLang] || SIMULADO_DOMAINS[q.domain].pt}</div>`;
            const scenarioHTML = q.scenario ? `<div class="sim-scenario">${q.scenario}</div>` : '';
            if (q.type === 'single' || q.type === 'multi') {
                const currentAns = examState.answers[qi];
                const multiHint = q.type === 'multi' ? `<div class="sim-multi-hint">${typeof t.sim_multi_select_hint === 'function' ? t.sim_multi_select_hint(Array.isArray(q.correct) ? q.correct.length : 2) : 'Select answers'}</div>` : '';
                const inputType = q.type === 'multi' ? 'checkbox' : 'radio';
                const optionsHTML = q.options.map((opt, oi) => {
                    let isChecked = q.type === 'single' ? currentAns === oi : (Array.isArray(currentAns) && currentAns.includes(oi));
                    return `<li class="sim-option ${isChecked?'selected':''}" onclick="selectExamOption(${oi})"><input type="${inputType}" id="sim-opt-${oi}" name="sim-q" value="${oi}" ${isChecked?'checked':''} style="pointer-events:none"><label for="sim-opt-${oi}">${opt}</label></li>`;
                }).join('');
                area.innerHTML = `${typeBadge}${scenarioHTML}<div class="sim-q-text">${qi+1}. ${q.question}</div>${multiHint}<ul class="sim-options">${optionsHTML}</ul>`;
            } else if (q.type === 'match') { renderMatchQuestion(qi, q, area, typeBadge, scenarioHTML);
            } else if (q.type === 'order') { renderOrderQuestion(qi, q, area, typeBadge, scenarioHTML);
            } else if (q.type === 'categorize') { renderCategorizeQuestion(qi, q, area, typeBadge, scenarioHTML); }
        }

        function selectExamOption(oi) {
            const qi = examState.currentQ; const realIdx = examState.shuffledOrder[qi]; const q = SIMULADO_QUESTIONS[realIdx];
            if (q.type === 'single') {
                examState.answers[qi] = oi;
                document.querySelectorAll('.sim-option').forEach((el, i) => { el.classList.toggle('selected', i === oi); const inp = el.querySelector('input'); if (inp) inp.checked = i === oi; });
            } else {
                let arr = Array.isArray(examState.answers[qi]) ? [...examState.answers[qi]] : [];
                const idx = arr.indexOf(oi); if (idx >= 0) arr.splice(idx, 1); else arr.push(oi);
                examState.answers[qi] = arr;
                document.querySelectorAll('.sim-option').forEach((el, i) => { el.classList.toggle('selected', arr.includes(i)); const inp = el.querySelector('input'); if (inp) inp.checked = arr.includes(i); });
            }
            updateExamNavGrid(); saveExamState();
        }

        function flagCurrentQuestion() {
            const qi = examState.currentQ; const t = translations[currentLang];
            if (examState.flagged.has(qi)) examState.flagged.delete(qi); else examState.flagged.add(qi);
            const flagBtn = document.getElementById('sim-flag-btn');
            if (flagBtn) { const fl = examState.flagged.has(qi); flagBtn.textContent = fl ? t.sim_unflag : t.sim_flag; flagBtn.classList.toggle('flagged', fl); }
            updateExamNavGrid(); saveExamState();
        }

        function navigateExam(dir) { const n = examState.currentQ + dir; if (n >= 0 && n < examState.shuffledOrder.length) renderExamQuestion(n); }
        function jumpToQuestion(qi) { renderExamQuestion(qi); }

        function updateExamNavGrid() {
            examState.shuffledOrder.forEach((_, i) => {
                const btn = document.getElementById(`sim-navbtn-${i}`); if (!btn) return;
                btn.className = 'sim-nav-btn';
                const ans = examState.answers[i]; const hasAnswer = ans !== undefined && ans !== null && !(Array.isArray(ans) && ans.length === 0);
                if (hasAnswer) btn.classList.add('answered');
                if (examState.flagged.has(i)) btn.classList.add('flagged');
                if (i === examState.currentQ) btn.classList.add('current');
            });
        }

        function startExamTimer() {
            if (examTimerInterval) clearInterval(examTimerInterval);
            examTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - examState.startTime) / 1000) + (examState.elapsedSeconds || 0);
                const remaining = SIMULADO_CONFIG.timeLimit * 60 - elapsed;
                if (remaining <= 0) { clearInterval(examTimerInterval); examState.autoSubmitted = true; alert(translations[currentLang].sim_time_up); finishExam(); return; }
                const mm = String(Math.floor(remaining / 60)).padStart(2, '0'); const ss = String(remaining % 60).padStart(2, '0');
                const display = document.getElementById('sim-timer-display'); const fill = document.getElementById('sim-timer-fill');
                const pct = (remaining / (SIMULADO_CONFIG.timeLimit * 60)) * 100; const isWarn = remaining <= 300;
                if (display) { display.textContent = `${mm}:${ss}`; display.classList.toggle('warning', isWarn); }
                if (fill) { fill.style.width = pct + '%'; fill.classList.toggle('warning', isWarn); }
            }, 1000);
        }

        function confirmSubmitExam() { if (confirm(translations[currentLang].sim_submit_confirm)) finishExam(); }
        function finishExam() { if (examTimerInterval) clearInterval(examTimerInterval); examState.finished = true; examState.elapsedSeconds = Math.floor((Date.now() - examState.startTime) / 1000); saveExamState(); renderExamResults(); showSimScreen('results'); }

        function isAnswerCorrect(q, ans) {
            if (ans === undefined || ans === null) return false;
            if (q.type === 'single') return ans === q.correct;
            if (q.type === 'multi') { if (!Array.isArray(ans) || !Array.isArray(q.correct)) return false; return ans.length === q.correct.length && q.correct.every(c => ans.includes(c)); }
            if (q.type === 'match') { if (!ans || typeof ans !== 'object') return false; return q.pairs.every(p => ans[p.id] === p.id); }
            if (q.type === 'order') { if (!Array.isArray(ans)) return false; return JSON.stringify(ans) === JSON.stringify(q.correctOrder); }
            if (q.type === 'categorize') { if (!ans || typeof ans !== 'object') return false; return q.items.every(item => ans[item.id] === item.correctCategory); }
            return false;
        }

        function calculateExamResults() {
            let domainStats = SIMULADO_DOMAINS.map(d => ({ id: d.id, correct: 0, total: 0 }));
            let totalCorrect = 0;
            examState.shuffledOrder.forEach((realIdx, qi) => {
                const q = SIMULADO_QUESTIONS[realIdx]; const ans = examState.answers[qi];
                domainStats[q.domain].total++;
                if (isAnswerCorrect(q, ans)) { domainStats[q.domain].correct++; totalCorrect++; }
            });
            const scaledScore = Math.max(100, Math.round((totalCorrect / SIMULADO_CONFIG.questionCount) * SIMULADO_CONFIG.totalScore));
            return { domainStats, totalCorrect, totalQ: SIMULADO_CONFIG.questionCount, scaledScore };
        }

        function renderExamResults() {
            const t = translations[currentLang];
            const { domainStats, totalCorrect, totalQ, scaledScore } = calculateExamResults();
            const passed = scaledScore >= SIMULADO_CONFIG.passScore;
            const totalSec = examState.elapsedSeconds || 0;
            const mm = String(Math.floor(totalSec / 60)).padStart(2, '0'); const ss = String(totalSec % 60).padStart(2, '0');
            const skipped = examState.shuffledOrder.filter((_, qi) => { const a = examState.answers[qi]; return a === undefined || a === null || (Array.isArray(a) && a.length === 0); }).length;
            const domainsHTML = domainStats.map((ds, i) => {
                const d = SIMULADO_DOMAINS[i]; const pct = ds.total > 0 ? Math.round((ds.correct / ds.total) * 100) : 0;
                let verdict, vClass;
                if (pct >= 85) { verdict = t.sim_verdict_excellent; vClass = 'good'; }
                else if (pct >= 70) { verdict = t.sim_verdict_good; vClass = 'good'; }
                else if (pct >= 50) { verdict = t.sim_verdict_improve; vClass = 'ok'; }
                else { verdict = t.sim_verdict_critical; vClass = 'bad'; }
                return `<div class="sim-domain-row"><div class="sim-domain-row-header"><div class="sim-domain-row-name"><span style="color:${d.color}">${d.icon}</span> ${d[currentLang]||d.pt} <small style="color:var(--text-muted);font-weight:400">(${d.weight})</small></div><div class="sim-domain-row-pct">${ds.correct}/${ds.total}</div></div><div class="sim-domain-bar-bg"><div class="sim-domain-bar-fill" style="width:${pct}%;background:${d.color}"></div></div><div class="sim-domain-verdict ${vClass}">${verdict} — ${pct}%</div></div>`;
            }).join('');
            const recsHTML = domainStats.map((ds, i) => {
                const d = SIMULADO_DOMAINS[i]; const pct = ds.total > 0 ? Math.round((ds.correct / ds.total) * 100) : 0;
                if (pct >= 70) return `<div class="sim-rec-item ok"><div class="sim-rec-icon">✅</div><div class="sim-rec-text"><strong>${d[currentLang]||d.pt}</strong> — Bom desempenho! Continue revisando.</div></div>`;
                return `<div class="sim-rec-item"><div class="sim-rec-icon">📖</div><div class="sim-rec-text"><strong>${d[currentLang]||d.pt}</strong> — ${pct}% de acerto. Revise o módulo correspondente.</div></div>`;
            }).join('');
            document.getElementById('sim-screen-results').innerHTML = `
                <div class="sim-report-hero ${passed?'pass':'fail'}">
                    <div class="sim-score-value">${scaledScore}</div>
                    <div class="sim-score-max">/ ${SIMULADO_CONFIG.totalScore}</div>
                    <div class="sim-pass-badge ${passed?'pass':'fail'}">${passed ? t.sim_pass : t.sim_fail}</div>
                    <div class="sim-report-stats">
                        <span class="sim-report-stat">${t.sim_correct_count}: <span>${totalCorrect}</span></span> &nbsp;·&nbsp;
                        <span class="sim-report-stat">${t.sim_wrong_count}: <span>${totalQ - totalCorrect - skipped}</span></span> &nbsp;·&nbsp;
                        <span class="sim-report-stat">${t.sim_skipped_count}: <span>${skipped}</span></span> &nbsp;·&nbsp;
                        <span class="sim-report-stat">${t.sim_time_taken}: <span>${mm}:${ss}</span></span>
                    </div>
                    <div style="color:rgba(255,255,255,0.7);font-size:0.85em;margin-top:12px">${t.sim_pass_score}</div>
                </div>
                <div class="sim-domain-chart"><h3>${t.sim_domain_chart_title}</h3><p class="sim-domain-chart-subtitle">${t.sim_domain_chart_sub}</p>${domainsHTML}<p class="sim-domain-passing-note">${t.sim_domain_passing_note}</p></div>
                <div class="sim-recommendations"><h3>${t.sim_rec_title}</h3>${recsHTML}</div>
                <div class="sim-report-actions">
                    <button class="sim-review-btn" onclick="showExamReview('all')">${t.sim_review_btn}</button>
                    <button class="sim-retry-btn" onclick="resetExam()">${t.sim_retry_btn}</button>
                </div>`;
        }

        function showExamReview(filter) {
            const t = translations[currentLang];
            const filters = [
                { key: 'all', label: t.sim_filter_all }, { key: 'correct', label: t.sim_filter_correct },
                { key: 'wrong', label: t.sim_filter_wrong }, { key: 'skipped', label: t.sim_filter_skipped }
            ];
            const filterBtns = filters.map(f => `<button class="sim-filter-btn ${filter===f.key?'active':''}" onclick="showExamReview('${f.key}')">${f.label}</button>`).join('');
            const cards = examState.shuffledOrder.map((realIdx, qi) => {
                const q = SIMULADO_QUESTIONS[realIdx]; const ans = examState.answers[qi];
                const correct = isAnswerCorrect(q, ans); const skipped = ans === undefined || ans === null || (Array.isArray(ans) && ans.length === 0);
                if (filter === 'correct' && !correct) return '';
                if (filter === 'wrong' && (correct || skipped)) return '';
                if (filter === 'skipped' && !skipped) return '';
                const cardClass = skipped ? 'skipped' : (correct ? 'correct' : 'incorrect');
                const numClass = skipped ? 'skipped' : (correct ? 'correct' : 'incorrect');
                const domainName = SIMULADO_DOMAINS[q.domain][currentLang] || SIMULADO_DOMAINS[q.domain].pt;
                const scenarioHTML = q.scenario ? `<div class="sim-scenario" style="margin-bottom:12px">${q.scenario}</div>` : '';
                let answerHTML = '';
                if (q.type === 'single' || q.type === 'multi') {
                    answerHTML = `<div class="sim-review-options">${q.options.map((opt, oi) => {
                        const correctArr = Array.isArray(q.correct) ? q.correct : [q.correct];
                        const userArr = Array.isArray(ans) ? ans : (ans !== undefined ? [ans] : []);
                        const isCorr = correctArr.includes(oi); const isUser = userArr.includes(oi);
                        let cls = '', icon = '';
                        if (isUser && isCorr) { cls = 'user-correct'; icon = '✅'; }
                        else if (isUser && !isCorr) { cls = 'user-wrong'; icon = '❌'; }
                        else if (!isUser && isCorr) { cls = 'missed-correct'; icon = '✓'; }
                        return `<div class="sim-review-option ${cls}"><span class="sim-review-option-icon">${icon||'○'}</span>${opt}</div>`;
                    }).join('')}</div>`;
                } else {
                    let correctText = '', userText = '';
                    if (q.type === 'match') {
                        correctText = q.pairs.map(p => `${p.source} → ${p.target}`).join('<br>');
                        if (!skipped && ans && typeof ans === 'object') {
                            userText = q.pairs.map(p => { const placedId = ans[p.id]; const ps = placedId !== undefined ? q.pairs.find(x => x.id === placedId)?.source : null; const icon = placedId === p.id ? '✅' : '❌'; return `${icon} ${ps||'<em>vazio</em>'} → ${p.target}`; }).join('<br>');
                        }
                    }
                    if (q.type === 'order') {
                        correctText = q.items.slice().sort((a,b) => q.correctOrder.indexOf(a.id) - q.correctOrder.indexOf(b.id)).map((item,i) => `${i+1}. ${item.text}`).join('<br>');
                        if (!skipped && Array.isArray(ans)) userText = ans.map((id,i) => { const item = q.items.find(it=>it.id===id); return `${q.correctOrder[i]===id?'✅':'❌'} ${i+1}. ${item?item.text:'?'}`; }).join('<br>');
                    }
                    if (q.type === 'categorize') {
                        correctText = q.items.map(item => { const cat = q.categories.find(c=>c.id===item.correctCategory); return `${item.text} → ${cat?cat.label:'?'}`; }).join('<br>');
                        if (!skipped && ans && typeof ans === 'object') userText = q.items.map(item => { const ucid = ans[item.id]; const uc = ucid ? q.categories.find(c=>c.id===ucid) : null; const isC = ucid===item.correctCategory; return `${isC?'✅':(uc?'❌':'⬜')} ${item.text} → ${uc?uc.label:'<em>não classificado</em>'}`; }).join('<br>');
                    }
                    const userBlock = skipped
                        ? `<div class="sim-review-drag-answer"><strong>${t.sim_skipped_label}</strong></div>`
                        : `<div class="sim-review-drag-answer ${correct?'correct':'incorrect'}"><strong>${correct ? t.sim_answer_correct : t.sim_answer_wrong}</strong>${userText?`<div style="margin-top:8px;line-height:1.8">${userText}</div>`:''}</div>`;
                    answerHTML = `${userBlock}${!correct && !skipped ? `<div class="sim-review-drag-answer correct"><strong>${t.sim_correct_answer}</strong><div style="margin-top:8px;line-height:1.8">${correctText}</div></div>` : ''}`;
                }
                return `<div class="sim-review-card ${cardClass}">
                    <div class="sim-review-q-header"><span class="sim-review-q-num ${numClass}">Q${qi+1}</span><div class="sim-review-q-text">${q.question}</div><span class="sim-review-domain-tag">${domainName}</span></div>
                    ${scenarioHTML}${answerHTML}
                    <div class="sim-review-explanation">${q.explanation}</div>
                </div>`;
            }).join('');
            document.getElementById('sim-screen-results').innerHTML = `
                <div class="sim-review-header"><div class="sim-review-title">${t.sim_review_title}</div><div class="sim-review-filters">${filterBtns}</div></div>
                <div style="margin-bottom:16px"><button class="sim-retry-btn" onclick="renderExamResults();showSimScreen('results');">${t.sim_back_results}</button></div>
                ${cards || '<p style="color:var(--text-muted);text-align:center;padding:40px">Nenhuma questão nesta categoria.</p>'}`;
        }

        function resetExam() { if (examTimerInterval) clearInterval(examTimerInterval); clearExamState(); showSimScreen('intro'); renderSimIntro(); }

        // ── Drag Engine ──────────────────────────────────────────────
        function initDragEngine(container, itemSel, dropSel, onDrop) {
            let drag = null;
            function getDropTarget(x, y) { for (const el of container.querySelectorAll(dropSel)) { const r = el.getBoundingClientRect(); if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return el; } return null; }
            container.addEventListener('pointerdown', e => { const item = e.target.closest(itemSel); if (!item) return; e.preventDefault(); item.setPointerCapture(e.pointerId); const rect = item.getBoundingClientRect(); const ghost = item.cloneNode(true); ghost.className = item.className + ' sim-drag-ghost'; ghost.style.cssText = `position:fixed;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;pointer-events:none;`; document.body.appendChild(ghost); drag = { item, ghost, ox: e.clientX - rect.left, oy: e.clientY - rect.top, pid: e.pointerId }; item.classList.add('dragging'); }, { passive: false });
            container.addEventListener('pointermove', e => { if (!drag || e.pointerId !== drag.pid) return; drag.ghost.style.left = (e.clientX - drag.ox) + 'px'; drag.ghost.style.top = (e.clientY - drag.oy) + 'px'; container.querySelectorAll(dropSel).forEach(el => el.classList.remove('over')); const target = getDropTarget(e.clientX, e.clientY); if (target) target.classList.add('over'); });
            container.addEventListener('pointerup', e => { if (!drag || e.pointerId !== drag.pid) return; drag.ghost.remove(); drag.item.classList.remove('dragging'); container.querySelectorAll(dropSel).forEach(el => el.classList.remove('over')); onDrop(drag.item, getDropTarget(e.clientX, e.clientY)); drag = null; });
        }

        function renderMatchQuestion(qi, q, area, typeBadge, scenarioHTML) {
            const t = translations[currentLang]; const saved = examState.answers[qi] || {};
            const shuffledPairs = [...q.pairs].sort(() => Math.random() - 0.5);
            const poolItems = shuffledPairs.map(p => { const placed = Object.values(saved).includes(p.id); return `<div class="sim-match-item ${placed?'placed':''}" data-pair-id="${p.id}">${p.source}</div>`; }).join('');
            const targetRows = q.pairs.map(p => { const placedId = Object.keys(saved).find(k => saved[k] == p.id && k == p.id); const placedSource = placedId ? q.pairs.find(x=>x.id==placedId)?.source : null; const slotContent = placedSource ? `<div class="sim-match-item placed" data-pair-id="${p.id}">${placedSource}</div>` : `<span class="sim-match-slot-placeholder">${t.sim_drag_placeholder}</span>`; return `<div class="sim-match-target-row"><div class="sim-match-target-label">${p.target}</div><div class="sim-match-slot ${placedSource?'filled':''}" data-slot-id="${p.id}">${slotContent}</div></div>`; }).join('');
            area.innerHTML = `${typeBadge}${scenarioHTML}<div class="sim-q-text">${qi+1}. ${q.question}</div><div class="sim-match-container"><div><div class="sim-match-pool-label">${t.sim_drag_source}</div><div class="sim-match-pool" id="sim-match-pool">${poolItems}</div></div><div><div class="sim-match-targets-label">${t.sim_drag_targets}</div><div class="sim-match-targets" id="sim-match-targets">${targetRows}</div></div></div>`;
            const container = area.querySelector('.sim-match-container');
            initDragEngine(container, '.sim-match-item', '.sim-match-slot,.sim-match-pool', (item, target) => {
                const pairId = item.dataset.pairId; const pool = container.querySelector('#sim-match-pool');
                container.querySelectorAll('.sim-match-slot').forEach(slot => { if (slot.contains(item)) { slot.innerHTML = `<span class="sim-match-slot-placeholder">${t.sim_drag_placeholder}</span>`; slot.classList.remove('filled'); } });
                if (pool && pool.contains(item)) pool.removeChild(item);
                if (target && target.classList.contains('sim-match-slot')) { const existing = target.querySelector('.sim-match-item'); if (existing) { existing.classList.remove('placed'); pool.appendChild(existing); } target.innerHTML = ''; item.classList.add('placed'); target.appendChild(item); target.classList.add('filled'); } else { item.classList.remove('placed'); pool.appendChild(item); }
                const ans = {}; container.querySelectorAll('.sim-match-slot').forEach(slot => { const pi = slot.querySelector('.sim-match-item'); if (pi) ans[slot.dataset.slotId] = pi.dataset.pairId; });
                examState.answers[qi] = ans; updateExamNavGrid(); saveExamState();
            });
        }

        function renderOrderQuestion(qi, q, area, typeBadge, scenarioHTML) {
            const t = translations[currentLang]; const saved = examState.answers[qi];
            let currentOrder = (saved && Array.isArray(saved) && saved.length === q.items.length) ? saved.map(id => q.items.find(it => it.id === id)) : [...q.items].sort(() => Math.random() - 0.5);
            const buildList = () => currentOrder.map((item, i) => `<div class="sim-order-item" data-item-id="${item.id}"><span class="sim-order-handle">⠿</span><span class="sim-order-num">${i+1}.</span><span class="sim-order-text">${item.text}</span></div>`).join('');
            area.innerHTML = `${typeBadge}${scenarioHTML}<div class="sim-q-text">${qi+1}. ${q.question}</div><p style="font-size:0.83em;color:var(--text-muted);margin-bottom:12px">${t.sim_order_instruction}</p><div class="sim-order-list" id="sim-order-list">${buildList()}</div>`;
            const list = area.querySelector('#sim-order-list'); let draggingEl = null, placeholder = null;
            function saveOrder() { const ids = [...list.querySelectorAll('.sim-order-item')].map(el => parseInt(el.dataset.itemId)); examState.answers[qi] = ids; updateExamNavGrid(); saveExamState(); list.querySelectorAll('.sim-order-item').forEach((el, i) => { el.querySelector('.sim-order-num').textContent = `${i+1}.`; }); }
            list.addEventListener('pointerdown', e => { draggingEl = e.target.closest('.sim-order-item'); if (!draggingEl) return; e.preventDefault(); draggingEl.setPointerCapture(e.pointerId); draggingEl.classList.add('dragging'); placeholder = document.createElement('div'); placeholder.className = 'sim-order-item'; placeholder.style.opacity = '0'; placeholder.style.height = draggingEl.offsetHeight + 'px'; draggingEl.parentNode.insertBefore(placeholder, draggingEl.nextSibling); }, { passive: false });
            list.addEventListener('pointermove', e => { if (!draggingEl) return; const items = [...list.querySelectorAll('.sim-order-item:not(.dragging)')].filter(el => el !== placeholder); for (const item of items) { const rect = item.getBoundingClientRect(); if (e.clientY < rect.top + rect.height / 2) { list.insertBefore(placeholder, item); break; } else if (item === items[items.length-1]) list.appendChild(placeholder); } });
            list.addEventListener('pointerup', e => { if (!draggingEl) return; draggingEl.classList.remove('dragging'); list.insertBefore(draggingEl, placeholder); placeholder.remove(); draggingEl = null; saveOrder(); });
        }

        function renderCategorizeQuestion(qi, q, area, typeBadge, scenarioHTML) {
            const t = translations[currentLang]; const saved = examState.answers[qi] || {};
            const poolItems = q.items.filter(item => !saved[item.id]).map(item => `<div class="sim-categorize-item" data-item-id="${item.id}">${item.text}</div>`).join('');
            const bucketsHTML = q.categories.map(cat => { const catItems = q.items.filter(item => saved[item.id] === cat.id).map(item => `<div class="sim-categorize-item" data-item-id="${item.id}">${item.text}</div>`).join(''); return `<div class="sim-bucket" data-cat-id="${cat.id}"><div class="sim-bucket-header">${cat.label}</div><div class="sim-bucket-body" data-cat-id="${cat.id}">${catItems}</div></div>`; }).join('');
            area.innerHTML = `${typeBadge}${scenarioHTML}<div class="sim-q-text">${qi+1}. ${q.question}</div><p style="font-size:0.83em;color:var(--text-muted);margin-bottom:12px">${t.sim_categorize_pool_label}</p><div class="sim-categorize-pool" id="sim-cat-pool">${poolItems}</div><div class="sim-categorize-buckets" id="sim-cat-buckets">${bucketsHTML}</div>`;
            function saveCategories() { const ans = {}; area.querySelectorAll('.sim-bucket-body').forEach(body => { body.querySelectorAll('.sim-categorize-item').forEach(item => { ans[item.dataset.itemId] = body.dataset.catId; }); }); examState.answers[qi] = ans; updateExamNavGrid(); saveExamState(); }
            initDragEngine(area, '.sim-categorize-item', '.sim-bucket,.sim-categorize-pool', (item, target) => {
                if (!target) area.querySelector('#sim-cat-pool').appendChild(item);
                else if (target.classList.contains('sim-categorize-pool')) target.appendChild(item);
                else { const body = target.querySelector('.sim-bucket-body') || target; body.appendChild(item); }
                saveCategories();
            });
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
