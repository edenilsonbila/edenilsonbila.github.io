    <title>Minicurso {CERT_CODE}: {CERT_FULL_NAME}</title>
    <style>
        /* ==========================================
           CSS CUSTOM PROPERTIES (THEMING)
           ========================================== */
        :root {
            --bg-body: #f5f7fa;
            --bg-card: #ffffff;

            --macete-border: #f39c12;

            --tip-bg: #e6f7ff;

            --warning-bg: #fff5f5;
            --warning-border: #fc8181;
            --warning-text: #742a2a;
            --example-bg: #f0fff4;
            --example-border: #48bb78;
            --example-text: #22543d;
            --recall-bg: #fff9e6;
            --recall-border: #ed8936;
            --recall-text: #744210;
            --recall-divider: #fbd38d;
            /* Explanation */
            --explanation-bg: #e6f7ff;
            --explanation-border: #3182ce;
            /* Code */
            --code-bg: #f7fafc;
            --code-text: #d53f8c;
            /* Highlight */
            --highlight-bg: #fef5e7;
            --highlight-text: #744210;
            /* Study tips */
            --study-bg: #f0f9ff;
            --study-border: #3182ce;
            --study-title: #2c5282;
            /* Module list */
            --module-list-bg: #f9fafb;
            --module-item-bg: #ffffff;
            --module-item-text: #1f2937;

            /* Score */
            --score-bg: #f7fafc;

            /* Intro section */

            /* Footer */
            --footer-license-bg: #f7fafc;
            --footer-license-border: #e2e8f0;
            --footer-license-text: #4a5568;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-card-alt: #1e293b;
            --bg-input: #334155;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-body: #e2e8f0;
            --text-secondary: #cbd5e0;
            --text-muted: #94a3b8;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --accent-shadow: rgba(96,165,250,0.25);
            --border: #334155;
            --border-hover: #475569;
            --success: #34d399;
            --success-hover: #10b981;
            --danger: #f87171;
            --warning-accent: #fb923c;
            --warning-hover: #f97316;
            --orange-accent: #fbbf24;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
            /* Content boxes - dark */
            --macete-bg: #422006;
            --macete-border: #f59e0b;
            --macete-text: #fde68a;
            --tip-bg: #172554;
            --tip-border: #60a5fa;
            --tip-text: #bfdbfe;
            --warning-bg: #450a0a;
            --warning-border: #f87171;
            --warning-text: #fecaca;
            --example-bg: #052e16;
            --example-border: #34d399;
            --example-text: #bbf7d0;
            --recall-bg: #451a03;
            --recall-border: #fb923c;
            --recall-text: #fed7aa;
            --recall-divider: #92400e;
            /* Explanation */
            --explanation-bg: #172554;
            --explanation-border: #60a5fa;
            /* Code */
            --code-bg: #334155;
            --code-text: #f472b6;
            /* Highlight */
            --highlight-bg: #422006;
            --highlight-text: #fde68a;
            /* Study tips */
            --study-bg: #172554;
            --study-border: #60a5fa;
            --study-title: #93c5fd;
            /* Module list */
            --module-list-bg: #1e293b;
            --module-item-bg: #334155;
            --module-item-text: #f1f5f9;
            --module-item-sub: #cbd5e0;
            /* Score */
            --score-bg: #1e293b;
            --score-border: #334155;
            /* Intro section */
            --intro-section-bg: #1e293b;
            /* Footer */
            --footer-license-bg: #1e293b;
            --footer-license-border: #334155;
            --footer-license-text: #cbd5e0;
        }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) {
                --bg-body: #0f172a;
                --bg-card: #1e293b;
                --bg-card-alt: #1e293b;
                --bg-input: #334155;
                --bg-hover: #334155;
                --text-primary: #f1f5f9;
                --text-body: #e2e8f0;
                --text-secondary: #cbd5e0;
                --text-muted: #94a3b8;
                --accent: #60a5fa;
                --accent-hover: #3b82f6;
                --accent-shadow: rgba(96,165,250,0.25);
                --border: #334155;
                --border-hover: #475569;
                --success: #34d399;
                --success-hover: #10b981;
                --danger: #f87171;
                --warning-accent: #fb923c;
                --warning-hover: #f97316;
                --orange-accent: #fbbf24;
                --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
                --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
                --macete-bg: #422006; --macete-border: #f59e0b; --macete-text: #fde68a;
                --tip-bg: #172554; --tip-border: #60a5fa; --tip-text: #bfdbfe;
                --warning-bg: #450a0a; --warning-border: #f87171; --warning-text: #fecaca;
                --example-bg: #052e16; --example-border: #34d399; --example-text: #bbf7d0;
                --recall-bg: #451a03; --recall-border: #fb923c; --recall-text: #fed7aa; --recall-divider: #92400e;
                --explanation-bg: #172554; --explanation-border: #60a5fa;
                --code-bg: #334155; --code-text: #f472b6;
                --highlight-bg: #422006; --highlight-text: #fde68a;
                --study-bg: #172554; --study-border: #60a5fa; --study-title: #93c5fd;
                --module-list-bg: #1e293b; --module-item-bg: #334155; --module-item-text: #f1f5f9; --module-item-sub: #cbd5e0;
                --score-bg: #1e293b; --score-border: #334155;
                --intro-section-bg: #1e293b;
                --footer-license-bg: #1e293b; --footer-license-border: #334155; --footer-license-text: #cbd5e0;
            }
        }

        /* ==========================================
           RESET & BASE STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-body);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ==========================================
           HEADER - Minimalista e focado
           ========================================== */
        .header {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            border-left: 4px solid var(--accent);
            position: relative;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 2em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 .icon {
            color: var(--accent);
        }

        .header p.subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            font-weight: 400;
        }

        /* Toggle buttons */
        .header-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            top: 16px;
            right: 16px;
        }

        .toggle-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Progress bar - Clean and minimal */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 8px;
            margin-top: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95em;
        }

        /* ==========================================
           TABS - Simples e claros
           ========================================== */
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .tab {
            background: var(--bg-card);
            padding: 20px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
            position: relative;
        }

        .tab:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px var(--accent-shadow);
        }

        .tab-title {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 6px;
            color: inherit;
        }

        .tab-duration {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .tab.active .tab-duration {
            opacity: 0.9;
        }

        .tab-checkmark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .tab.completed .tab-checkmark {
            display: flex;
        }

        /* ==========================================
           CONTENT AREA - Espaçoso e limpo
           ========================================== */
        .content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 48px;
            box-shadow: var(--shadow-md);
        }

        .module {
            display: none;
        }

        .module.active {
            display: block;
        }

        /* ==========================================
           LESSON BLOCKS - Chunking para reduzir carga cognitiva
           ========================================== */
        .lesson {
            margin-bottom: 48px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .lesson h3 {
            color: var(--text-primary);
            font-size: 1.75em;
            margin-bottom: 8px;
            font-weight: 700;
            line-height: 1.3;
        }

        .lesson h4 {
            color: var(--text-body);
            font-size: 1.25em;
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mark-complete {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .mark-complete:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px var(--accent-shadow);
            transform: translateY(-1px);
        }

        .mark-complete:active {
            transform: translateY(0);
        }

        .mark-complete.completed {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(72,187,120,0.2);
        }

        .mark-complete.completed:hover {
            background: var(--success-hover);
            box-shadow: 0 4px 12px rgba(72,187,120,0.4);
        }

        /* ==========================================
           CONTENT BOXES - Redução de carga cognitiva
           Cores baseadas em psicologia cognitiva
           ========================================== */
        .macete {
            background: var(--macete-bg);
            border-left: 4px solid var(--macete-border);
            color: var(--macete-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .macete::before {
            content: "🔑 MACETE";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--macete-border);
        }

        .tip {
            background: var(--tip-bg);
            border-left: 4px solid var(--tip-border);
            color: var(--tip-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .tip::before {
            content: "💡 DICA";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--tip-border);
        }

        .warning {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            color: var(--warning-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .warning::before {
            content: "⚠️ ATENÇÃO";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--warning-border);
        }

        .example {
            background: var(--example-bg);
            border-left: 4px solid var(--example-border);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            color: var(--example-text);
            box-shadow: var(--shadow-sm);
        }

        .example::before {
            content: "📝 EXEMPLO";
            display: block;
            font-weight: 700;
            color: var(--example-border);
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Bilingual ::before labels */
        html[lang="en"] .macete::before { content: "🔑 MNEMONIC"; }
        html[lang="en"] .tip::before { content: "💡 TIP"; }
        html[lang="en"] .warning::before { content: "⚠️ WARNING"; }
        html[lang="en"] .example::before { content: "📝 EXAMPLE"; }
        html[lang="en"] .explanation::before { content: "💬 EXPLANATION"; }

        /* Exam-confirmed block — tópicos confirmados em prova real */
        .exam-confirmed {
            background: linear-gradient(135deg, rgba(72, 187, 120, 0.08), rgba(49, 130, 206, 0.08));
            border: 1px solid rgba(72, 187, 120, 0.3);
            border-left: 5px solid #48bb78;
            border-radius: 12px;
            padding: 20px 20px 20px 20px;
            margin: 16px 0;
            font-size: 0.95em;
            line-height: 1.6;
            position: relative;
        }
        .exam-confirmed::before {
            content: "🎯 CAI NA PROVA";
            display: block;
            font-weight: 700;
            color: #48bb78;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        html[lang="en"] .exam-confirmed::before { content: "🎯 CONFIRMED ON EXAM"; }
        @media (prefers-color-scheme: dark) {
            .exam-confirmed {
                background: linear-gradient(135deg, rgba(72, 187, 120, 0.12), rgba(49, 130, 206, 0.12));
                border-color: rgba(72, 187, 120, 0.4);
            }
        }

        /* ==========================================
           TYPOGRAPHY - Legibilidade otimizada
           ========================================== */
        ul, ol {
            margin-left: 24px;
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 12px;
            line-height: 1.7;
        }

        p {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        strong {
            color: var(--text-body);
            font-weight: 700;
        }

        /* ==========================================
           EXERCISES - Feedback imediato e claro
           ========================================== */
        .exercises {
            margin-top: 64px;
            padding-top: 48px;
            border-top: 2px solid var(--border);
        }

        .exercises > h3 {
            color: var(--text-primary);
            font-size: 1.5em;
            margin-bottom: 32px;
            font-weight: 700;
        }

        .exercise-card {
            background: var(--bg-card-alt);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            border: 2px solid var(--border);
            transition: all 0.2s ease;
        }

        .exercise-card:hover {
            border-color: var(--border-hover);
        }

        .exercise-card.correct {
            border-color: var(--success);
            background: var(--example-bg);
        }

        .exercise-card.incorrect {
            border-color: var(--danger);
            background: var(--warning-bg);
        }

        .question {
            font-weight: 600;
            font-size: 1.05em;
            margin-bottom: 24px;
            color: var(--text-body);
            line-height: 1.6;
        }

        .options {
            list-style: none;
            margin: 0;
        }

        .option {
            background: var(--bg-card);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
        }

        .option.selected {
            background: var(--tip-bg);
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--example-bg);
            border-color: var(--success);
        }

        .option.incorrect {
            background: var(--warning-bg);
            border-color: var(--danger);
        }

        .explanation {
            margin-top: 24px;
            padding: 20px;
            background: var(--explanation-bg);
            border-radius: 6px;
            border-left: 4px solid var(--explanation-border);
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation::before {
            content: "💬 EXPLICAÇÃO";
            display: block;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 0.85em;
        }

        /* Botão de ação principal (laranja para engajamento) */
        .check-answers-btn {
            background: var(--warning-accent);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            margin: 40px auto;
            box-shadow: 0 2px 8px rgba(237,137,54,0.3);
        }

        .check-answers-btn:hover {
            background: var(--warning-hover);
            box-shadow: 0 4px 12px rgba(237,137,54,0.4);
        }

        .check-answers-btn:active {
            transform: scale(0.98);
        }

        .score {
            text-align: center;
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text-body);
            margin-top: 32px;
            padding: 24px;
            background: var(--score-bg);
            border-radius: 8px;
            display: none;
            border: 2px solid var(--score-border);
        }

        .score.show {
            display: block;
        }

        /* ==========================================
           NAVIGATION - Simples e funcional
           ========================================== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 48px;
            gap: 16px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }

        .nav-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .nav-btn.prev {
            background: var(--border);
            color: var(--text-secondary);
        }

        .nav-btn.prev:hover {
            background: var(--border-hover);
        }

        .nav-btn.next {
            background: var(--accent);
            color: white;
        }

        .nav-btn.next:hover {
            background: var(--accent-hover);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            background: var(--border);
        }

        /* ==========================================
           ACTIVE RECALL - Técnica de recuperação ativa
           ========================================== */
        .active-recall {
            background: var(--recall-bg);
            border: 2px dashed var(--recall-border);
            border-radius: 8px;
            padding: 24px;
            margin: 32px 0;
        }

        .active-recall summary {
            font-weight: 700;
            color: var(--recall-border);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95em;
            user-select: none;
        }

        .active-recall summary::-webkit-details-marker {
            display: none;
        }

        .active-recall summary::before {
            content: "🤔";
            font-size: 1.2em;
        }

        .active-recall[open] summary::before {
            content: "💡";
        }

        .active-recall summary:hover {
            color: var(--recall-border);
        }

        .active-recall .recall-content {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--recall-divider);
            color: var(--recall-text);
        }

        /* ==========================================
           UTILITIES
           ========================================== */
        .separator {
            height: 1px;
            background: var(--border);
            margin: 32px 0;
        }

        .highlight {
            background: var(--highlight-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            color: var(--highlight-text);
        }

        code {
            background: var(--code-bg);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--code-text);
            font-size: 0.9em;
        }

        .icon {
            font-size: 1.3em;
        }

        /* ==========================================
           INTRO PAGE STYLES - Específicos para módulo de introdução
           ========================================== */
        .intro-section {
            background: var(--intro-section-bg);
            padding: 32px;
            margin: 24px 0;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .intro-section h4 {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.3em;
        }

        .intro-section p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .intro-highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            margin: 32px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .intro-highlight h3 {
            color: white;
            margin-bottom: 12px;
            font-size: 1.5em;
        }

        .intro-highlight p {
            color: rgba(255,255,255,0.95);
            font-size: 1.1em;
            margin: 0;
        }

        .study-tips {
            background: var(--study-bg);
            border: 2px solid var(--study-border);
            border-radius: 10px;
            padding: 28px;
            margin: 28px 0;
        }

        .study-tips h4 {
            color: var(--study-title);
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.2em;
        }

        .study-tips ul {
            margin-left: 20px;
        }

        .study-tips li {
            color: var(--text-body);
            margin-bottom: 12px;
            line-height: 1.7;
        }

        /* ==========================================
           FOOTER - Copyright
           ========================================== */
        .footer {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 32px;
            margin-top: 40px;
            text-align: center;
            box-shadow: var(--shadow-md);
            border-top: 3px solid var(--accent);
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 1.2em;
        }

        .footer p {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .footer-license {
            background: var(--footer-license-bg);
            border: 1px solid var(--footer-license-border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .footer-license strong {
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .footer-license p {
            color: var(--footer-license-text);
            margin: 0;
            font-size: 0.9em;
        }

        .footer-author {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-body);
            font-weight: 500;
        }

        .footer-author span {
            color: var(--accent);
            font-weight: 600;
        }

        .action-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 24px 32px;
            border-radius: 10px;
            margin: 28px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .action-box h4 {
            color: white;
            margin: 0 0 12px 0;
            font-size: 1.3em;
        }

        .action-box p {
            color: rgba(255,255,255,0.95);
            margin: 0;
            font-size: 1.05em;
        }

        .action-box a {
            color: white;
            text-decoration: underline;
            font-weight: 600;
        }

        .module-list {
            background: var(--module-list-bg);
            padding: 24px;
            border-radius: 10px;
            margin: 24px 0;
        }

        .module-list h4 {
            color: var(--module-item-text);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .module-item {
            background: var(--module-item-bg);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .module-item strong {
            color: var(--module-item-text);
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
        }

        .module-item ul {
            margin: 8px 0 0 20px;
        }

        .module-item li {
            color: var(--module-item-sub);
            font-size: 0.95em;
            margin-bottom: 6px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 16px 40px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1em;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        /* ==========================================
           RESPONSIVE
           ========================================== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header {
                padding: 24px;
                padding-top: 48px;
            }

            .header-controls {
                position: static;
                margin-bottom: 16px;
                justify-content: flex-end;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .tabs {
                grid-template-columns: 1fr;
            }

            .content {
                padding: 24px;
            }

            .lesson h3 {
                font-size: 1.4em;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .lesson-header {
                flex-direction: column;
                gap: 16px;
            }

            .mark-complete {
                width: 100%;
            }

            /* Simulado responsive */
            .sim-match-container { grid-template-columns: 1fr; }
            .sim-meta-grid { grid-template-columns: repeat(2, 1fr); }
            .sim-score-value { font-size: 3em; }
            .sim-exam-nav { flex-direction: column; }
            .sim-nav-prev, .sim-nav-next, .sim-submit-btn { width: 100%; }
            .sim-report-actions { flex-direction: column; }
        }

        /* ==========================================
           SIMULADO FINAL — EXAM ENGINE STYLES
           ========================================== */

        /* --- Screens --- */
        .sim-screen { display: none; }
        .sim-screen.active { display: block; }

        /* --- Intro Screen --- */
        .sim-intro-hero {
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white; padding: 40px; border-radius: 12px; margin-bottom: 32px; text-align: center;
        }
        .sim-intro-hero h2 { color: white; font-size: 1.8em; margin-bottom: 8px; }
        .sim-intro-hero p { color: rgba(255,255,255,0.88); font-size: 1.1em; margin: 0; }
        .sim-meta-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px; margin: 28px 0;
        }
        .sim-meta-item {
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px 16px; text-align: center;
        }
        .sim-meta-item .sim-meta-icon { font-size: 1.8em; margin-bottom: 8px; }
        .sim-meta-item .sim-meta-value { font-size: 1.3em; font-weight: 700; color: var(--text-primary); }
        .sim-meta-item .sim-meta-label { font-size: 0.8em; color: var(--text-muted); margin-top: 2px; }
        .sim-domains-list { margin: 24px 0; }
        .sim-domain-item {
            display: flex; align-items: center; gap: 14px;
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
        }
        .sim-domain-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .sim-domain-name { font-weight: 600; color: var(--text-body); flex: 1; }
        .sim-domain-weight { font-size: 0.85em; color: var(--text-muted); font-weight: 500; }
        .sim-instructions { background: var(--tip-bg); border-left: 4px solid var(--tip-border); border-radius: 8px; padding: 20px 24px; margin: 24px 0; color: var(--tip-text); }
        .sim-instructions ul { margin: 10px 0 0 20px; }
        .sim-instructions li { margin-bottom: 6px; font-size: 0.95em; }
        .sim-start-btn {
            background: linear-gradient(135deg, #2c5282 0%, #3182ce 100%);
            color: white; border: none; padding: 18px 60px; border-radius: 10px;
            font-size: 1.15em; font-weight: 700; cursor: pointer; display: block;
            margin: 32px auto 0; box-shadow: 0 4px 14px rgba(49,130,206,0.35);
            transition: all 0.2s ease;
        }
        .sim-start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(49,130,206,0.45); }

        /* --- Exam Screen --- */
        .sim-exam-header {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; gap: 16px;
        }
        .sim-timer {
            font-size: 1.25em; font-weight: 700; color: var(--accent);
            font-variant-numeric: tabular-nums; min-width: 70px; text-align: center;
        }
        .sim-timer.warning { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sim-q-counter { color: var(--text-muted); font-size: 0.9em; font-weight: 500; }
        .sim-flag-btn {
            background: none; border: 1.5px solid var(--border); border-radius: 6px;
            padding: 6px 12px; cursor: pointer; color: var(--text-muted); font-size: 0.85em;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .sim-flag-btn.flagged { border-color: var(--warning-accent); color: var(--warning-accent); background: var(--recall-bg); }
        .sim-flag-btn:hover { border-color: var(--warning-accent); color: var(--warning-accent); }

        /* Timer progress bar */
        .sim-timer-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .sim-timer-fill { height: 100%; background: var(--accent); transition: width 1s linear; border-radius: 2px; }
        .sim-timer-fill.warning { background: var(--danger); }

        /* Question area */
        .sim-question-area { margin-bottom: 24px; }
        .sim-question-type-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 12px; font-size: 0.78em;
            font-weight: 600; color: var(--text-muted); margin-bottom: 14px;
        }
        .sim-scenario {
            background: var(--example-bg); border-left: 4px solid var(--example-border);
            border-radius: 8px; padding: 18px 22px; margin-bottom: 18px;
            color: var(--example-text); font-size: 0.95em; line-height: 1.7;
        }
        .sim-scenario::before { content: "📋 CENÁRIO"; display: block; font-weight: 700; font-size: 0.82em; margin-bottom: 8px; color: var(--example-border); letter-spacing: 0.5px; }
        .sim-q-text { font-weight: 600; font-size: 1.05em; color: var(--text-body); margin-bottom: 18px; line-height: 1.6; }
        .sim-multi-hint { font-size: 0.82em; color: var(--accent); font-weight: 600; margin-bottom: 12px; }

        /* Options (single/multi) */
        .sim-options { list-style: none; margin: 0; }
        .sim-option {
            display: flex; align-items: flex-start; gap: 12px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
            cursor: pointer; transition: all 0.2s; line-height: 1.55;
        }
        .sim-option:hover { border-color: var(--accent); background: var(--bg-hover); }
        .sim-option.selected { border-color: var(--accent); background: var(--tip-bg); }
        .sim-option input { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
        .sim-option label { cursor: pointer; flex: 1; color: var(--text-body); }

        /* --- Drag-and-Drop --- */
        /* Match type */
        .sim-match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 8px 0; }
        .sim-match-pool-label, .sim-match-targets-label { font-size: 0.82em; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
        .sim-match-pool { display: flex; flex-direction: column; gap: 8px; }
        .sim-match-item {
            background: var(--bg-card); border: 2px solid var(--accent);
            border-radius: 8px; padding: 10px 14px; cursor: grab; user-select: none;
            touch-action: none; font-size: 0.92em; font-weight: 500; color: var(--text-body);
            transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
            display: flex; align-items: center;
        }
        .sim-match-item:hover { box-shadow: 0 2px 8px var(--accent-shadow); }
        .sim-match-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-match-item.placed { border-color: var(--success); background: var(--example-bg); color: var(--example-text); }
        .sim-match-targets { display: flex; flex-direction: column; gap: 8px; }
        .sim-match-target-row { display: flex; flex-direction: column; gap: 4px; }
        .sim-match-target-label { font-size: 0.82em; color: var(--text-secondary); font-weight: 500; line-height: 1.4; }
        .sim-match-slot {
            min-height: 44px; border: 2px dashed var(--border); border-radius: 8px;
            padding: 6px; transition: border-color 0.15s, background 0.15s;
            display: flex; align-items: center;
        }
        .sim-match-slot.over { border-color: var(--accent); background: var(--tip-bg); border-style: solid; }
        .sim-match-slot.filled { border-style: solid; border-color: var(--success); background: var(--example-bg); }
        .sim-match-slot-placeholder { color: var(--text-muted); font-size: 0.82em; padding: 4px 8px; font-style: italic; }

        /* Order type */
        .sim-order-list { display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
        .sim-order-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; padding: 12px 16px; cursor: grab; user-select: none;
            touch-action: none; transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
        }
        .sim-order-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
        .sim-order-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-order-handle { color: var(--text-muted); font-size: 1.1em; flex-shrink: 0; user-select: none; }
        .sim-order-num { font-weight: 700; color: var(--accent); font-size: 0.95em; min-width: 22px; flex-shrink: 0; }
        .sim-order-text { flex: 1; color: var(--text-body); font-size: 0.95em; line-height: 1.5; }
        .sim-order-drop-indicator { height: 3px; background: var(--accent); border-radius: 2px; margin: -4px 0; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
        .sim-order-drop-indicator.visible { opacity: 1; }

        /* Categorize type */
        .sim-categorize-pool {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
            min-height: 52px; padding: 10px; border: 2px dashed var(--border);
            border-radius: 10px; background: var(--bg-card-alt);
        }
        .sim-categorize-pool.over { border-color: var(--accent); background: var(--tip-bg); }
        .sim-categorize-item {
            background: var(--bg-card); border: 2px solid var(--accent);
            border-radius: 6px; padding: 8px 14px; cursor: grab; user-select: none;
            touch-action: none; font-size: 0.88em; font-weight: 500; color: var(--text-body);
            transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
            display: flex; align-items: center;
        }
        .sim-categorize-item:hover { box-shadow: 0 2px 6px var(--accent-shadow); }
        .sim-categorize-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-categorize-buckets { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .sim-bucket {
            border: 2px solid var(--border); border-radius: 10px; min-height: 100px;
            transition: border-color 0.15s, background 0.15s;
        }
        .sim-bucket.over { border-color: var(--accent); background: var(--tip-bg); }
        .sim-bucket-header {
            padding: 10px 14px; font-weight: 700; font-size: 0.88em;
            background: var(--bg-card-alt); border-bottom: 1px solid var(--border);
            border-radius: 8px 8px 0 0; color: var(--text-body);
        }
        .sim-bucket-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 60px; }

        /* Ghost element during drag */
        .sim-drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999; opacity: 0.9;
            transform: rotate(2deg) scale(1.04);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18); border-radius: 8px;
        }

        /* --- Nav Grid --- */
        .sim-nav-section { margin-bottom: 20px; }
        .sim-nav-label { font-size: 0.82em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .sim-nav-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .sim-nav-btn {
            width: 36px; height: 36px; border-radius: 6px; border: 1.5px solid var(--border);
            background: var(--bg-card-alt); color: var(--text-muted); font-size: 0.78em;
            font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex;
            align-items: center; justify-content: center;
        }
        .sim-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sim-nav-btn.answered { background: var(--accent); border-color: var(--accent); color: white; }
        .sim-nav-btn.flagged { background: var(--recall-bg); border-color: var(--warning-accent); color: var(--warning-accent); }
        .sim-nav-btn.current { box-shadow: 0 0 0 3px var(--accent-shadow); border-color: var(--accent); font-weight: 700; }
        .sim-nav-btn.answered.flagged { background: var(--warning-accent); border-color: var(--warning-accent); color: white; }

        /* --- Exam Navigation Buttons --- */
        .sim-exam-nav { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .sim-nav-prev, .sim-nav-next {
            flex: 1; padding: 13px 20px; border: none; border-radius: 8px; font-weight: 600;
            font-size: 0.95em; cursor: pointer; transition: all 0.2s; min-width: 100px;
        }
        .sim-nav-prev { background: var(--border); color: var(--text-secondary); }
        .sim-nav-prev:hover { background: var(--border-hover); }
        .sim-nav-prev:disabled { opacity: 0.35; cursor: not-allowed; }
        .sim-nav-next { background: var(--accent); color: white; }
        .sim-nav-next:hover { background: var(--accent-hover); }
        .sim-submit-btn {
            background: var(--success); color: white; border: none; padding: 13px 28px;
            border-radius: 8px; font-weight: 700; font-size: 0.95em; cursor: pointer;
            transition: all 0.2s;
        }
        .sim-submit-btn:hover { background: var(--success-hover); }

        /* --- Score Report --- */
        .sim-report-hero {
            text-align: center; padding: 40px 24px; border-radius: 12px; margin-bottom: 32px;
        }
        .sim-report-hero.pass { background: linear-gradient(135deg, #1c4532 0%, #276749 100%); }
        .sim-report-hero.fail { background: linear-gradient(135deg, #63171b 0%, #9b2c2c 100%); }
        .sim-score-value { font-size: 4em; font-weight: 800; color: white; line-height: 1; }
        .sim-score-max { font-size: 1.3em; color: rgba(255,255,255,0.7); margin-bottom: 16px; }
        .sim-pass-badge {
            display: inline-block; padding: 8px 28px; border-radius: 30px;
            font-size: 1.1em; font-weight: 700; letter-spacing: 0.5px;
        }
        .sim-pass-badge.pass { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.5); }
        .sim-pass-badge.fail { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); border: 2px solid rgba(255,255,255,0.4); }

        // ============================================================
        // THEME & LANGUAGE TOGGLE
        // ============================================================
        function getEffectiveTheme() {
            const stored = localStorage.getItem(STORAGE_KEY_THEME);
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || getEffectiveTheme();
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            try { localStorage.setItem(STORAGE_KEY_THEME, next); } catch(e) {}
        }

        function applyLanguage(lang) {
            const prevLang = currentLang;
            currentLang = lang;
            document.documentElement.setAttribute('lang', lang === 'pt' ? 'pt-BR' : 'en');
            const t = translations[lang];

            // Re-render entire course content when language changes
            if (prevLang !== lang || !courseData) {
                courseData = buildCourseData(lang);
                const savedModule = currentModule;
                document.getElementById('tabs').innerHTML = '';
                document.getElementById('modules').innerHTML = '';
                renderTabs();
                renderModules();
                const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
                document.getElementById('totalLessons').textContent = totalLessons;
                loadModule(savedModule, true);
                restoreCompletedButtons();
                restoreSelectedAnswers();
                checkModuleCompletion();
            }

            // Update all elements with data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            // Update lang toggle button
            const btn = document.getElementById('langToggle');
            if (btn) btn.textContent = t.langLabel;

            // Update mark-complete buttons
            document.querySelectorAll('.mark-complete').forEach(btn => {
                if (btn.classList.contains('completed')) {
                    btn.textContent = t.completed;
                } else {
                    btn.textContent = t.markComplete;
                }
            });

            // Update check-answers buttons
            document.querySelectorAll('.check-answers-btn').forEach(btn => {
                btn.textContent = t.checkAnswers;
            });

            // Update progress text
            updateProgress();

            try { localStorage.setItem(STORAGE_KEY_LANG, lang); } catch(e) {}
        }

        function toggleLanguage() {
            applyLanguage(currentLang === 'pt' ? 'en' : 'pt');
        }

        // State management
        let currentModule = 0;

        // ============================================
        // SUBSTITUIR: prefixo das chaves localStorage
        // Exemplo: 'dp900_', 'az900_', 'sc900_'
        // ============================================
        const STORAGE_KEY_COMPLETED = '{cert_lower}_completed_lessons';
        const STORAGE_KEY_MODULE = '{cert_lower}_current_module';
        const STORAGE_KEY_ANSWERS = '{cert_lower}_selected_answers';
        const STORAGE_KEY_SCROLL = '{cert_lower}_scroll_position';
        const STORAGE_KEY_THEME = '{cert_lower}_theme';
        const STORAGE_KEY_LANG = '{cert_lower}_lang';
        // ============================================
        // SUBSTITUIR: prefixo de simulado (ex: 'dp900_simulado_state')
        // ============================================
        const SIM_STORAGE_KEY = '{cert_lower}_simulado_state';

        // Save progress to localStorage
        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY_COMPLETED, JSON.stringify([...completedLessons]));
                localStorage.setItem(STORAGE_KEY_MODULE, currentModule.toString());
                localStorage.setItem(STORAGE_KEY_ANSWERS, JSON.stringify(selectedAnswers));
            } catch (e) {
                console.warn('Não foi possível salvar o progresso:', e);
            }
        }

        // Save scroll position
        function saveScrollPosition() {
            try {
                const scrollData = {
                    module: currentModule,
                    position: window.scrollY
                };
                localStorage.setItem(STORAGE_KEY_SCROLL, JSON.stringify(scrollData));
            } catch (e) {
                console.warn('Não foi possível salvar posição de scroll:', e);
            }
        }

        // Debounce function to avoid too many saves
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Debounced scroll save (save every 500ms of inactivity)
        const debouncedSaveScroll = debounce(saveScrollPosition, 500);

        // Load progress from localStorage
        function loadProgress() {
            try {
                // Load completed lessons
                const savedCompleted = localStorage.getItem(STORAGE_KEY_COMPLETED);
                if (savedCompleted) {
                    const completed = JSON.parse(savedCompleted);
                    completedLessons = new Set(completed);
                }

                // Load current module
                const savedModule = localStorage.getItem(STORAGE_KEY_MODULE);
                if (savedModule) {
                    currentModule = parseInt(savedModule);
                }

                // Load selected answers
                const savedAnswers = localStorage.getItem(STORAGE_KEY_ANSWERS);
                if (savedAnswers) {
                    selectedAnswers = JSON.parse(savedAnswers);
                }
            } catch (e) {
                console.warn('Não foi possível carregar o progresso:', e);
            }
        }

        // Restore scroll position
        function restoreScrollPosition() {
            try {
                const savedScroll = localStorage.getItem(STORAGE_KEY_SCROLL);
                if (savedScroll) {
                    const scrollData = JSON.parse(savedScroll);
                    // Only restore if we're on the same module
                    if (scrollData.module === currentModule) {
                        // Use setTimeout to ensure DOM is fully rendered
                        setTimeout(() => {
                            window.scrollTo({
                                top: scrollData.position,
                                behavior: 'smooth'
                            });
                        }, 100);
                    }
                }
            } catch (e) {
                console.warn('Não foi possível restaurar posição de scroll:', e);
            }
        }

        // Clear progress (útil para resetar o curso)
        function clearProgress() {
            const t = translations[currentLang];
            if (confirm(t.resetConfirm)) {
                localStorage.removeItem(STORAGE_KEY_COMPLETED);
                localStorage.removeItem(STORAGE_KEY_MODULE);
                localStorage.removeItem(STORAGE_KEY_ANSWERS);
                localStorage.removeItem(STORAGE_KEY_SCROLL);
                localStorage.removeItem(STORAGE_KEY_THEME);
                localStorage.removeItem(STORAGE_KEY_LANG);
                localStorage.removeItem(SIM_STORAGE_KEY);
                location.reload();
            }
        }

        // Initialize
        function init() {
            // Apply theme first (before render to avoid flash)
            applyTheme(getEffectiveTheme());

            // Load language preference
            try {
                const savedLang = localStorage.getItem(STORAGE_KEY_LANG);
                if (savedLang) currentLang = savedLang;
            } catch(e) {}

            // Build course data for current language
            courseData = buildCourseData(currentLang);

            loadProgress();
            renderTabs();
            renderModules();
            updateProgress();
            loadModule(currentModule, true);
            restoreCompletedButtons();
            restoreSelectedAnswers();
            checkModuleCompletion();
            restoreScrollPosition();

            // Apply language after DOM is rendered (updates UI strings + labels)
            applyLanguage(currentLang);
            
            window.addEventListener('scroll', debouncedSaveScroll);
            window.addEventListener('beforeunload', saveScrollPosition);
        }

        // Render tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            courseData.modules.forEach((module, index) => {
                const tab = document.createElement('div');
                tab.className = `tab ${index === 0 ? 'active' : ''}`;
                tab.onclick = () => loadModule(index);
                tab.innerHTML = `
                    <div class="tab-title">${module.title}</div>
                    <div class="tab-duration">${module.duration}</div>
                    <div class="tab-checkmark">✓</div>
                `;
                tabsContainer.appendChild(tab);
            });
        }

        // Render all modules
        function renderModules() {
            const modulesContainer = document.getElementById('modules');
            courseData.modules.forEach((module, moduleIndex) => {
                const moduleDiv = document.createElement('div');
                moduleDiv.className = `module ${moduleIndex === 0 ? 'active' : ''}`;
                moduleDiv.id = `module-${moduleIndex}`;

                // ── Simulado module: delegate to exam engine ──────────────────
                // CRITICAL: appendChild BEFORE initSimuladoModule (needs div in DOM)
                if (COURSE_STRUCTURE.modules[moduleIndex] && COURSE_STRUCTURE.modules[moduleIndex].isSimulado) {
                    modulesContainer.appendChild(moduleDiv);
                    initSimuladoModule(moduleDiv);
                    return;
                }

                // Render lessons
                let lessonsHTML = '';
                module.lessons.forEach((lesson, lessonIndex) => {
                    const lessonId = `${moduleIndex}-${lessonIndex}`;
                    lessonsHTML += `
                        <div class="lesson">
                            <div class="lesson-header">
                                <h3>${lesson.title}</h3>
                            </div>
                            ${lesson.content}
                            <div class="separator"></div>
                            <div style="text-align: center; margin-top: 32px;">
                                <button class="mark-complete" data-lesson="${lessonId}" data-i18n="markComplete" onclick="toggleLesson('${lessonId}')">
                                    ✓ Marcar como completo
                                </button>
                            </div>
                        </div>
                    `;
                });

                // Render exercises
                let exercisesHTML = '';
                if (module.exercises && module.exercises.length > 0) {
                    exercisesHTML = `
                        <div class="exercises">
                            <h3 data-i18n="exercises">✏️ Exercícios - ${module.title}</h3>
                            <div class="separator"></div>
