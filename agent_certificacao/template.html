        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) {

                --text-primary: #f1f5f9;

        /* ==========================================
           RESET & BASE STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-body);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ==========================================
           HEADER - Minimalista e focado
           ========================================== */
        .header {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            border-left: 4px solid var(--accent);
            position: relative;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 2em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 .icon {
            color: var(--accent);
        }

        .header p.subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            font-weight: 400;
        }

        /* Toggle buttons */
        .header-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            top: 16px;
            right: 16px;
        }

        .toggle-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Progress bar - Clean and minimal */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 8px;
            margin-top: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95em;
        }

        /* ==========================================
           TABS - Simples e claros
           ========================================== */
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .tab {
            background: var(--bg-card);
            padding: 20px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
            position: relative;
        }

        .tab:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px var(--accent-shadow);
        }

        .tab-title {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 6px;
            color: inherit;
        }

        .tab-duration {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .tab.active .tab-duration {
            opacity: 0.9;
        }

        .tab-checkmark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .tab.completed .tab-checkmark {
            display: flex;
        }

        /* ==========================================
           CONTENT AREA - Espaçoso e limpo
           ========================================== */
        .content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 48px;
            box-shadow: var(--shadow-md);
        }

        .module {
            display: none;
        }

        .module.active {
            display: block;
        }

        /* ==========================================
           LESSON BLOCKS - Chunking para reduzir carga cognitiva
           ========================================== */
        .lesson {
            margin-bottom: 48px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .lesson h3 {
            color: var(--text-primary);
            font-size: 1.75em;
            margin-bottom: 8px;
            font-weight: 700;
            line-height: 1.3;
        }

        .lesson h4 {
            color: var(--text-body);
            font-size: 1.25em;
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mark-complete {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .mark-complete:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px var(--accent-shadow);
            transform: translateY(-1px);
        }

        .mark-complete:active {
            transform: translateY(0);
        }

        .mark-complete.completed {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(72,187,120,0.2);
        }

        .mark-complete.completed:hover {
            background: var(--success-hover);
            box-shadow: 0 4px 12px rgba(72,187,120,0.4);
        }

        /* ==========================================
           CONTENT BOXES - Redução de carga cognitiva
           Cores baseadas em psicologia cognitiva
           ========================================== */
        .macete {
            background: var(--macete-bg);
            border-left: 4px solid var(--macete-border);
            color: var(--macete-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .macete::before {
            content: "🔑 MACETE";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--macete-border);
        }

        .tip {
            background: var(--tip-bg);
            border-left: 4px solid var(--tip-border);
            color: var(--tip-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .tip::before {
            content: "💡 DICA";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--tip-border);
        }

        .warning {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            color: var(--warning-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .warning::before {
            content: "⚠️ ATENÇÃO";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--warning-border);
        }

        .example {
            background: var(--example-bg);
            border-left: 4px solid var(--example-border);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            color: var(--example-text);
            box-shadow: var(--shadow-sm);
        }

        .example::before {
            content: "📝 EXEMPLO";
            display: block;
            font-weight: 700;
            color: var(--example-border);
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Bilingual ::before labels */
        html[lang="en"] .macete::before { content: "🔑 MNEMONIC"; }
        html[lang="en"] .tip::before { content: "💡 TIP"; }
        html[lang="en"] .warning::before { content: "⚠️ WARNING"; }
        html[lang="en"] .example::before { content: "📝 EXAMPLE"; }
        html[lang="en"] .explanation::before { content: "💬 EXPLANATION"; }

        /* ==========================================
           TYPOGRAPHY - Legibilidade otimizada
           ========================================== */
        ul, ol {
            margin-left: 24px;
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 12px;
            line-height: 1.7;
        }

        p {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        strong {
            color: var(--text-body);
            font-weight: 700;
        }

        /* ==========================================
           EXERCISES - Feedback imediato e claro
           ========================================== */
        .exercises {
            margin-top: 64px;
            padding-top: 48px;
            border-top: 2px solid var(--border);
        }

        .exercises > h3 {
            color: var(--text-primary);
            font-size: 1.5em;
            margin-bottom: 32px;
            font-weight: 700;
        }

        .exercise-card {
            background: var(--bg-card-alt);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            border: 2px solid var(--border);
            transition: all 0.2s ease;
        }

        .exercise-card:hover {
            border-color: var(--border-hover);
        }

        .exercise-card.correct {
            border-color: var(--success);
            background: var(--example-bg);
        }

        .exercise-card.incorrect {
            border-color: var(--danger);
            background: var(--warning-bg);
        }

        .question {
            font-weight: 600;
            font-size: 1.05em;
            margin-bottom: 24px;
            color: var(--text-body);
            line-height: 1.6;
        }

        .options {
            list-style: none;
            margin: 0;
        }

        .option {
            background: var(--bg-card);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
        }

        .option.selected {
            background: var(--tip-bg);
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--example-bg);
            border-color: var(--success);
        }

        .option.incorrect {
            background: var(--warning-bg);
            border-color: var(--danger);
        }

        .explanation {
            margin-top: 24px;
            padding: 20px;
            background: var(--explanation-bg);
            border-radius: 6px;
            border-left: 4px solid var(--explanation-border);
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation::before {
            content: "💬 EXPLICAÇÃO";
            display: block;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 0.85em;
        }

        /* Botão de ação principal (laranja para engajamento) */
        .check-answers-btn {
            background: var(--warning-accent);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            margin: 40px auto;
            box-shadow: 0 2px 8px rgba(237,137,54,0.3);
        }

        .check-answers-btn:hover {
            background: var(--warning-hover);
            box-shadow: 0 4px 12px rgba(237,137,54,0.4);
        }

        .check-answers-btn:active {
            transform: scale(0.98);
        }

        .score {
            text-align: center;
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text-body);
            margin-top: 32px;
            padding: 24px;
            background: var(--score-bg);
            border-radius: 8px;
            display: none;
            border: 2px solid var(--score-border);
        }

        .score.show {
            display: block;
        }

        /* ==========================================
           NAVIGATION - Simples e funcional
           ========================================== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 48px;
            gap: 16px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }

        .nav-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .nav-btn.prev {
            background: var(--border);
            color: var(--text-secondary);
        }

        .nav-btn.prev:hover {
            background: var(--border-hover);
        }

        .nav-btn.next {
            background: var(--accent);
            color: white;
        }

        .nav-btn.next:hover {
            background: var(--accent-hover);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            background: var(--border);
        }

        /* ==========================================
           ACTIVE RECALL - Técnica de recuperação ativa

        function getEffectiveTheme() {

            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || getEffectiveTheme();
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            try { localStorage.setItem(STORAGE_KEY_THEME, next); } catch(e) {}
        }

        function applyLanguage(lang) {
            currentLang = lang;

            document.querySelectorAll('[data-i18n]').forEach(el => {

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY_COMPLETED, JSON.stringify([...completedLessons]));
                localStorage.setItem(STORAGE_KEY_MODULE, currentModule.toString());
                localStorage.setItem(STORAGE_KEY_ANSWERS, JSON.stringify(selectedAnswers));
            } catch (e) {
                console.warn('Não foi possível salvar o progresso:', e);
            }
        }

        // Save scroll position
        function saveScrollPosition() {
            try {
                const scrollData = {
                    module: currentModule,
                    position: window.scrollY
                };
                localStorage.setItem(STORAGE_KEY_SCROLL, JSON.stringify(scrollData));
            } catch (e) {
                console.warn('Não foi possível salvar posição de scroll:', e);
            }
        }

        // Debounce function to avoid too many saves
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Debounced scroll save (save every 500ms of inactivity)
        const debouncedSaveScroll = debounce(saveScrollPosition, 500);

        // Load progress from localStorage
        function loadProgress() {
            try {
                // Load completed lessons
                const savedCompleted = localStorage.getItem(STORAGE_KEY_COMPLETED);
                if (savedCompleted) {
                    const completed = JSON.parse(savedCompleted);
                    completedLessons = new Set(completed);
                }

                // Load current module
                const savedModule = localStorage.getItem(STORAGE_KEY_MODULE);
                if (savedModule) {
                    currentModule = parseInt(savedModule);
                }

                // Load selected answers
                const savedAnswers = localStorage.getItem(STORAGE_KEY_ANSWERS);
                if (savedAnswers) {
                    selectedAnswers = JSON.parse(savedAnswers);
                }
            } catch (e) {
                console.warn('Não foi possível carregar o progresso:', e);
            }
        }

        // Restore scroll position
        function restoreScrollPosition() {
            try {
                const savedScroll = localStorage.getItem(STORAGE_KEY_SCROLL);
                if (savedScroll) {
                    const scrollData = JSON.parse(savedScroll);
                    // Only restore if we're on the same module
                    if (scrollData.module === currentModule) {
                        // Use setTimeout to ensure DOM is fully rendered
                        setTimeout(() => {
                            window.scrollTo({
                                top: scrollData.position,
                                behavior: 'smooth'
                            });
                        }, 100);
                    }
                }
            } catch (e) {
                console.warn('Não foi possível restaurar posição de scroll:', e);
            }
        }

        // Clear progress (útil para resetar o curso)
        function clearProgress() {
            const t = translations[currentLang];
            if (confirm(t.resetConfirm)) {
                localStorage.removeItem(STORAGE_KEY_COMPLETED);
                localStorage.removeItem(STORAGE_KEY_MODULE);
                localStorage.removeItem(STORAGE_KEY_ANSWERS);
                localStorage.removeItem(STORAGE_KEY_SCROLL);
                localStorage.removeItem(STORAGE_KEY_THEME);
                localStorage.removeItem(STORAGE_KEY_LANG);
                location.reload();
            }
        }

        // Initialize
        function init() {
            // Apply theme first (before render to avoid flash)
            applyTheme(getEffectiveTheme());

            // Load language preference
            try {
                const savedLang = localStorage.getItem(STORAGE_KEY_LANG);
                if (savedLang) currentLang = savedLang;
            } catch(e) {}

            loadProgress();
            renderTabs();
            renderModules();
            updateProgress();
            loadModule(currentModule, true);
            restoreCompletedButtons();
            restoreSelectedAnswers();
            checkModuleCompletion();
            restoreScrollPosition();

            // Apply language after DOM is rendered
            applyLanguage(currentLang);
            
            window.addEventListener('scroll', debouncedSaveScroll);
            window.addEventListener('beforeunload', saveScrollPosition);
        }

        // Render tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            courseData.modules.forEach((module, index) => {
                const tab = document.createElement('div');
                tab.className = `tab ${index === 0 ? 'active' : ''}`;
                tab.onclick = () => loadModule(index);
                tab.innerHTML = `
                    <div class="tab-title">${module.title}</div>
                    <div class="tab-duration">${module.duration}</div>
                    <div class="tab-checkmark">✓</div>
                `;
                tabsContainer.appendChild(tab);
            });
        }

        // Render all modules
        function renderModules() {
            const modulesContainer = document.getElementById('modules');
            courseData.modules.forEach((module, moduleIndex) => {
                const moduleDiv = document.createElement('div');
                moduleDiv.className = `module ${moduleIndex === 0 ? 'active' : ''}`;
                moduleDiv.id = `module-${moduleIndex}`;

                // Render lessons
                let lessonsHTML = '';
                module.lessons.forEach((lesson, lessonIndex) => {
                    const lessonId = `${moduleIndex}-${lessonIndex}`;
                    lessonsHTML += `
                        <div class="lesson">
                            <div class="lesson-header">
                                <h3>${lesson.title}</h3>
                            </div>
                            ${lesson.content}
                            <div class="separator"></div>
                            <div style="text-align: center; margin-top: 32px;">
                                <button class="mark-complete" data-lesson="${lessonId}" data-i18n="markComplete" onclick="toggleLesson('${lessonId}')">
                                    ✓ Marcar como completo
                                </button>
                            </div>
                        </div>
                    `;
                });

                // Render exercises
                let exercisesHTML = '';
                if (module.exercises && module.exercises.length > 0) {
                    exercisesHTML = `
                        <div class="exercises">
                            <h3 data-i18n="exercises">✏️ Exercícios - ${module.title}</h3>
                            <div class="separator"></div>
                    `;

                    module.exercises.forEach((exercise, exerciseIndex) => {
                        const questionId = `${moduleIndex}-${exerciseIndex}`;
                        exercisesHTML += `
                            <div class="exercise-card" id="card-${questionId}">
                                <div class="question">${exerciseIndex + 1}. ${exercise.question}</div>
                                <ul class="options">
                        `;

                        exercise.options.forEach((option, optionIndex) => {
                            exercisesHTML += `
                                <li class="option" onclick="selectOption('${questionId}', ${optionIndex})">
                                    <input type="radio" name="q-${questionId}" value="${optionIndex}" id="opt-${questionId}-${optionIndex}">
                                    <label for="opt-${questionId}-${optionIndex}">${option}</label>
                                </li>
                            `;
                        });

                        exercisesHTML += `
                                </ul>
                                <div class="explanation" id="exp-${questionId}">
                                    ${exercise.explanation}
                                </div>
                            </div>
                        `;
                    });

                    exercisesHTML += `
                            <button class="check-answers-btn" onclick="checkAnswers(${moduleIndex})" data-i18n="checkAnswers">
                                Verificar Respostas
                            </button>
                            <div class="score" id="score-${moduleIndex}"></div>
                        </div>
                    `;
                }

                moduleDiv.innerHTML = lessonsHTML + exercisesHTML;
                modulesContainer.appendChild(moduleDiv);
            });

            // Update total lessons count
            const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
            document.getElementById('totalLessons').textContent = totalLessons;
        }

        // Load module
        function loadModule(index, skipScroll = false) {
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });

            document.querySelectorAll('.module').forEach((module, i) => {
                module.classList.toggle('active', i === index);
            });

            currentModule = index;
            updateNavButtons();
            updateProgress();
            saveProgress();

            if (!skipScroll) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                saveScrollPosition();
            }
        }

        // Navigate between modules
        function navigateModule(direction) {
            const newIndex = currentModule + direction;
            if (newIndex >= 0 && newIndex < courseData.modules.length) {
                saveScrollPosition();
                loadModule(newIndex);
            }
        }

        // Update navigation buttons
        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentModule === 0;
            document.getElementById('nextBtn').disabled = currentModule === courseData.modules.length - 1;
        }

        // Toggle lesson completion
        function toggleLesson(lessonId) {
            const t = translations[currentLang];
            const button = document.querySelector(`[data-lesson="${lessonId}"]`);
            
            if (completedLessons.has(lessonId)) {
                completedLessons.delete(lessonId);
                button.classList.remove('completed');
                button.textContent = t.markComplete;
            } else {
                completedLessons.add(lessonId);
                button.classList.add('completed');
                button.textContent = t.completed;
            }

            updateProgress();
            checkModuleCompletion();
            saveProgress();
        }

        // Restore completed buttons state
        function restoreCompletedButtons() {
            const t = translations[currentLang];
            completedLessons.forEach(lessonId => {
                const button = document.querySelector(`[data-lesson="${lessonId}"]`);
                if (button) {
                    button.classList.add('completed');
                    button.textContent = t.completed;
                }
            });
        }

        // Restore selected answers state
        function restoreSelectedAnswers() {
            Object.keys(selectedAnswers).forEach(questionId => {
                const optionIndex = selectedAnswers[questionId];
                const card = document.getElementById(`card-${questionId}`);
                if (card) {
                    const options = card.querySelectorAll('.option');
                    options.forEach((opt, i) => {
                        if (i === optionIndex) {
                            opt.classList.add('selected');
                        }
                    });
                    const radio = document.getElementById(`opt-${questionId}-${optionIndex}`);
                    if (radio) {
                        radio.checked = true;
                    }
                }
            });
        }

        // Check if module is completed
        function checkModuleCompletion() {
            courseData.modules.forEach((module, moduleIndex) => {
                const allLessonsCompleted = module.lessons.every((_, lessonIndex) => {
                    return completedLessons.has(`${moduleIndex}-${lessonIndex}`);
                });

                const tab = document.querySelectorAll('.tab')[moduleIndex];
                if (allLessonsCompleted) {
                    tab.classList.add('completed');
                } else {
                    tab.classList.remove('completed');
                }
            });
        }

        // Update progress
        function updateProgress() {
            const t = translations[currentLang];
            const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
            const completed = completedLessons.size;
            const percentage = (completed / totalLessons * 100).toFixed(0);

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = percentage + '% ' + t.progressComplete;
            document.getElementById('lessonsCompleted').textContent = completed;
        }

        // Select option
        function selectOption(questionId, optionIndex) {
            selectedAnswers[questionId] = optionIndex;
            
            const card = document.getElementById(`card-${questionId}`);
            const options = card.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === optionIndex);
            });

            document.getElementById(`opt-${questionId}-${optionIndex}`).checked = true;
            saveProgress();
        }

        // Check answers
        function checkAnswers(moduleIndex) {
            const module = courseData.modules[moduleIndex];
            let correct = 0;
            let total = module.exercises.length;

            module.exercises.forEach((exercise, exerciseIndex) => {
                const questionId = `${moduleIndex}-${exerciseIndex}`;
                const card = document.getElementById(`card-${questionId}`);
                const explanation = document.getElementById(`exp-${questionId}`);
                const userAnswer = selectedAnswers[questionId];

                if (userAnswer !== undefined) {
                    const isCorrect = userAnswer === exercise.correct;
                    
                    if (isCorrect) {
                        correct++;
                        card.classList.add('correct');
                        card.classList.remove('incorrect');
                    } else {
                        card.classList.add('incorrect');
                        card.classList.remove('correct');
                    }

                    explanation.classList.add('show');

                    const options = card.querySelectorAll('.option');
                    options.forEach((opt, i) => {
                        if (i === exercise.correct) {
                            opt.classList.add('correct');
                        } else if (i === userAnswer && !isCorrect) {
                            opt.classList.add('incorrect');
                        }
                    });
                }
            });

            const scoreDiv = document.getElementById(`score-${moduleIndex}`);
            const percentage = (correct / total * 100).toFixed(0);
            const t = translations[currentLang];
            scoreDiv.innerHTML = `
                <strong>${t.resultLabel}: ${correct}/${total} ${t.correct} (${percentage}%)</strong><br>
                ${percentage >= 70 ? t.congratulations : t.tryAgain}
            `;
            scoreDiv.classList.add('show');

            scoreDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Initialize on load
        window.onload = init;
    </script>
