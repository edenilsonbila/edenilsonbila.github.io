            } catch(e) {}
        }
        function loadExamState() {
            try {
                const raw = localStorage.getItem(SIM_STORAGE_KEY);
                if (!raw) return false;
                const s = JSON.parse(raw);
                examState = { ...s, flagged: new Set(s.flagged || []) };
                return true;
            } catch(e) { return false; }
        }
        function clearExamState() {
            try { localStorage.removeItem(SIM_STORAGE_KEY); } catch(e) {}
            examState = { started: false, finished: false, currentQ: 0, answers: {}, flagged: new Set(), shuffledOrder: [], startTime: null, elapsedSeconds: 0, autoSubmitted: false };
        }

        // ── Module Init ──────────────────────────────────────────────
        function initSimuladoModule(moduleDiv) {
            moduleDiv.innerHTML = `
                <div class="simulado-container">
                    <div class="sim-screen sim-intro active" id="sim-screen-intro"></div>
                    <div class="sim-screen sim-exam" id="sim-screen-exam"></div>
                    <div class="sim-screen sim-results" id="sim-screen-results"></div>
                </div>
            `;
            renderSimIntro(moduleDiv);
            // Restore in-progress exam if any
            const hasState = loadExamState();
            if (hasState && examState.started && !examState.finished) {
                try {
                    renderExamScreen();
                    showSimScreen('exam');
                    renderExamQuestion(examState.currentQ);
                    updateExamNavGrid();
                    startExamTimer();
                } catch(e) {
                    // Corrupt state — reset and show intro
                    clearExamState();
                    renderSimIntro(moduleDiv);
                    showSimScreen('intro');
                }
            } else if (hasState && examState.finished) {
                try {
                    renderExamResults();
                    showSimScreen('results');
                } catch(e) {
                    clearExamState();
                    showSimScreen('intro');
                }
            }
        }

        function showSimScreen(name) {
            ['intro','exam','results'].forEach(n => {
                const el = document.getElementById(`sim-screen-${n}`);
                if (el) el.classList.toggle('active', n === name);
            });
        }

        // ── Intro Screen ─────────────────────────────────────────────
        function renderSimIntro(moduleDiv) {
            const t = translations[currentLang];
            const el = document.getElementById('sim-screen-intro');
            if (!el) return;
            const domainsHTML = SIMULADO_DOMAINS.map(d => `
                <div class="sim-domain-item">
                    <div class="sim-domain-dot" style="background:${d.color}"></div>
                    <span class="sim-domain-name">${d.icon} ${d[currentLang] || d.pt}</span>
                    <span class="sim-domain-weight">${d.weight}</span>
                </div>
            `).join('');
            const instrHTML = (t.sim_instructions || []).map(i => `<li>${i}</li>`).join('');
            el.innerHTML = `
                <div class="sim-intro-hero">
                    <h2>🎯 ${t.sim_title || 'Simulado Final'}</h2>
                    <p>${t.sim_subtitle || 'Prova completa no estilo oficial Microsoft'}</p>
                </div>
                <div class="sim-meta-grid">
                    <div class="sim-meta-item"><div class="sim-meta-icon">⏱️</div><div class="sim-meta-value">${SIMULADO_CONFIG.timeLimit}</div><div class="sim-meta-label">${t.sim_meta_min || 'minutos'}</div></div>
                    <div class="sim-meta-item"><div class="sim-meta-icon">📝</div><div class="sim-meta-value">${SIMULADO_CONFIG.questionCount}</div><div class="sim-meta-label">${t.sim_meta_questions || 'Questões'}</div></div>
                    <div class="sim-meta-item"><div class="sim-meta-icon">🎯</div><div class="sim-meta-value">${SIMULADO_CONFIG.passScore}</div><div class="sim-meta-label">${t.sim_meta_pass || 'Aprovação'}</div></div>
                    <div class="sim-meta-item"><div class="sim-meta-icon">📊</div><div class="sim-meta-value">${SIMULADO_CONFIG.totalScore}</div><div class="sim-meta-label">${t.sim_meta_score || 'Pontuação'}</div></div>
                </div>
                <div class="sim-domains-list">${domainsHTML}</div>
                <div class="sim-instructions">
                    <strong>${t.sim_instructions_title || '📋 Instruções'}</strong>
                    <ul style="margin-top:10px">${instrHTML}</ul>
                </div>
                <button class="sim-start-btn" onclick="startExam()">${t.sim_start || '🚀 Iniciar Simulado'}</button>
            `;
        }

        // ── Start Exam ───────────────────────────────────────────────
        function startExam() {
            clearExamState();
            const order = SIMULADO_QUESTIONS.map((_, i) => i);
            // Fisher-Yates shuffle
            for (let i = order.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [order[i], order[j]] = [order[j], order[i]];
            }
            examState.started = true;
            examState.shuffledOrder = order;
            examState.currentQ = 0;
            examState.startTime = Date.now();
            saveExamState();
            renderExamScreen();
            renderExamQuestion(0);
            updateExamNavGrid();
            startExamTimer();
            showSimScreen('exam');
        }

        // ── Exam Screen shell ────────────────────────────────────────
        function renderExamScreen() {
            const t = translations[currentLang];
            const navBtns = examState.shuffledOrder.map((_, i) => `
                <button class="sim-nav-btn" id="sim-navbtn-${i}" onclick="jumpToQuestion(${i})">${i+1}</button>
            `).join('');
            document.getElementById('sim-screen-exam').innerHTML = `
                <div class="sim-timer-bar"><div class="sim-timer-fill" id="sim-timer-fill" style="width:100%"></div></div>
                <div class="sim-exam-header">
                    <div class="sim-timer" id="sim-timer-display">${SIMULADO_CONFIG.timeLimit}:00</div>
                    <div class="sim-q-counter" id="sim-q-counter">${t.sim_q_label||'Questão'} 1 ${t.sim_q_of||'de'} ${SIMULADO_CONFIG.questionCount}</div>
                    <button class="sim-flag-btn" id="sim-flag-btn" onclick="flagCurrentQuestion()">${t.sim_flag||'🚩 Marcar'}</button>
                </div>
                <div id="sim-question-area" class="sim-question-area"></div>
                <div class="sim-exam-nav">
                    <button class="sim-nav-prev" id="sim-prev-btn" onclick="navigateExam(-1)">${t.sim_prev||'← Anterior'}</button>
                    <button class="sim-submit-btn" onclick="confirmSubmitExam()">${t.sim_submit||'✅ Finalizar Prova'}</button>
                    <button class="sim-nav-next" id="sim-next-btn" onclick="navigateExam(1)">${t.sim_next||'Próxima →'}</button>
                </div>
                <div class="sim-nav-section" style="margin-top:24px">
                    <div class="sim-nav-label">Navegação</div>
                    <div class="sim-nav-grid" id="sim-nav-grid">${navBtns}</div>
                </div>
            `;
        }

        // ── Render Single Question ────────────────────────────────────
        function renderExamQuestion(qi) {
            examState.currentQ = qi;
            saveExamState();
            const t = translations[currentLang];
            const realIdx = examState.shuffledOrder[qi];
            const q = SIMULADO_QUESTIONS[realIdx];
            const area = document.getElementById('sim-question-area');
            if (!area) return;

            updateExamNavGrid();
            // Update counter
            const counter = document.getElementById('sim-q-counter');
            if (counter) counter.textContent = `${t.sim_q_label||'Questão'} ${qi+1} ${t.sim_q_of||'de'} ${SIMULADO_CONFIG.questionCount}`;
            // Update flag btn
            const flagBtn = document.getElementById('sim-flag-btn');
            if (flagBtn) {
                const isFlagged = examState.flagged.has(qi);
                flagBtn.textContent = isFlagged ? (t.sim_unflag||'🚩 Desmarcada') : (t.sim_flag||'🚩 Marcar');
                flagBtn.classList.toggle('flagged', isFlagged);
            }
            // Update nav btns
            const prevBtn = document.getElementById('sim-prev-btn');
            const nextBtn = document.getElementById('sim-next-btn');
            if (prevBtn) prevBtn.disabled = qi === 0;
            if (nextBtn) nextBtn.disabled = qi === examState.shuffledOrder.length - 1;

            // Type badge
            const typeLabels = { single: t.sim_type_single, multi: t.sim_type_multi, match: t.sim_type_match, order: t.sim_type_order, categorize: t.sim_type_categorize };
            const typeBadge = `<div class="sim-question-type-badge">📋 ${typeLabels[q.type] || q.type} &nbsp;·&nbsp; ${SIMULADO_DOMAINS[q.domain][currentLang]||SIMULADO_DOMAINS[q.domain].pt}</div>`;
            const scenarioHTML = q.scenario ? `<div class="sim-scenario">${q.scenario}</div>` : '';

            if (q.type === 'single' || q.type === 'multi') {
                const multiHint = q.type === 'multi' ? `<div class="sim-multi-hint">${typeof t.sim_multi_select_hint === 'function' ? t.sim_multi_select_hint(Array.isArray(q.correct)?q.correct.length:2) : 'Selecione as respostas corretas'}</div>` : '';
                const inputType = q.type === 'multi' ? 'checkbox' : 'radio';
                const currentAns = examState.answers[qi];
                const optionsHTML = q.options.map((opt, oi) => {
                    let isChecked = false;
                    if (q.type === 'single') isChecked = currentAns === oi;
                    else isChecked = Array.isArray(currentAns) && currentAns.includes(oi);
                    return `<li class="sim-option ${isChecked?'selected':''}" onclick="selectExamOption(${oi})">
                        <input type="${inputType}" id="sim-opt-${oi}" name="sim-q" value="${oi}" ${isChecked?'checked':''} style="pointer-events:none" />
                        <label>${opt}</label>
                    </li>`;
                }).join('');
                area.innerHTML = `${typeBadge}${scenarioHTML}<div class="sim-q-text">${qi+1}. ${q.question}</div>${multiHint}<ul class="sim-options">${optionsHTML}</ul>`;
            } else if (q.type === 'match') {
                renderMatchQuestion(qi, q, area, typeBadge, scenarioHTML);
            } else if (q.type === 'order') {
                renderOrderQuestion(qi, q, area, typeBadge, scenarioHTML);
            } else if (q.type === 'categorize') {
                renderCategorizeQuestion(qi, q, area, typeBadge, scenarioHTML);
            }
        }

        // ── Select Option (single/multi) ─────────────────────────────
        function selectExamOption(oi) {
            const qi = examState.currentQ;
            const realIdx = examState.shuffledOrder[qi];
            const q = SIMULADO_QUESTIONS[realIdx];
            if (q.type === 'single') {
                examState.answers[qi] = oi;
                document.querySelectorAll('.sim-option').forEach((el, i) => {
                    el.classList.toggle('selected', i === oi);
                    const inp = el.querySelector('input');
                    if (inp) inp.checked = i === oi;
                });
            } else {
                let arr = Array.isArray(examState.answers[qi]) ? [...examState.answers[qi]] : [];
                const idx = arr.indexOf(oi);
                if (idx >= 0) arr.splice(idx, 1); else arr.push(oi);
                examState.answers[qi] = arr;
                document.querySelectorAll('.sim-option').forEach((el, i) => {
                    el.classList.toggle('selected', arr.includes(i));
                    const inp = el.querySelector('input');
                    if (inp) inp.checked = arr.includes(i);
                });
            }
            updateExamNavGrid();
            saveExamState();
        }

        // ── Flag Question ────────────────────────────────────────────
        function flagCurrentQuestion() {
            const qi = examState.currentQ;
            const t = translations[currentLang];
            if (examState.flagged.has(qi)) {
                examState.flagged.delete(qi);
            } else {
                examState.flagged.add(qi);
            }
            const flagBtn = document.getElementById('sim-flag-btn');
            if (flagBtn) {
                const isFlagged = examState.flagged.has(qi);
                flagBtn.textContent = isFlagged ? (t.sim_unflag||'🚩 Desmarcada') : (t.sim_flag||'🚩 Marcar');
                flagBtn.classList.toggle('flagged', isFlagged);
            }
            updateExamNavGrid();
            saveExamState();
        }

        // ── Navigate ─────────────────────────────────────────────────
        function navigateExam(dir) {
            const next = examState.currentQ + dir;
            if (next >= 0 && next < examState.shuffledOrder.length) {
                renderExamQuestion(next);
            }
        }
        function jumpToQuestion(qi) {
            renderExamQuestion(qi);
        }

        // ── Nav Grid ─────────────────────────────────────────────────
        function updateExamNavGrid() {
            examState.shuffledOrder.forEach((_, i) => {
                const btn = document.getElementById(`sim-navbtn-${i}`);
                if (!btn) return;
                btn.className = 'sim-nav-btn';
                const hasAnswer = examState.answers[i] !== undefined && examState.answers[i] !== null && !(Array.isArray(examState.answers[i]) && examState.answers[i].length === 0);
                if (hasAnswer) btn.classList.add('answered');
                if (examState.flagged.has(i)) btn.classList.add('flagged');
                if (i === examState.currentQ) btn.classList.add('current');
            });
        }

        // ── Timer ────────────────────────────────────────────────────
        function startExamTimer() {
            if (examTimerInterval) clearInterval(examTimerInterval);
            examTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - examState.startTime) / 1000) + (examState.elapsedSeconds || 0);
                const remaining = SIMULADO_CONFIG.timeLimit * 60 - elapsed;
                if (remaining <= 0) {
                    clearInterval(examTimerInterval);
                    examState.autoSubmitted = true;
                    const t = translations[currentLang];
                    alert(t.sim_time_up || '⏰ Tempo esgotado!');
                    finishExam();
                    return;
                }
                const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
                const ss = String(remaining % 60).padStart(2, '0');
                const display = document.getElementById('sim-timer-display');
                const fill = document.getElementById('sim-timer-fill');
                const pct = (remaining / (SIMULADO_CONFIG.timeLimit * 60)) * 100;
                const isWarning = remaining <= 300;
                if (display) { display.textContent = `${mm}:${ss}`; display.classList.toggle('warning', isWarning); }
                if (fill) { fill.style.width = pct + '%'; fill.classList.toggle('warning', isWarning); }
            }, 1000);
        }

        // ── Submit ────────────────────────────────────────────────────
        function confirmSubmitExam() {
            const t = translations[currentLang];
            if (confirm(t.sim_submit_confirm || 'Deseja finalizar a prova?')) finishExam();
        }
        function finishExam() {
            if (examTimerInterval) clearInterval(examTimerInterval);
            examState.finished = true;
            examState.elapsedSeconds = Math.floor((Date.now() - examState.startTime) / 1000);
            saveExamState();
            renderExamResults();
            showSimScreen('results');
        }

        // ── Calculate Results ─────────────────────────────────────────
        function calculateExamResults() {
            let domainStats = SIMULADO_DOMAINS.map(d => ({ id: d.id, correct: 0, total: 0 }));
            let totalCorrect = 0;
            examState.shuffledOrder.forEach((realIdx, qi) => {
                const q = SIMULADO_QUESTIONS[realIdx];
                const ans = examState.answers[qi];
                domainStats[q.domain].total++;
                if (isAnswerCorrect(q, ans)) { domainStats[q.domain].correct++; totalCorrect++; }
            });
            // Scale to 1000
            const totalQ = SIMULADO_CONFIG.questionCount;
            let scaledScore = Math.round((totalCorrect / totalQ) * SIMULADO_CONFIG.totalScore);
            scaledScore = Math.max(100, scaledScore); // minimum 100 on Microsoft scale
            return { domainStats, totalCorrect, totalQ, scaledScore };
        }

        function isAnswerCorrect(q, ans) {
            if (ans === undefined || ans === null) return false;
            if (q.type === 'single') return ans === q.correct;
            if (q.type === 'multi') {
                if (!Array.isArray(ans) || !Array.isArray(q.correct)) return false;
                return ans.length === q.correct.length && [...q.correct].every(c => ans.includes(c));
            }
            if (q.type === 'match') {
                if (!ans || typeof ans !== 'object') return false;
                return q.pairs.every(p => String(ans[p.id]) === String(p.id));
            }
            if (q.type === 'order') {
                if (!Array.isArray(ans)) return false;
                return JSON.stringify(ans) === JSON.stringify(q.correctOrder);
            }
            if (q.type === 'categorize') {
                if (!ans || typeof ans !== 'object') return false;
                return q.items.every(item => ans[item.id] === item.correctCategory);
            }
            return false;
        }

        // ── Render Results ────────────────────────────────────────────
        function renderExamResults() {
            const t = translations[currentLang];
            const { domainStats, totalCorrect, totalQ, scaledScore } = calculateExamResults();
            const passed = scaledScore >= SIMULADO_CONFIG.passScore;
            const totalSeconds = examState.elapsedSeconds || 0;
            const mm = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const ss = String(totalSeconds % 60).padStart(2, '0');
            const skipped = examState.shuffledOrder.filter((_, qi) => {
                const ans = examState.answers[qi];
                return ans === undefined || ans === null || (Array.isArray(ans) && ans.length === 0);
            }).length;

            const domainsHTML = domainStats.map((ds, i) => {
                const d = SIMULADO_DOMAINS[i];
                const pct = ds.total > 0 ? Math.round((ds.correct / ds.total) * 100) : 0;
                let verdict, verdictClass;
                if (pct >= 85) { verdict = t.sim_verdict_excellent||'✅ Excelente'; verdictClass = 'good'; }
                else if (pct >= 70) { verdict = t.sim_verdict_good||'✅ Bom'; verdictClass = 'good'; }
                else if (pct >= 50) { verdict = t.sim_verdict_improve||'⚠️ Precisa melhorar'; verdictClass = 'ok'; }
                else { verdict = t.sim_verdict_critical||'❌ Área crítica'; verdictClass = 'bad'; }
                return `<div class="sim-domain-row">
                    <div class="sim-domain-row-header">
                        <div class="sim-domain-row-name"><span style="color:${d.color}">${d.icon}</span> ${d[currentLang]||d.pt} <small style="color:var(--text-muted);font-weight:400">(${d.weight})</small></div>
                        <div class="sim-domain-row-pct">${ds.correct}/${ds.total}</div>
                    </div>
                    <div class="sim-domain-bar-bg"><div class="sim-domain-bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
                    <div class="sim-domain-verdict ${verdictClass}">${verdict} — ${pct}%</div>
                </div>`;
            }).join('');

            const recsHTML = domainStats.map((ds, i) => {
                const d = SIMULADO_DOMAINS[i];
                const pct = ds.total > 0 ? Math.round((ds.correct / ds.total) * 100) : 0;
                if (pct >= 70) {
                    return `<div class="sim-rec-item ok"><div class="sim-rec-icon">✅</div><div class="sim-rec-text"><strong>${d[currentLang]||d.pt}</strong> — Bom desempenho! Continue revisando para manter o nível.</div></div>`;
                } else {
                    return `<div class="sim-rec-item"><div class="sim-rec-icon">📖</div><div class="sim-rec-text"><strong>${d[currentLang]||d.pt}</strong> — ${pct}% de acerto. Revise o módulo correspondente e refaça os exercícios desta área.</div></div>`;
                }
            }).join('');

            document.getElementById('sim-screen-results').innerHTML = `
                <div class="sim-report-hero ${passed?'pass':'fail'}">
                    <div class="sim-score-value">${scaledScore}</div>
                    <div class="sim-score-max">/ ${SIMULADO_CONFIG.totalScore}</div>
                    <div class="sim-pass-badge ${passed?'pass':'fail'}">${passed ? (t.sim_pass||'✅ APROVADO') : (t.sim_fail||'❌ REPROVADO')}</div>
                    <div class="sim-report-stats">
                        <span class="sim-report-stat">${t.sim_correct_count||'Corretas'}: <span>${totalCorrect}</span></span> &nbsp;·&nbsp;
                        <span class="sim-report-stat">${t.sim_wrong_count||'Erradas'}: <span>${totalQ - totalCorrect - skipped}</span></span> &nbsp;·&nbsp;
                        <span class="sim-report-stat">${t.sim_skipped_count||'Não respondidas'}: <span>${skipped}</span></span> &nbsp;·&nbsp;
                        <span class="sim-report-stat">${t.sim_time_taken||'Tempo'}: <span>${mm}:${ss}</span></span>
                    </div>
                    <div style="color:rgba(255,255,255,0.7);font-size:0.85em;margin-top:12px">${t.sim_pass_score||'Nota de aprovação: 700'}</div>
                </div>

                <div class="sim-domain-chart">
                    <h3>${t.sim_domain_chart_title||'Desempenho por Área'}</h3>
                    <p class="sim-domain-chart-subtitle">${t.sim_domain_chart_sub||'As barras mostram seu desempenho em cada domínio'}</p>
                    ${domainsHTML}
                    <p class="sim-domain-passing-note">${t.sim_domain_passing_note||'⚠️ A aprovação baseia-se na pontuação total ponderada.'}</p>
                </div>

                <div class="sim-recommendations">
                    <h3>${t.sim_rec_title||'📚 Recomendações de Estudo'}</h3>
                    ${recsHTML}
                </div>

                <div class="sim-report-actions">
                    <button class="sim-review-btn" onclick="showExamReview('all')">${t.sim_review_btn||'🔍 Revisar Questões'}</button>
                    <button class="sim-retry-btn" onclick="resetExam()">${t.sim_retry_btn||'🔄 Refazer Simulado'}</button>
                </div>
            `;
        }

        // ── Review ────────────────────────────────────────────────────
        function showExamReview(filter) {
            const t = translations[currentLang];
            const filters = [
                { key: 'all', label: t.sim_filter_all||'Todas' },
                { key: 'correct', label: t.sim_filter_correct||'✅ Corretas' },
                { key: 'wrong', label: t.sim_filter_wrong||'❌ Erradas' },
                { key: 'skipped', label: t.sim_filter_skipped||'⏭️ Puladas' }
            ];
            const filterBtns = filters.map(f => `<button class="sim-filter-btn ${filter===f.key?'active':''}" onclick="showExamReview('${f.key}')">${f.label}</button>`).join('');

            const cards = examState.shuffledOrder.map((realIdx, qi) => {
                const q = SIMULADO_QUESTIONS[realIdx];
                const ans = examState.answers[qi];
                const correct = isAnswerCorrect(q, ans);
                const skipped = ans === undefined || ans === null || (Array.isArray(ans) && ans.length === 0);
                if (filter === 'correct' && !correct) return '';
                if (filter === 'wrong' && (correct || skipped)) return '';
                if (filter === 'skipped' && !skipped) return '';

                const cardClass = skipped ? 'skipped' : (correct ? 'correct' : 'incorrect');
                const numClass = skipped ? 'skipped' : (correct ? 'correct' : 'incorrect');
                const domainName = SIMULADO_DOMAINS[q.domain][currentLang] || SIMULADO_DOMAINS[q.domain].pt;
                const scenarioHTML = q.scenario ? `<div class="sim-scenario" style="margin-bottom:12px">${q.scenario}</div>` : '';

                let answerHTML = '';
                if (q.type === 'single' || q.type === 'multi') {
                    answerHTML = `<div class="sim-review-options">${q.options.map((opt, oi) => {
                        const correctArr = Array.isArray(q.correct) ? q.correct : [q.correct];
                        const userArr = Array.isArray(ans) ? ans : (ans !== undefined ? [ans] : []);
                        const isCorrectOpt = correctArr.includes(oi);
                        const isUserOpt = userArr.includes(oi);
                        let cls = '', icon = '';
                        if (isUserOpt && isCorrectOpt) { cls = 'user-correct'; icon = '✅'; }
                        else if (isUserOpt && !isCorrectOpt) { cls = 'user-wrong'; icon = '❌'; }
                        else if (!isUserOpt && isCorrectOpt) { cls = 'missed-correct'; icon = '✓'; }
                        return `<div class="sim-review-option ${cls}"><span class="sim-review-option-icon">${icon||'○'}</span>${opt}</div>`;
                    }).join('')}</div>`;
                } else {
                    let correctText = '', userText = '';
                    if (q.type === 'match') {
                        correctText = q.pairs.map(p => `${p.source} → ${p.target}`).join('<br>');
                        if (!skipped && ans && typeof ans === 'object') {
                            userText = q.pairs.map(p => {
                                const placedId = ans[p.id];
                                const placedSource = placedId !== undefined ? q.pairs.find(x => String(x.id) === String(placedId))?.source : null;
                                const icon = String(placedId) === String(p.id) ? '✅' : '❌';
                                return `${icon} ${placedSource || '<em>vazio</em>'} → ${p.target}`;
                            }).join('<br>');
                        }
                    }
                    if (q.type === 'order') {
                        correctText = q.items.slice().sort((a,b) => q.correctOrder.indexOf(a.id) - q.correctOrder.indexOf(b.id)).map((item,i) => `${i+1}. ${item.text}`).join('<br>');
                        if (!skipped && Array.isArray(ans) && ans.length > 0) {
                            userText = ans.map((id, i) => {
                                const item = q.items.find(it => it.id === id);
                                const isCorrectPos = q.correctOrder[i] === id;
                                return `${isCorrectPos ? '✅' : '❌'} ${i+1}. ${item ? item.text : '?'}`;
                            }).join('<br>');
                        }
                    }
                    if (q.type === 'categorize') {
                        correctText = q.items.map(item => { const cat = q.categories.find(c => c.id === item.correctCategory); return `${item.text} → ${cat ? cat.label : '?'}`; }).join('<br>');
                        if (!skipped && ans && typeof ans === 'object') {
                            userText = q.items.map(item => {
                                const userCatId = ans[item.id];
                                const userCat = userCatId ? q.categories.find(c => c.id === userCatId) : null;
                                const isCorrect = userCatId === item.correctCategory;
                                return `${isCorrect ? '✅' : (userCat ? '❌' : '⬜')} ${item.text} → ${userCat ? userCat.label : '<em>não classificado</em>'}`;
                            }).join('<br>');
                        }
                    }
                    const userBlock = skipped
                        ? `<div class="sim-review-drag-answer"><strong>${t.sim_skipped_label||'Não respondida'}</strong></div>`
                        : `<div class="sim-review-drag-answer ${correct ? 'correct' : 'incorrect'}">
                               <strong>${correct ? (t.sim_answer_correct||'Sua resposta: CORRETA ✅') : (t.sim_answer_wrong||'Sua resposta: INCORRETA ❌')}</strong>
                               ${userText ? `<div style="margin-top:8px;line-height:1.8">${userText}</div>` : ''}
                           </div>`;
                    answerHTML = `
                        ${userBlock}
                        ${!correct && !skipped ? `<div class="sim-review-drag-answer correct">
                            <strong>${t.sim_correct_answer||'Resposta correta:'}</strong>
                            <div style="margin-top:8px;line-height:1.8">${correctText}</div>
                        </div>` : ''}`;
                }

                return `<div class="sim-review-card ${cardClass}">
                    <div class="sim-review-q-header">
                        <span class="sim-review-q-num ${numClass}">Q${qi+1}</span>
                        <div class="sim-review-q-text">${q.question}</div>
                        <span class="sim-review-domain-tag">${domainName}</span>
                    </div>
                    ${scenarioHTML}
                    ${answerHTML}
                    <div class="sim-review-explanation">${q.explanation}</div>
                </div>`;
            }).join('');

            document.getElementById('sim-screen-results').innerHTML = `
                <div class="sim-review-header">
                    <div class="sim-review-title">${t.sim_review_title||'Revisão das Questões'}</div>
                    <div class="sim-review-filters">${filterBtns}</div>
                </div>
                <div style="margin-bottom:16px">
                    <button class="sim-retry-btn" style="margin-right:8px" onclick="renderExamResults();showSimScreen('results');">${t.sim_back_results||'← Voltar aos Resultados'}</button>
                </div>
                ${cards || '<p style="color:var(--text-muted);text-align:center;padding:40px">Nenhuma questão nesta categoria.</p>'}
            `;
        }

        // ── Reset ─────────────────────────────────────────────────────
        function resetExam() {
            if (examTimerInterval) clearInterval(examTimerInterval);
            clearExamState();
            showSimScreen('intro');
            const introEl = document.getElementById('sim-screen-intro');
            if (introEl) renderSimIntro(null);
        }

        // ── Drag Engine (Pointer Events) ──────────────────────────────
        function initDragEngine(container, itemSel, dropSel, onDrop, onHover) {
            let drag = null;
            function getDropTarget(x, y) {
                for (const el of container.querySelectorAll(dropSel)) {
                    const r = el.getBoundingClientRect();
                    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return el;
                }
                return null;
            }
            container.addEventListener('pointerdown', e => {
                const item = e.target.closest(itemSel);
                if (!item) return;
                e.preventDefault();
                item.setPointerCapture(e.pointerId);
                const rect = item.getBoundingClientRect();
                const ghost = item.cloneNode(true);
                ghost.className = item.className + ' sim-drag-ghost';
                ghost.style.cssText = `position:fixed;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;pointer-events:none;`;
                document.body.appendChild(ghost);
                drag = { item, ghost, ox: e.clientX - rect.left, oy: e.clientY - rect.top, pid: e.pointerId };
                item.classList.add('dragging');
            }, { passive: false });

            container.addEventListener('pointermove', e => {
                if (!drag || e.pointerId !== drag.pid) return;
                drag.ghost.style.left = (e.clientX - drag.ox) + 'px';
                drag.ghost.style.top = (e.clientY - drag.oy) + 'px';
                container.querySelectorAll(dropSel).forEach(el => el.classList.remove('over'));
                const target = getDropTarget(e.clientX, e.clientY);
                if (target) { target.classList.add('over'); if (onHover) onHover(drag.item, target); }
            });

            container.addEventListener('pointerup', e => {
                if (!drag || e.pointerId !== drag.pid) return;
                drag.ghost.remove();
                drag.item.classList.remove('dragging');
                container.querySelectorAll(dropSel).forEach(el => el.classList.remove('over'));
                const target = getDropTarget(e.clientX, e.clientY);
                onDrop(drag.item, target);
                drag = null;
            });
        }

        // ── Match Question ────────────────────────────────────────────
        function renderMatchQuestion(qi, q, area, typeBadge, scenarioHTML) {
            const t = translations[currentLang];
            const saved = examState.answers[qi] || {};
            // Shuffle pairs display order
            const shuffledPairs = [...q.pairs].sort(() => Math.random() - 0.5);
            const poolItems = shuffledPairs.map(p => {
                const placed = Object.values(saved).map(String).includes(String(p.id));
                return `<div class="sim-match-item ${placed?'placed':''}" data-pair-id="${p.id}">${p.source}</div>`;
            }).join('');
            const targetRows = q.pairs.map(p => {
                const placedPairId = Object.keys(saved).find(k => String(k) === String(p.id) && String(saved[k]) !== '');
                const placedSource = placedPairId !== undefined ? q.pairs.find(x => String(x.id) === String(saved[placedPairId]))?.source : null;
                const slotContent = placedSource ? `<div class="sim-match-item placed" data-pair-id="${p.id}">${placedSource}</div>` : `<span class="sim-match-slot-placeholder">${t.sim_drag_placeholder||'Arraste aqui'}</span>`;
                return `<div class="sim-match-target-row">
                    <div class="sim-match-target-label">${p.target}</div>
                    <div class="sim-match-slot ${placedSource?'filled':''}" data-slot-id="${p.id}">${slotContent}</div>
                </div>`;
            }).join('');

            area.innerHTML = `${typeBadge}${scenarioHTML}
                <div class="sim-q-text">${qi+1}. ${q.question}</div>
                <div class="sim-match-container">
                    <div>
                        <div class="sim-match-pool-label">${t.sim_drag_source||'ITENS'}</div>
                        <div class="sim-match-pool" id="sim-match-pool">${poolItems}</div>
                    </div>
                    <div>
                        <div class="sim-match-targets-label">${t.sim_drag_targets||'PARES'}</div>
                        <div class="sim-match-targets" id="sim-match-targets">${targetRows}</div>
                    </div>
                </div>`;

            const container = area.querySelector('.sim-match-container');
            initDragEngine(container, '.sim-match-item', '.sim-match-slot,.sim-match-pool', (item, target) => {
                const pairId = item.dataset.pairId;
                // Remove from current slot
                container.querySelectorAll('.sim-match-slot').forEach(slot => {
                    if (slot.contains(item)) { slot.innerHTML = `<span class="sim-match-slot-placeholder">${t.sim_drag_placeholder||'Arraste aqui'}</span>`; slot.classList.remove('filled'); }
                });
                // Remove from pool if there
                const pool = container.querySelector('#sim-match-pool');
                if (pool && pool.contains(item)) pool.removeChild(item);

                if (target && target.classList.contains('sim-match-slot')) {
                    // Return old item in slot to pool if any
                    const existing = target.querySelector('.sim-match-item');
                    if (existing) { existing.classList.remove('placed'); pool.appendChild(existing); }
                    // Place new item
                    target.innerHTML = '';
                    item.classList.add('placed');
                    target.appendChild(item);
                    target.classList.add('filled');
                } else {
                    // Return to pool
                    item.classList.remove('placed');
                    pool.appendChild(item);
                }
                // Save answer
                const ans = {};
                container.querySelectorAll('.sim-match-slot').forEach(slot => {
                    const placedItem = slot.querySelector('.sim-match-item');
                    if (placedItem) ans[slot.dataset.slotId] = placedItem.dataset.pairId;
                });
                examState.answers[qi] = ans;
                updateExamNavGrid();
                saveExamState();
            });
        }

        // ── Order Question ────────────────────────────────────────────
        function renderOrderQuestion(qi, q, area, typeBadge, scenarioHTML) {
            const t = translations[currentLang];
            const saved = examState.answers[qi];
            let currentOrder;
            if (saved && Array.isArray(saved) && saved.length === q.items.length) {
                currentOrder = saved.map(id => q.items.find(it => it.id === id));
            } else {
                // Shuffle for display
                currentOrder = [...q.items].sort(() => Math.random() - 0.5);
            }

            function buildList() {
                return currentOrder.map((item, i) => `
                    <div class="sim-order-item" data-item-id="${item.id}">
                        <span class="sim-order-handle">⠿</span>
                        <span class="sim-order-num">${i+1}.</span>
                        <span class="sim-order-text">${item.text}</span>
                    </div>
                `).join('');
            }

            area.innerHTML = `${typeBadge}${scenarioHTML}
                <div class="sim-q-text">${qi+1}. ${q.question}</div>
                <p style="font-size:0.83em;color:var(--text-muted);margin-bottom:12px">${t.sim_order_instruction||'Arraste os itens para ordenar corretamente'}</p>
                <div class="sim-order-list" id="sim-order-list">${buildList()}</div>`;

            const list = area.querySelector('#sim-order-list');
            let draggingEl = null, placeholder = null;

            list.querySelectorAll('.sim-order-item').forEach(item => {
                item.style.touchAction = 'none';
            });

            function saveOrder() {
                const ids = [...list.querySelectorAll('.sim-order-item')].map(el => parseInt(el.dataset.itemId));
                examState.answers[qi] = ids;
                updateExamNavGrid();
                saveExamState();
                // Update numbers
                list.querySelectorAll('.sim-order-item').forEach((el, i) => {
                    el.querySelector('.sim-order-num').textContent = `${i+1}.`;
                });
            }

            list.addEventListener('pointerdown', e => {
                draggingEl = e.target.closest('.sim-order-item');
                if (!draggingEl) return;
                e.preventDefault();
                draggingEl.setPointerCapture(e.pointerId);
                draggingEl.classList.add('dragging');
                placeholder = document.createElement('div');
                placeholder.className = 'sim-order-item';
                placeholder.style.opacity = '0'; placeholder.style.height = draggingEl.offsetHeight + 'px';
                draggingEl.parentNode.insertBefore(placeholder, draggingEl.nextSibling);
            }, { passive: false });

            list.addEventListener('pointermove', e => {
                if (!draggingEl) return;
                const items = [...list.querySelectorAll('.sim-order-item:not(.dragging)')].filter(el => el !== placeholder);
                for (const item of items) {
                    const rect = item.getBoundingClientRect();
                    if (e.clientY < rect.top + rect.height / 2) {
                        list.insertBefore(placeholder, item);
                        break;
                    } else if (item === items[items.length - 1]) {
                        list.appendChild(placeholder);
                    }
                }
            });

            list.addEventListener('pointerup', e => {
                if (!draggingEl) return;
                draggingEl.classList.remove('dragging');
                list.insertBefore(draggingEl, placeholder);
                placeholder.remove();
                draggingEl = null;
                saveOrder();
            });
        }

        // ── Categorize Question ───────────────────────────────────────
        function renderCategorizeQuestion(qi, q, area, typeBadge, scenarioHTML) {
            const t = translations[currentLang];
            const saved = examState.answers[qi] || {};
            const poolItems = q.items.filter(item => !saved[item.id]).map(item =>
                `<div class="sim-categorize-item" data-item-id="${item.id}">${item.text}</div>`
            ).join('');
            const bucketsHTML = q.categories.map(cat => {
                const catItems = q.items.filter(item => saved[item.id] === cat.id).map(item =>
                    `<div class="sim-categorize-item" data-item-id="${item.id}" data-cat="${cat.id}">${item.text}</div>`
                ).join('');
                return `<div class="sim-bucket" data-cat-id="${cat.id}">
                    <div class="sim-bucket-header">${cat.label}</div>
                    <div class="sim-bucket-body" data-cat-id="${cat.id}">${catItems}</div>
                </div>`;
            }).join('');

            area.innerHTML = `${typeBadge}${scenarioHTML}
                <div class="sim-q-text">${qi+1}. ${q.question}</div>
                <p style="font-size:0.83em;color:var(--text-muted);margin-bottom:12px">${t.sim_categorize_pool_label||'Arraste os itens abaixo para as categorias'}</p>
                <div class="sim-categorize-pool" id="sim-cat-pool">${poolItems}</div>
                <div class="sim-categorize-buckets" id="sim-cat-buckets">${bucketsHTML}</div>`;

            const container = area;
            function saveCategories() {
                const ans = {};
                container.querySelectorAll('.sim-bucket-body').forEach(body => {
                    const catId = body.dataset.catId;
                    body.querySelectorAll('.sim-categorize-item').forEach(item => {
                        ans[item.dataset.itemId] = catId;
                    });
                });
                examState.answers[qi] = ans;
                updateExamNavGrid();
                saveExamState();
            }
            initDragEngine(container, '.sim-categorize-item', '.sim-bucket,.sim-categorize-pool', (item, target) => {
                if (!target) { document.getElementById('sim-cat-pool').appendChild(item); }
                else if (target.classList.contains('sim-categorize-pool')) { target.appendChild(item); }
                else {
                    // target is .sim-bucket — append to its body child
                    const body = target.querySelector('.sim-bucket-body') || target;
                    body.appendChild(item);
                }
                saveCategories();
            });
        }

        // Initialize on load
        window.onload = init;
    </script>
