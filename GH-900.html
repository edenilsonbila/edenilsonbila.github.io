        /* ==========================================
           RESET & BASE STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.8;
            color: var(--text-body);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ==========================================
           HEADER - Minimalista e focado
           ========================================== */
        .header {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
            border-left: 4px solid var(--accent);
            position: relative;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 2em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 .icon {
            color: var(--accent);
        }

        .header p.subtitle {
            color: var(--text-muted);
            font-size: 1.05em;
            font-weight: 400;
        }

        /* Toggle buttons */
        .header-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            top: 16px;
            right: 16px;
        }

        .toggle-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toggle-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Progress bar - Clean and minimal */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 8px;
            margin-top: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95em;
        }

        /* ==========================================
           TABS - Simples e claros
           ========================================== */
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .tab {
            background: var(--bg-card);
            padding: 20px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            border: 2px solid transparent;
            position: relative;
        }

        .tab:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px var(--accent-shadow);
        }

        .tab-title {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 6px;
            color: inherit;
        }

        .tab-duration {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .tab.active .tab-duration {
            opacity: 0.9;
        }

        .tab-checkmark {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }

        .tab.completed .tab-checkmark {
            display: flex;
        }

        /* ==========================================
           CONTENT AREA - Espaçoso e limpo
           ========================================== */
        .content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 48px;
            box-shadow: var(--shadow-md);
        }

        .module {
            display: none;
        }

        .module.active {
            display: block;
        }

        /* ==========================================
           LESSON BLOCKS - Chunking para reduzir carga cognitiva
           ========================================== */
        .lesson {
            margin-bottom: 48px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .lesson h3 {
            color: var(--text-primary);
            font-size: 1.75em;
            margin-bottom: 8px;
            font-weight: 700;
            line-height: 1.3;
        }

        .lesson h4 {
            color: var(--text-body);
            font-size: 1.25em;
            margin-top: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .mark-complete {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px var(--accent-shadow);
        }

        .mark-complete:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px var(--accent-shadow);
            transform: translateY(-1px);
        }

        .mark-complete:active {
            transform: translateY(0);
        }

        .mark-complete.completed {
            background: var(--success);
            box-shadow: 0 2px 8px rgba(72,187,120,0.2);
        }

        .mark-complete.completed:hover {
            background: var(--success-hover);
            box-shadow: 0 4px 12px rgba(72,187,120,0.4);
        }

        /* ==========================================
           CONTENT BOXES - Redução de carga cognitiva
           Cores baseadas em psicologia cognitiva
           ========================================== */
        .macete {
            background: var(--macete-bg);
            border-left: 4px solid var(--macete-border);
            color: var(--macete-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .macete::before {
            content: "🔑 MACETE";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--macete-border);
        }

        .tip {
            background: var(--tip-bg);
            border-left: 4px solid var(--tip-border);
            color: var(--tip-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .tip::before {
            content: "💡 DICA";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--tip-border);
        }

        .warning {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            color: var(--warning-text);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: var(--shadow-sm);
        }

        .warning::before {
            content: "⚠️ ATENÇÃO";
            display: block;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: var(--warning-border);
        }

        .example {
            background: var(--example-bg);
            border-left: 4px solid var(--example-border);
            padding: 24px;
            border-radius: 8px;
            margin: 32px 0;
            color: var(--example-text);
            box-shadow: var(--shadow-sm);
        }

        .example::before {
            content: "📝 EXEMPLO";
            display: block;
            font-weight: 700;
            color: var(--example-border);
            font-size: 0.85em;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Bilingual ::before labels */
        html[lang="en"] .macete::before { content: "🔑 MNEMONIC"; }
        html[lang="en"] .tip::before { content: "💡 TIP"; }
        html[lang="en"] .warning::before { content: "⚠️ WARNING"; }
        html[lang="en"] .example::before { content: "📝 EXAMPLE"; }
        html[lang="en"] .explanation::before { content: "💬 EXPLANATION"; }

        /* ==========================================
           TYPOGRAPHY - Legibilidade otimizada
           ========================================== */
        ul, ol {
            margin-left: 24px;
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 12px;
            line-height: 1.7;
        }

        p {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        strong {
            color: var(--text-body);
            font-weight: 700;
        }

        /* ==========================================
           EXERCISES - Feedback imediato e claro
           ========================================== */
        .exercises {
            margin-top: 64px;
            padding-top: 48px;
            border-top: 2px solid var(--border);
        }

        .exercises > h3 {
            color: var(--text-primary);
            font-size: 1.5em;
            margin-bottom: 32px;
            font-weight: 700;
        }

        .exercise-card {
            background: var(--bg-card-alt);
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
            border: 2px solid var(--border);
            transition: all 0.2s ease;
        }

        .exercise-card:hover {
            border-color: var(--border-hover);
        }

        .exercise-card.correct {
            border-color: var(--success);
            background: var(--example-bg);
        }

        .exercise-card.incorrect {
            border-color: var(--danger);
            background: var(--warning-bg);
        }

        .question {
            font-weight: 600;
            font-size: 1.05em;
            margin-bottom: 24px;
            color: var(--text-body);
            line-height: 1.6;
        }

        .options {
            list-style: none;
            margin: 0;
        }

        .option {
            background: var(--bg-card);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
        }

        .option.selected {
            background: var(--tip-bg);
            border-color: var(--accent);
        }

        .option.correct {
            background: var(--example-bg);
            border-color: var(--success);
        }

        .option.incorrect {
            background: var(--warning-bg);
            border-color: var(--danger);
        }

        .explanation {
            margin-top: 24px;
            padding: 20px;
            background: var(--explanation-bg);
            border-radius: 6px;
            border-left: 4px solid var(--explanation-border);
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation::before {
            content: "💬 EXPLICAÇÃO";
            display: block;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 0.85em;
        }

        /* Botão de ação principal (laranja para engajamento) */
        .check-answers-btn {
            background: var(--warning-accent);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            margin: 40px auto;
            box-shadow: 0 2px 8px rgba(237,137,54,0.3);
        }

        .check-answers-btn:hover {
            background: var(--warning-hover);
            box-shadow: 0 4px 12px rgba(237,137,54,0.4);
        }

        .check-answers-btn:active {
            transform: scale(0.98);
        }

        .score {
            text-align: center;
            font-size: 1.3em;
            font-weight: 600;
            color: var(--text-body);
            margin-top: 32px;
            padding: 24px;
            background: var(--score-bg);
            border-radius: 8px;
            display: none;
            border: 2px solid var(--score-border);
        }

        .score.show {
            display: block;
        }

        /* ==========================================
           NAVIGATION - Simples e funcional
           ========================================== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 48px;
            gap: 16px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }

        .nav-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .nav-btn.prev {
            background: var(--border);
            color: var(--text-secondary);
        }

        .nav-btn.prev:hover {
            background: var(--border-hover);
        }

        .nav-btn.next {
            background: var(--accent);
            color: white;
        }

        .nav-btn.next:hover {
            background: var(--accent-hover);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            background: var(--border);
        }

        /* ==========================================
           ACTIVE RECALL - Técnica de recuperação ativa
           ========================================== */
        .active-recall {
            background: var(--recall-bg);
            border: 2px dashed var(--recall-border);
            border-radius: 8px;
            padding: 24px;
            margin: 32px 0;
        }

        .active-recall summary {
            font-weight: 700;
            color: var(--recall-border);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95em;
            user-select: none;
        }

        .active-recall summary::-webkit-details-marker {
            display: none;
        }

        .active-recall summary::before {
            content: "🤔";
            font-size: 1.2em;
        }

        .active-recall[open] summary::before {
            content: "💡";
        }

        .active-recall summary:hover {
            color: var(--recall-border);
        }

        .active-recall .recall-content {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--recall-divider);
            color: var(--recall-text);
        }

        /* ==========================================
           UTILITIES
           ========================================== */
        .separator {
            height: 1px;
            background: var(--border);
            margin: 32px 0;
        }

        .highlight {
            background: var(--highlight-bg);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            color: var(--highlight-text);
        }

        code {
            background: var(--code-bg);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--code-text);
            font-size: 0.9em;
        }

        .icon {
            font-size: 1.3em;
        }

        /* ==========================================
           INTRO PAGE STYLES - Específicos para módulo de introdução
           ========================================== */
        .intro-section {
            background: var(--intro-section-bg);
            padding: 32px;
            margin: 24px 0;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .intro-section h4 {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.3em;
        }

        .intro-section p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .intro-highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            margin: 32px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .intro-highlight h3 {
            color: white;
            margin-bottom: 12px;
            font-size: 1.5em;
        }

        .intro-highlight p {
            color: rgba(255,255,255,0.95);
            font-size: 1.1em;
            margin: 0;
        }

        .study-tips {
            background: var(--study-bg);
            border: 2px solid var(--study-border);
            border-radius: 10px;
            padding: 28px;
            margin: 28px 0;
        }

        .study-tips h4 {
            color: var(--study-title);
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.2em;
        }

        .study-tips ul {
            margin-left: 20px;
        }

        .study-tips li {
            color: var(--text-body);
            margin-bottom: 12px;
            line-height: 1.7;
        }

        /* ==========================================
           FOOTER - Copyright
           ========================================== */
        .footer {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 32px;
            margin-top: 40px;
            text-align: center;
            box-shadow: var(--shadow-md);
            border-top: 3px solid var(--accent);
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 1.2em;
        }

        .footer p {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .footer-license {
            background: var(--footer-license-bg);
            border: 1px solid var(--footer-license-border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .footer-license strong {
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .footer-license p {
            color: var(--footer-license-text);
            margin: 0;
            font-size: 0.9em;
        }

        .footer-author {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-body);
            font-weight: 500;
        }

        .footer-author span {
            color: var(--accent);
            font-weight: 600;
        }

        .action-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 24px 32px;
            border-radius: 10px;
            margin: 28px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .action-box h4 {
            color: white;
            margin: 0 0 12px 0;
            font-size: 1.3em;
        }

        .action-box p {
            color: rgba(255,255,255,0.95);
            margin: 0;
            font-size: 1.05em;
        }

        .action-box a {
            color: white;
            text-decoration: underline;
            font-weight: 600;
        }

        .testimonial {
            background: var(--testimonial-bg);
            border-left: 4px solid var(--testimonial-border);
            padding: 28px;
            margin: 32px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.15);
        }

        .testimonial-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .testimonial-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: white;
        }

        .testimonial-author {
            font-weight: 700;
            color: var(--testimonial-author);
            font-size: 1.1em;
        }

        .testimonial-content {
            color: var(--testimonial-text);
            line-height: 1.8;
            font-style: italic;
            font-size: 1.05em;
        }

        .module-list {
            background: var(--module-list-bg);
            padding: 24px;
            border-radius: 10px;
            margin: 24px 0;
        }

        .module-list h4 {
            color: var(--module-item-text);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .module-item {
            background: var(--module-item-bg);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .module-item strong {
            color: var(--module-item-text);
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
        }

        .module-item ul {
            margin: 8px 0 0 20px;
        }

        .module-item li {
            color: var(--module-item-sub);
            font-size: 0.95em;
            margin-bottom: 6px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 16px 40px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1em;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        /* ==========================================
           RESPONSIVE
           ========================================== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header {
                padding: 24px;
                padding-top: 48px;
            }

            .header-controls {
                position: static;
                margin-bottom: 16px;
                justify-content: flex-end;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .tabs {
                grid-template-columns: 1fr;
            }

            .content {
                padding: 24px;
            }

            .lesson h3 {
                font-size: 1.4em;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .lesson-header {
                flex-direction: column;
                gap: 16px;
            }

            .mark-complete {
                width: 100%;
            }

            /* Simulado responsive */
            .sim-match-container { grid-template-columns: 1fr; }
            .sim-meta-grid { grid-template-columns: repeat(2, 1fr); }
            .sim-score-value { font-size: 3em; }
            .sim-exam-nav { flex-direction: column; }
            .sim-nav-prev, .sim-nav-next, .sim-submit-btn { width: 100%; }
            .sim-report-actions { flex-direction: column; }
        }

        /* ==========================================
           SIMULADO FINAL — EXAM ENGINE STYLES
           ========================================== */

        /* --- Screens --- */
        .sim-screen { display: none; }
        .sim-screen.active { display: block; }

        /* --- Intro Screen --- */
        .sim-intro-hero {
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white; padding: 40px; border-radius: 12px; margin-bottom: 32px; text-align: center;
        }
        .sim-intro-hero h2 { color: white; font-size: 1.8em; margin-bottom: 8px; }
        .sim-intro-hero p { color: rgba(255,255,255,0.88); font-size: 1.1em; margin: 0; }
        .sim-meta-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px; margin: 28px 0;
        }
        .sim-meta-item {
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px 16px; text-align: center;
        }
        .sim-meta-item .sim-meta-icon { font-size: 1.8em; margin-bottom: 8px; }
        .sim-meta-item .sim-meta-value { font-size: 1.3em; font-weight: 700; color: var(--text-primary); }
        .sim-meta-item .sim-meta-label { font-size: 0.8em; color: var(--text-muted); margin-top: 2px; }
        .sim-domains-list { margin: 24px 0; }
        .sim-domain-item {
            display: flex; align-items: center; gap: 14px;
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
        }
        .sim-domain-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .sim-domain-name { font-weight: 600; color: var(--text-body); flex: 1; }
        .sim-domain-weight { font-size: 0.85em; color: var(--text-muted); font-weight: 500; }
        .sim-instructions { background: var(--tip-bg); border-left: 4px solid var(--tip-border); border-radius: 8px; padding: 20px 24px; margin: 24px 0; color: var(--tip-text); }
        .sim-instructions ul { margin: 10px 0 0 20px; }
        .sim-instructions li { margin-bottom: 6px; font-size: 0.95em; }
        .sim-start-btn {
            background: linear-gradient(135deg, #2c5282 0%, #3182ce 100%);
            color: white; border: none; padding: 18px 60px; border-radius: 10px;
            font-size: 1.15em; font-weight: 700; cursor: pointer; display: block;
            margin: 32px auto 0; box-shadow: 0 4px 14px rgba(49,130,206,0.35);
            transition: all 0.2s ease;
        }
        .sim-start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(49,130,206,0.45); }

        /* --- Exam Screen --- */
        .sim-exam-header {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-card-alt); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; gap: 16px;
        }
        .sim-timer {
            font-size: 1.25em; font-weight: 700; color: var(--accent);
            font-variant-numeric: tabular-nums; min-width: 70px; text-align: center;
        }
        .sim-timer.warning { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sim-q-counter { color: var(--text-muted); font-size: 0.9em; font-weight: 500; }
        .sim-flag-btn {
            background: none; border: 1.5px solid var(--border); border-radius: 6px;
            padding: 6px 12px; cursor: pointer; color: var(--text-muted); font-size: 0.85em;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .sim-flag-btn.flagged { border-color: var(--warning-accent); color: var(--warning-accent); background: var(--recall-bg); }
        .sim-flag-btn:hover { border-color: var(--warning-accent); color: var(--warning-accent); }

        /* Timer progress bar */
        .sim-timer-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .sim-timer-fill { height: 100%; background: var(--accent); transition: width 1s linear; border-radius: 2px; }
        .sim-timer-fill.warning { background: var(--danger); }

        /* Question area */
        .sim-question-area { margin-bottom: 24px; }
        .sim-question-type-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 12px; font-size: 0.78em;
            font-weight: 600; color: var(--text-muted); margin-bottom: 14px;
        }
        .sim-scenario {
            background: var(--example-bg); border-left: 4px solid var(--example-border);
            border-radius: 8px; padding: 18px 22px; margin-bottom: 18px;
            color: var(--example-text); font-size: 0.95em; line-height: 1.7;
        }
        .sim-scenario::before { content: "📋 CENÁRIO"; display: block; font-weight: 700; font-size: 0.82em; margin-bottom: 8px; color: var(--example-border); letter-spacing: 0.5px; }
        .sim-q-text { font-weight: 600; font-size: 1.05em; color: var(--text-body); margin-bottom: 18px; line-height: 1.6; }
        .sim-multi-hint { font-size: 0.82em; color: var(--accent); font-weight: 600; margin-bottom: 12px; }

        /* Options (single/multi) */
        .sim-options { list-style: none; margin: 0; }
        .sim-option {
            display: flex; align-items: flex-start; gap: 12px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
            cursor: pointer; transition: all 0.2s; line-height: 1.55;
        }
        .sim-option:hover { border-color: var(--accent); background: var(--bg-hover); }
        .sim-option.selected { border-color: var(--accent); background: var(--tip-bg); }
        .sim-option input { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
        .sim-option label { cursor: pointer; flex: 1; color: var(--text-body); }

        /* --- Drag-and-Drop --- */
        /* Match type */
        .sim-match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 8px 0; }
        .sim-match-pool-label, .sim-match-targets-label { font-size: 0.82em; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
        .sim-match-pool { display: flex; flex-direction: column; gap: 8px; }
        .sim-match-item {
            background: var(--bg-card); border: 2px solid var(--accent);
            border-radius: 8px; padding: 10px 14px; cursor: grab; user-select: none;
            touch-action: none; font-size: 0.92em; font-weight: 500; color: var(--text-body);
            transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
            display: flex; align-items: center;
        }
        .sim-match-item:hover { box-shadow: 0 2px 8px var(--accent-shadow); }
        .sim-match-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-match-item.placed { border-color: var(--success); background: var(--example-bg); color: var(--example-text); }
        .sim-match-targets { display: flex; flex-direction: column; gap: 8px; }
        .sim-match-target-row { display: flex; flex-direction: column; gap: 4px; }
        .sim-match-target-label { font-size: 0.82em; color: var(--text-secondary); font-weight: 500; line-height: 1.4; }
        .sim-match-slot {
            min-height: 44px; border: 2px dashed var(--border); border-radius: 8px;
            padding: 6px; transition: border-color 0.15s, background 0.15s;
            display: flex; align-items: center;
        }
        .sim-match-slot.over { border-color: var(--accent); background: var(--tip-bg); border-style: solid; }
        .sim-match-slot.filled { border-style: solid; border-color: var(--success); background: var(--example-bg); }
        .sim-match-slot-placeholder { color: var(--text-muted); font-size: 0.82em; padding: 4px 8px; font-style: italic; }

        /* Order type */
        .sim-order-list { display: flex; flex-direction: column; gap: 8px; margin: 8px 0; }
        .sim-order-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 8px; padding: 12px 16px; cursor: grab; user-select: none;
            touch-action: none; transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
        }
        .sim-order-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
        .sim-order-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-order-handle { color: var(--text-muted); font-size: 1.1em; flex-shrink: 0; user-select: none; }
        .sim-order-num { font-weight: 700; color: var(--accent); font-size: 0.95em; min-width: 22px; flex-shrink: 0; }
        .sim-order-text { flex: 1; color: var(--text-body); font-size: 0.95em; line-height: 1.5; }
        .sim-order-drop-indicator { height: 3px; background: var(--accent); border-radius: 2px; margin: -4px 0; opacity: 0; transition: opacity 0.15s; pointer-events: none; }
        .sim-order-drop-indicator.visible { opacity: 1; }

        /* Categorize type */
        .sim-categorize-pool {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
            min-height: 52px; padding: 10px; border: 2px dashed var(--border);
            border-radius: 10px; background: var(--bg-card-alt);
        }
        .sim-categorize-pool.over { border-color: var(--accent); background: var(--tip-bg); }
        .sim-categorize-item {
            background: var(--bg-card); border: 2px solid var(--accent);
            border-radius: 6px; padding: 8px 14px; cursor: grab; user-select: none;
            touch-action: none; font-size: 0.88em; font-weight: 500; color: var(--text-body);
            transition: box-shadow 0.15s, opacity 0.15s; min-height: 44px;
            display: flex; align-items: center;
        }
        .sim-categorize-item:hover { box-shadow: 0 2px 6px var(--accent-shadow); }
        .sim-categorize-item.dragging { opacity: 0.35; cursor: grabbing; }
        .sim-categorize-buckets { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
        .sim-bucket {
            border: 2px solid var(--border); border-radius: 10px; min-height: 100px;
            transition: border-color 0.15s, background 0.15s;
        }
        .sim-bucket.over { border-color: var(--accent); background: var(--tip-bg); }
        .sim-bucket-header {
            padding: 10px 14px; font-weight: 700; font-size: 0.88em;
            background: var(--bg-card-alt); border-bottom: 1px solid var(--border);
            border-radius: 8px 8px 0 0; color: var(--text-body);
        }
        .sim-bucket-body { padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 60px; }

        /* Ghost element during drag */
        .sim-drag-ghost {
            position: fixed; pointer-events: none; z-index: 9999; opacity: 0.9;
            transform: rotate(2deg) scale(1.04);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18); border-radius: 8px;
        }

        /* --- Nav Grid --- */
        .sim-nav-section { margin-bottom: 20px; }
        .sim-nav-label { font-size: 0.82em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .sim-nav-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .sim-nav-btn {
            width: 36px; height: 36px; border-radius: 6px; border: 1.5px solid var(--border);
            background: var(--bg-card-alt); color: var(--text-muted); font-size: 0.78em;
            font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex;
            align-items: center; justify-content: center;
        }
        .sim-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sim-nav-btn.answered { background: var(--accent); border-color: var(--accent); color: white; }
        .sim-nav-btn.flagged { background: var(--recall-bg); border-color: var(--warning-accent); color: var(--warning-accent); }
        .sim-nav-btn.current { box-shadow: 0 0 0 3px var(--accent-shadow); border-color: var(--accent); font-weight: 700; }
        .sim-nav-btn.answered.flagged { background: var(--warning-accent); border-color: var(--warning-accent); color: white; }

        /* --- Exam Navigation Buttons --- */
        .sim-exam-nav { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .sim-nav-prev, .sim-nav-next {
            flex: 1; padding: 13px 20px; border: none; border-radius: 8px; font-weight: 600;
            font-size: 0.95em; cursor: pointer; transition: all 0.2s; min-width: 100px;
        }
        .sim-nav-prev { background: var(--border); color: var(--text-secondary); }
        .sim-nav-prev:hover { background: var(--border-hover); }
        .sim-nav-prev:disabled { opacity: 0.35; cursor: not-allowed; }
        .sim-nav-next { background: var(--accent); color: white; }
        .sim-nav-next:hover { background: var(--accent-hover); }
        .sim-submit-btn {
            background: var(--success); color: white; border: none; padding: 13px 28px;
            border-radius: 8px; font-weight: 700; font-size: 0.95em; cursor: pointer;
            transition: all 0.2s;
        }
        .sim-submit-btn:hover { background: var(--success-hover); }

        /* --- Score Report --- */
        .sim-report-hero {
            text-align: center; padding: 40px 24px; border-radius: 12px; margin-bottom: 32px;
        }
        .sim-report-hero.pass { background: linear-gradient(135deg, #1c4532 0%, #276749 100%); }
        .sim-report-hero.fail { background: linear-gradient(135deg, #63171b 0%, #9b2c2c 100%); }
        .sim-score-value { font-size: 4em; font-weight: 800; color: white; line-height: 1; }
        .sim-score-max { font-size: 1.3em; color: rgba(255,255,255,0.7); margin-bottom: 16px; }
        .sim-pass-badge {

        const SIMULADO_DOMAINS = [
            { id: 0, pt: "Git e GitHub Basics", en: "Git and GitHub Basics", weight: "25–30%", color: "#3182ce", icon: "🔧" },
            { id: 1, pt: "Repositórios GitHub", en: "GitHub Repositories", weight: "10–15%", color: "#48bb78", icon: "📁" },

        // ============================================================

        // Mix obrigatório: single(20-26), multi(4-8), match(2-4), order(2-4), categorize(1-2)
        // Distribuir proporcionalmente aos pesos dos domínios
        // Basear em simulados reais, ExamTopics, Whizlabs e Microsoft Learn
        // ============================================================
        const SIMULADO_QUESTIONS = [
            // ── DOMÍNIO 0: Git e GitHub Basics (25-30%) — 12 questões ──
            { id: 1, domain: 0, type: 'single', question: "Um desenvolvedor precisa reverter as alterações do último commit sem perder o histórico. Qual comando Git é mais adequado?", options: ["git reset --hard HEAD~1", "git revert HEAD", "git checkout HEAD~1", "git stash"], correct: 1, explanation: "<strong>git revert HEAD</strong> cria um novo commit que desfaz as alterações do commit anterior, preservando o histórico completo.<br><br>✅ git revert: mantém o histórico intacto, ideal para branches compartilhados<br><br>❌ git reset --hard: apaga commits do histórico (perigoso em branches compartilhados)<br>❌ git checkout HEAD~1: coloca em detached HEAD state, não reverte<br>❌ git stash: salva mudanças não commitadas, irrelevante aqui" },
            { id: 2, domain: 0, type: 'single', question: "Qual a principal diferença entre Git e GitHub?", options: ["Git é uma interface web e GitHub é um sistema de controle de versão", "Git é um sistema de controle de versão distribuído e GitHub é uma plataforma de hospedagem baseada em Git", "Git e GitHub são a mesma ferramenta com nomes diferentes", "Git é proprietário da Microsoft e GitHub é open source"], correct: 1, explanation: "<strong>Git = VCS distribuído (local)</strong> | <strong>GitHub = plataforma cloud</strong> baseada em Git.<br><br>✅ Git: ferramenta de linha de comando para controle de versão distribuído<br>✅ GitHub: plataforma de hospedagem que adiciona colaboração, Issues, PRs, Actions<br><br>❌ A: invertido<br>❌ C: são complementares, não iguais<br>❌ D: Git é open source, GitHub é da Microsoft" },
            { id: 3, domain: 0, type: 'single', question: "No GitHub Flow, qual é a ordem correta dos passos para contribuir com código?", options: ["Commit → Branch → PR → Review → Merge", "Branch → Commit → PR → Review → Merge", "Fork → Commit → Push → Branch → Merge", "PR → Branch → Commit → Review → Merge"], correct: 1, explanation: "<strong>GitHub Flow:</strong> Branch → Commit → PR → Review → Merge<br><br>✅ Criar branch a partir de main → fazer commits → abrir Pull Request → revisão de código → merge para main<br><br>❌ A: commit antes de branch não segue o flow<br>❌ C: Fork é para contribuições externas, não é o GitHub Flow padrão<br>❌ D: PR antes de branch não faz sentido" },
            { id: 4, domain: 0, type: 'single', question: "Uma equipe precisa que todos os desenvolvedores tenham uma cópia completa do histórico do projeto. Qual tipo de controle de versão atende essa necessidade?", options: ["Centralizado (CVCS)", "Distribuído (DVCS)", "Baseado em arquivo (File-based)", "Baseado em nuvem exclusivamente"], correct: 1, explanation: "<strong>DVCS (Distributed Version Control System)</strong> — cada desenvolvedor tem clone completo do repositório + histórico.<br><br>✅ Git é DVCS: trabalho offline, histórico local completo, backup natural<br><br>❌ CVCS (SVN): repositório central, sem cópia completa local<br>❌ File-based: sem controle de versão real<br>❌ Cloud-only: não descreve a arquitetura do Git" },
            { id: 5, domain: 0, type: 'multi', question: "Quais DUAS afirmações sobre branches no Git são verdadeiras?", options: ["Um branch é uma cópia completa de todos os arquivos do repositório", "Um branch é um ponteiro leve (lightweight pointer) para um commit", "Criar um branch é uma operação custosa em termos de desempenho", "Branches permitem desenvolvimento paralelo sem afetar a branch principal"], correct: [1, 3], explanation: "✅ <strong>B:</strong> Branch = ponteiro para um commit (40 bytes, instantâneo)<br>✅ <strong>D:</strong> Branches isolam o trabalho — desenvolvimento paralelo sem afetar main<br><br>❌ A: branch NÃO copia arquivos, é apenas um ponteiro<br>❌ C: criar branch é instantâneo e leve (não é como SVN)" },
            { id: 6, domain: 0, type: 'single', question: "Um desenvolvedor quer contribuir para um repositório open source no GitHub ao qual não tem acesso de escrita. Qual é o primeiro passo recomendado?", options: ["Criar uma branch diretamente no repositório original", "Fazer um Fork do repositório para sua conta", "Enviar um email ao mantenedor pedindo acesso", "Clonar o repositório e fazer push direto"], correct: 1, explanation: "<strong>Fork</strong> cria uma cópia do repositório na sua conta, permitindo modificações livres.<br><br>✅ Fork → Clone → Branch → Commit → Push → Pull Request para o repo original<br><br>❌ A: sem acesso de escrita, não pode criar branch no repo original<br>❌ C: não é o workflow padrão de open source<br>❌ D: push direto será rejeitado sem permissão" },
            { id: 7, domain: 0, type: 'single', question: "Qual é o propósito principal do Markdown no GitHub?", options: ["Compilar código fonte", "Formatar texto em issues, PRs, READMEs e documentação", "Gerenciar versões de arquivos binários", "Configurar pipelines de CI/CD"], correct: 1, explanation: "<strong>Markdown</strong> é a linguagem de formatação padrão do GitHub para comunicação escrita.<br><br>✅ Usado em: README.md, Issues, Pull Requests, Discussions, Wikis, Comments<br>✅ Suporta: headers, listas, links, imagens, código, tabelas, task lists<br><br>❌ A: Markdown não compila código<br>❌ C: Git não versiona binários eficientemente (use Git LFS)<br>❌ D: CI/CD usa YAML (GitHub Actions)" },
            { id: 8, domain: 0, type: 'order', question: "Ordene as etapas do fluxo básico de trabalho com Git (do início ao compartilhamento):", items: [{ id: 0, text: "git add (stage changes)" }, { id: 1, text: "git clone (copiar repositório)" }, { id: 2, text: "git commit (salvar snapshot)" }, { id: 3, text: "Editar arquivos no working directory" }, { id: 4, text: "git push (enviar para remote)" }], correctOrder: [1, 3, 0, 2, 4], explanation: "Fluxo Git básico:<br>1️⃣ <strong>clone</strong> — copia repositório remoto<br>2️⃣ <strong>Editar</strong> — modifica arquivos (working directory)<br>3️⃣ <strong>add</strong> — move para staging area<br>4️⃣ <strong>commit</strong> — salva snapshot no repositório local<br>5️⃣ <strong>push</strong> — envia commits para o repositório remoto" },
            { id: 9, domain: 0, type: 'single', question: "Quando é mais apropriado usar o GitHub Desktop em vez da linha de comando Git?", options: ["Quando se precisa de operações avançadas como rebase interativo", "Quando se prefere uma interface visual para operações comuns como commit, push e pull", "Quando se trabalha exclusivamente com repositórios privados", "Quando se precisa configurar GitHub Actions"], correct: 1, explanation: "<strong>GitHub Desktop</strong> é ideal para quem prefere interface gráfica para operações comuns.<br><br>✅ Bom para: commits visuais, resolução de conflitos com diff visual, clone fácil, branch switching<br><br>❌ A: rebase interativo é mais prático na CLI<br>❌ C: funciona com repos públicos e privados igualmente<br>❌ D: Actions são configurados via YAML no repositório" },
            { id: 10, domain: 0, type: 'match', question: "Associe cada conceito Git ao seu significado:", pairs: [{ id: 0, source: "Working Directory", target: "Área onde você edita arquivos" }, { id: 1, source: "Staging Area (Index)", target: "Área intermediária antes do commit" }, { id: 2, source: "Local Repository", target: "Histórico de commits na sua máquina" }, { id: 3, source: "Remote Repository", target: "Repositório hospedado no GitHub" }], explanation: "<strong>3 áreas do Git + Remote:</strong><br>🔹 Working Directory: onde os arquivos são editados<br>🔹 Staging Area (git add): prepara o que será commitado<br>🔹 Local Repository (git commit): histórico local<br>🔹 Remote (git push/pull): GitHub, sincroniza com outros devs" },
            { id: 11, domain: 0, type: 'single', question: "Uma empresa tem diferentes equipes e precisa gerenciar permissões de forma centralizada no GitHub. Qual tipo de conta é mais adequado?", options: ["Conta pessoal com repositórios privados", "GitHub Organization", "Múltiplas contas pessoais compartilhadas", "GitHub Gist"], correct: 1, explanation: "<strong>GitHub Organization</strong> é projetada para gerenciamento centralizado de equipes e permissões.<br><br>✅ Org: teams, roles, policies centralizadas, billing unificado, repo ownership pela org<br><br>❌ A: conta pessoal não tem gerenciamento de equipes<br>❌ C: compartilhar contas viola ToS do GitHub<br>❌ D: Gist é para snippets de código, não gerenciamento" },
            { id: 12, domain: 0, type: 'single', question: "Qual funcionalidade do GitHub Mobile NÃO está disponível?", options: ["Revisar e fazer merge de Pull Requests", "Editar arquivos diretamente no repositório com syntax highlighting completo", "Responder a Issues e Discussions", "Receber notificações push sobre menções"], correct: 1, explanation: "<strong>GitHub Mobile</strong> é otimizado para triagem e comunicação, não para edição de código avançada.<br><br>✅ Mobile pode: revisar PRs, comentar, merge, gerenciar issues, notificações<br><br>❌ B: edição completa com syntax highlighting é limitada no mobile — use github.dev ou Codespaces para edição real" },
            // ── DOMÍNIO 1: Repositórios GitHub (10-15%) — 5 questões ──
            { id: 13, domain: 1, type: 'single', question: "Uma empresa open source quer garantir que contribuidores externos saibam como reportar vulnerabilidades de segurança. Qual arquivo deve adicionar ao repositório?", options: ["CONTRIBUTING.md", "SECURITY.md", "CODEOWNERS", "README.md"], correct: 1, explanation: "<strong>SECURITY.md</strong> — define a política de divulgação responsável de vulnerabilidades.<br><br>✅ SECURITY.md: instruções sobre como reportar problemas de segurança de forma privada<br><br>❌ CONTRIBUTING.md: guia para contribuição de código (não segurança)<br>❌ CODEOWNERS: define revisores automáticos por área de código<br>❌ README.md: apresentação geral do projeto" },
            { id: 14, domain: 1, type: 'single', question: "Um time cria 5 microsserviços novos por mês com estrutura similar. Como padronizar a criação desses repositórios no GitHub?", options: ["Usar forks de um repositório base", "Criar um Template Repository", "Copiar manualmente os arquivos cada vez", "Usar GitHub Gists como referência"], correct: 1, explanation: "<strong>Template Repository</strong> permite criar novos repos com estrutura pré-definida (arquivos, diretórios, workflows).<br><br>✅ Template: botão 'Use this template', cria repo novo SEM histórico do original, ideal para scaffolding<br><br>❌ Fork: mantém conexão com o original (não é o caso de projetos independentes)<br>❌ C: ineficiente e propenso a erros<br>❌ D: Gist não é para estrutura de projeto" },

            { id: 25, domain: 3, type: 'single', question: "Um desenvolvedor precisa fazer uma correção rápida de um typo no README diretamente pelo navegador, sem configurar um ambiente local. Qual ferramenta usar?", options: ["GitHub Codespaces", "github.dev editor (tecla '.')", "GitHub Desktop", "GitHub CLI (gh)"], correct: 1, explanation: "<strong>github.dev</strong> (tecla '.' no repo) — editor VS Code no navegador para edições leves.<br><br>✅ github.dev: edição rápida, commit direto, sem terminal/execução<br>✅ Atalho: pressione '.' em qualquer repositório<br><br>❌ Codespaces: ambiente completo com terminal — overkill para editar um README<br>❌ Desktop: aplicação instalada localmente<br>❌ CLI: requer terminal local" },

            { id: 29, domain: 4, type: 'single', question: "Qual método de autenticação o GitHub recomenda como mais seguro para login, substituindo senhas e 2FA tradicionais?", options: ["Senha forte de 20+ caracteres", "Passkeys (chaves de acesso)", "Token de acesso pessoal (PAT)", "Autenticação via SMS"], correct: 1, explanation: "<strong>Passkeys</strong> — autenticação resistente a phishing baseada em biometria/chave de segurança.<br><br>✅ Passkeys: sem senha, resistente a phishing, baseado em FIDO2/WebAuthn<br>✅ Suportado: Face ID, Touch ID, Windows Hello, chaves de segurança hardware<br><br>❌ Senha: vulnerável a phishing e credential stuffing<br>❌ PAT: para API/CLI, não para login no site<br>❌ SMS: vulnerável a SIM swap attacks" },

            { id: 31, domain: 4, type: 'single', question: "Uma empresa usa GitHub Enterprise Cloud e precisa que as contas dos funcionários sejam provisionadas e gerenciadas pelo Identity Provider (IdP) corporativo. Qual recurso atende essa necessidade?", options: ["GitHub personal accounts com SSO", "Enterprise Managed Users (EMUs)", "GitHub Teams com LDAP sync", "Repository collaborator invites"], correct: 1, explanation: "<strong>Enterprise Managed Users (EMUs)</strong> — contas totalmente gerenciadas pelo IdP da empresa.<br><br>✅ EMU: provisionamento via SCIM, login via SAML, empresa controla a conta completa<br>✅ Diferença: contas EMU não podem contribuir fora da enterprise (fork público impedido)<br><br>❌ A: contas pessoais com SSO ainda são contas pessoais do usuário<br>❌ C: LDAP sync é para GitHub Enterprise Server (on-premises)<br>❌ D: collaborator invites são manuais e sem gerenciamento IdP" },

                                <h4>📌 Tópico: O que é Git?</h4>
                                <p><strong>Explicação:</strong></p>
                                <p><strong>Git</strong> é um sistema de controle de versão distribuído (DVCS) criado por Linus Torvalds em 2005. Cada desenvolvedor tem uma cópia completa do repositório, incluindo todo o histórico de commits.</p>

                                <div class="tip">💡 <strong>Glossário de Siglas:</strong><br>
                                🔹 <strong>VCS</strong> — Version Control System (Sistema de Controle de Versão)<br>
                                🔹 <strong>DVCS</strong> — Distributed Version Control System (VCS Distribuído) — ex: Git<br>
                                🔹 <strong>CVCS</strong> — Centralized Version Control System (VCS Centralizado) — ex: SVN<br>
                                🔹 <strong>CLI</strong> — Command-Line Interface (Interface de Linha de Comando)<br>
                                🔹 <strong>PR</strong> — Pull Request (Solicitação de Mesclagem)</div>

                                <div class="macete">🔑 <strong>Git = "Get It Together"</strong> — cada dev tem TUDO localmente. Não depende de servidor para trabalhar.</div>

                                <div class="example">
                                    <strong>Cenário:</strong> Uma desenvolvedora está num avião sem internet. Com Git (DVCS), ela pode fazer commits, criar branches, ver histórico — tudo localmente. Com SVN (CVCS), ela ficaria impossibilitada de trabalhar.<br>
                                    <strong>Por quê?</strong> Git armazena clone completo do repositório + histórico na máquina local.<br>
                                    <strong>Resultado:</strong> Trabalho offline completo, velocidade superior, backup natural distribuído.
                                </div>

                                <div class="separator"></div>

                                <h4>📌 Tópico: DVCS vs CVCS</h4>
                                <p><strong>Explicação:</strong></p>
                                <p><strong>DVCS (Distribuído)</strong>: cada pessoa tem uma cópia completa do projeto e todo o histórico na sua máquina. Se o servidor cair, ninguém perde nada. Exemplos: Git, Mercurial.<br>
                                <strong>CVCS (Centralizado)</strong>: existe um único servidor com o projeto. Todo mundo depende dele para trabalhar. Se cair, ninguém trabalha. Exemplos: SVN, TFVC.</p>

                                <div class="example">
                                    <strong>Analogia:</strong> Pense em música.<br>
                                    🔹 <strong>CVCS (SVN)</strong> é como streaming (Spotify): você só ouve se tiver internet. Sem conexão = sem música.<br>
                                    🔹 <strong>DVCS (Git)</strong> é como baixar as músicas: você tem tudo no celular. Sem internet? Continua ouvindo normalmente.
                                </div>

                                <div class="macete">🔑 <strong>D = "Distribuído = Cada um tem tudo"</strong> | <strong>C = "Centralizado = Todo mundo depende de um servidor"</strong></div>

                                <div class="tip">💡 Na prova: Git é SEMPRE classificado como DVCS. Se a questão mencionar "cada desenvolvedor tem cópia completa do histórico" → a resposta é DVCS/Git.</div>

                                <div class="separator"></div>

                                <h4>📌 Tópico: Git vs GitHub</h4>
                                <p><strong>Explicação:</strong></p>
                                <p><strong>Git</strong> = ferramenta de linha de comando (VCS distribuído, local).<br>
                                <strong>GitHub</strong> = plataforma cloud baseada em Git que adiciona colaboração (Issues, PRs, Actions, Projects, etc.).</p>

                                <div class="macete">🔑 <strong>Git = Motor do carro | GitHub = Estrada + GPS + Mecânico</strong> — Git faz o versionamento; GitHub adiciona tudo ao redor (colaboração, automação, segurança).</div>

                                <div class="warning">⚠️ ARMADILHA: "Git e GitHub são a mesma coisa" = ERRADO. Git funciona sem GitHub. GitHub precisa de Git internamente.</div>

                                        🔹 <strong>GitHub</strong>: plataforma de hospedagem cloud baseada em Git (adiciona: PRs, Issues, Actions, Projects, segurança, colaboração em equipe)
                                    </div>
                                </details>

                                <div class="separator"></div>

                                <h4>📌 Tópico: As 3 Áreas do Git</h4>
                                <p><strong>Explicação:</strong></p>
                                <p>O Git organiza o trabalho em 3 áreas — pense como preparar uma encomenda:</p>
                                <p>1️⃣ <strong>Working Directory</strong> (área de trabalho) — onde você edita arquivos. É a sua "mesa de trabalho" onde as coisas ainda estão sendo feitas.<br>
                                2️⃣ <strong>Staging Area</strong> (zona de preparo) — onde você seleciona O QUE quer salvar. É como colocar itens numa caixa antes de enviar — você escolhe o que vai e o que fica. Comando: <code>git add</code><br>
                                3️⃣ <strong>Repository</strong> (histórico) — onde o Git grava permanentemente. É como fechar a caixa e enviar — agora está registrado. Comando: <code>git commit</code></p>

                                <div class="macete">🔑 <strong>Editar → Preparar → Registrar</strong> — Working Dir (mesa) → <code>git add</code> → Staging (caixa) → <code>git commit</code> → Repository (enviado).</div>

                                <div class="example">

                                        Para voltar: <code>git restore --staged</code> (unstage) | <code>git restore</code> (discard changes)
                                    </div>
                                </details>

                                <p><strong>Explicação:</strong></p>
                                <p>Imagine que você está escrevendo um livro e quer testar um capítulo alternativo sem estragar o original. Você cria uma <strong>versão paralela</strong> a partir daquele ponto e começa a escrever diferente. Se gostar, incorpora ao livro. Se não, descarta. Isso é um <strong>branch</strong>.</p>
                                <p>No Git, um branch é uma <strong>linha paralela de trabalho</strong> que permite modificar o código sem afetar a versão principal (<code>main</code>). Quando terminar, você junta (merge) de volta.</p>

                                <div class="example">
                                    <strong>Cenário da vida real:</strong> Sua equipe tem o site da empresa rodando perfeitamente (branch <code>main</code>). Maria quer adicionar uma página de "Contato" e João quer redesenhar o menu.<br>
                                    <strong>Solução:</strong> Maria cria branch <code>feature/contato</code> e João cria <code>feature/menu</code>. Ambos trabalham em paralelo SEM interferir um no outro e SEM estragar o site que está no ar.<br>
                                    <strong>Resultado:</strong> Quando cada um termina, faz merge de volta para <code>main</code>. O site ganha as duas features.
                                </div>

                                <div class="macete">🔑 <strong>Branch = Rascunho separado</strong> — você trabalha no rascunho sem mexer no original. Se ficou bom, passa a limpo (merge). Se não, joga fora.</div>

                                <div class="tip">💡 <strong>main</strong> (antigo master) é o branch principal — a "versão oficial" do projeto. Feature branches isolam o trabalho. Após merge, a feature branch pode ser deletada.</div>

                                <div class="tip">💡 <strong>Detalhe técnico (para a prova):</strong> internamente, um branch é apenas um ponteiro leve para um commit — criar branch é instantâneo e não duplica arquivos.</div>

                                <div class="separator"></div>

                                <h4>📌 Tópico: Commits</h4>
                                <p><strong>Explicação:</strong></p>
                                <p>Um <strong>commit</strong> é como tirar uma <strong>foto do seu projeto</strong> num momento específico. Essa foto registra TODAS as alterações que você fez, quem fez, quando fez, e uma mensagem explicando por quê.</p>
                                <p>Cada commit é <strong>permanente e não pode ser editado</strong> — você nunca "edita" um commit antigo, você cria novos commits em cima.</p>

                                <div class="example">

                                </div>

                                <div class="macete">🔑 <strong>Commit = Save point do jogo</strong> — salva o estado exato do projeto, com descrição do que mudou. Você pode voltar a qualquer save point anterior.</div>

                                <div class="warning">⚠️ <strong>Na prova:</strong> <code>git revert</code> = seguro (cria novo commit que desfaz, preserva histórico) | <code>git reset</code> = perigoso (apaga commits do histórico). Prefira sempre revert em branches compartilhados!</div>

                                <p><strong>Explicação:</strong></p>

                                    <li><strong>Job</strong> — conjunto de steps que roda em um runner</li>
                                    <li><strong>Step</strong> — uma ação individual (run command ou use action)</li>
                                    <li><strong>Runner</strong> — máquina que executa o job (GitHub-hosted ou self-hosted)</li>
                                    <li><strong>Action</strong> — unidade reutilizável (do Marketplace ou custom)</li>
                                </ul>

                                🔹 <strong>VCS</strong> — Version Control System<br>

                                <div class="macete">🔑 <strong>D = "Distributed = Duplicated everywhere"</strong> — each dev has a complete DUPLICATE. C = "Central = single point of failure".</div>

        function getEffectiveTheme() {

        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || getEffectiveTheme();

            try { localStorage.setItem(STORAGE_KEY_THEME, next); } catch(e) {}
        }
