                    { title: "1.2 Security & Identity (Zero Trust & Entra)", content: `
<h4>📌 Topic: The 3 Zero Trust Principles</h4>
<p><strong>Zero Trust</strong> is Microsoft's modern security model — replaces "trust everything inside the network":</p>
<ul>
    <li>🔵 <strong>Verify Explicitly:</strong> always authenticate and authorize using all available data (identity, location, device, service, anomaly)</li>
    <li>🟢 <strong>Use Least Privilege:</strong> limit user access with Just-In-Time and Just-Enough-Access. Risk-based adaptive policies.</li>
    <li>🟡 <strong>Assume Breach:</strong> minimize blast radius. Segment access. Verify end-to-end encryption. Use analytics to detect threats.</li>
</ul>
<div class="macete">3 V's of Zero Trust: <strong>V</strong>erify explicitly, use least pri<strong>V</strong>ilege, as<strong>V</strong>ume breach — VAV!</div>
<div class="exam-confirmed">"Verify Explicitly" is the most-tested Zero Trust principle on AB-900. Questions ask which principle requires authentication even inside the corporate network.</div>
<div class="separator"></div>

<h4>📌 Topic: Multi-Factor Authentication (MFA)</h4>
<p>MFA requires <strong>two or more verification factors</strong>:</p>
<ul>
    <li>🔑 <strong>Something you know:</strong> password, PIN</li>
    <li>📱 <strong>Something you have:</strong> Microsoft Authenticator app, OATH token, SMS/call</li>
    <li>👆 <strong>Something you are:</strong> biometrics (Windows Hello for Business)</li>
</ul>
<div class="tip">Microsoft recommends the <strong>Microsoft Authenticator App</strong> over SMS — SMS is vulnerable to SIM swapping. The app uses push notifications or TOTP codes.</div>
<div class="separator"></div>

<h4>📌 Topic: Passwordless Authentication</h4>
<p>Three <strong>passwordless</strong> methods supported by Microsoft Entra:</p>
<ul>
    <li>🖥️ <strong>Windows Hello for Business:</strong> PIN or biometrics tied to the device. Replaces password for Windows login.</li>
    <li>🔑 <strong>FIDO2 Security Keys:</strong> physical USB/NFC device (e.g., YubiKey). Open FIDO Alliance standard. Phishing-resistant.</li>
    <li>📲 <strong>Microsoft Authenticator (passwordless):</strong> approve a number match in the app + biometrics on the phone.</li>
</ul>
<div class="macete">FIDO2 = <strong>physical key</strong> = most phishing-resistant. Hello = <strong>biometrics on PC</strong>. Authenticator = <strong>approval on phone</strong>.</div>
<div class="warning">SMS OTP is NOT passwordless — it's a second factor for traditional MFA. Don't confuse it with the passwordless methods above!</div>
<div class="separator"></div>

<h4>📌 Topic: SSPR — Self-Service Password Reset</h4>
<p><strong>SSPR</strong> lets users reset their own passwords without the helpdesk, using pre-registered methods (alternate email, authenticator app, security questions, phone).</p>
<div class="macete">SSPR = "I forgot my password" self-service. Saves helpdesk tickets and works 24/7!</div>
<div class="separator"></div>

<h4>📌 Topic: Microsoft Defender XDR</h4>
<p><strong>Microsoft Defender XDR</strong> (Extended Detection and Response) is the unified security platform integrating multiple Defender products:</p>
<ul>
    <li>🖥️ <strong>Defender for Endpoint:</strong> endpoint protection (PCs, servers, mobile)</li>
    <li>📧 <strong>Defender for Office 365:</strong> email, SharePoint, Teams protection against phishing, malware, BEC</li>
    <li>👤 <strong>Defender for Identity:</strong> detects identity attacks on Active Directory (pass-the-hash, lateral movement)</li>
    <li>☁️ <strong>Defender for Cloud Apps:</strong> visibility and control over SaaS apps (shadow IT)</li>
</ul>
<div class="example">
    <strong>Scenario:</strong> Company wants a single pane of glass correlating endpoint, email, and identity alerts for incident investigation.<br>
    <strong>Solution:</strong> <code>Microsoft Defender XDR</code> — correlates signals from all workloads in one portal (security.microsoft.com).
</div>
<details class="active-recall">
    <summary>🤔 ACTIVE RECALL: What are the 3 Zero Trust principles and what does each mean?</summary>
    <div class="recall-content">
        <strong>Answer:</strong><br>
        1. <strong>Verify Explicitly</strong> — always authenticate with all available data (never trust implicitly)<br>
        2. <strong>Least Privilege</strong> — give only the necessary access, time-limited (JIT/JEA)<br>
        3. <strong>Assume Breach</strong> — act as if there's already an attacker in the network; segment, monitor, encrypt
    </div>
</details>
` },
                    { title: "1.3 M365 Security Features", content: `
<h4>📌 Topic: Microsoft Entra ID</h4>
<p><strong>Microsoft Entra ID</strong> (formerly Azure Active Directory) is Microsoft's cloud identity service — the "brain" of authentication and authorization in M365.</p>
<ul>
    <li>Manages users, groups, and devices</li>
    <li>Provides authentication for all M365, Azure services, and integrated apps</li>
    <li>Supports modern protocols: OAuth 2.0, OpenID Connect, SAML 2.0</li>
</ul>
<div class="macete">Entra ID = digital gatekeeper of M365. Every access goes through it!</div>
<div class="separator"></div>

<h4>📌 Topic: Conditional Access</h4>
<p><strong>Conditional Access</strong> is the Entra ID policy engine — defines <em>who</em> can access <em>what</em>, under <em>which conditions</em>:</p>
<ul>
    <li>📥 <strong>Signals (IF):</strong> user/group, IP location, device compliance, sign-in risk, app being accessed</li>
    <li>⚙️ <strong>Decision (THEN):</strong> Block, Grant (with conditions), Limited session</li>
    <li>🛡️ <strong>Grant controls:</strong> Require MFA, compliant device (Intune), hybrid Azure AD join, approved app</li>
</ul>
<div class="macete">CA = "IF [condition] THEN [action]". E.g., IF login from outside the US THEN require MFA!</div>
<div class="warning">Copilot M365 respects Conditional Access policies! If a user can't access SharePoint via CA, Copilot also can't access that content.</div>
<div class="separator"></div>

<h4>📌 Topic: SSO — Single Sign-On</h4>
<p>With <strong>SSO</strong>, the user logs in once to Entra ID and accesses all integrated apps without logging in again.</p>
<ul>
    <li>Supports Microsoft apps (M365, Azure) and third-party apps (Salesforce, SAP, Google Workspace via federation)</li>
    <li>Reduces password fatigue and increases productivity</li>
    <li>Works with SAML 2.0 and OpenID Connect</li>
</ul>
<div class="separator"></div>

<h4>📌 Topic: PIM — Privileged Identity Management</h4>
<p><strong>PIM</strong> is the guardian of privileged permissions — implements the <em>Least Privilege</em> principle with Just-In-Time (JIT) access:</p>
<ul>
    <li>⏱️ <strong>JIT Access:</strong> admin activates the role for a limited time (e.g., 1 hour) only when needed</li>
    <li>✅ <strong>Mandatory approval:</strong> activations of critical roles require approval from an owner</li>
    <li>🔔 <strong>Notifications and alerts:</strong> notifies when roles are activated or when permanent assignments exist</li>
    <li>🔍 <strong>Access Reviews:</strong> periodic reviews of who has privileged access</li>
</ul>
<div class="macete">PIM = VIP access with time limit. Without PIM = admin all the time. With PIM = admin only when needed!</div>
<div class="exam-confirmed">PIM is frequently tested as the solution for "temporary access with mandatory approval". Differentiate from Conditional Access (which controls access conditions, not role duration).</div>
<div class="separator"></div>

<h4>📌 Topic: Identity Secure Score</h4>
<p>The <strong>Identity Secure Score</strong> is a 0–100 score measuring the identity security posture of the organization in Microsoft Entra:</p>
<ul>
    <li>📊 Compares current configuration against Microsoft best practices</li>
    <li>✅ Provides prioritized <strong>improvement actions</strong> (e.g., enable MFA, configure SSPR)</li>
    <li>📈 Tracks progress over time and benchmarks against industry peers</li>
</ul>
<div class="macete">Identity Secure Score = your company's security "grade". Higher = better protected!</div>
<div class="separator"></div>

<h4>📌 Topic: Audit Logs and Sign-in Logs</h4>
<p>Microsoft Entra records all activities in two log types:</p>
<ul>
    <li>📋 <strong>Audit Logs:</strong> admin activities — create user, change group, assign license, configure CA. Retained 30 days (P1/P2: 90 days).</li>
    <li>🔐 <strong>Sign-in Logs:</strong> authentication attempts — who logged in, from where, with which app, whether MFA was required, status (success/failure). Essential for troubleshooting and investigations.</li>
</ul>
<div class="tip">For Copilot access troubleshooting, <strong>Sign-in Logs</strong> show whether the user authenticated correctly and whether any CA policy blocked access.</div>

<details class="active-recall">
    <summary>🤔 ACTIVE RECALL: What is the difference between Conditional Access and PIM?</summary>
    <div class="recall-content">
        <strong>Answer:</strong><br>
        🔹 <strong>Conditional Access</strong> — controls the <em>conditions under which access is granted</em> (e.g., block login from suspicious countries, require MFA outside the network). Acts at authentication time.<br>
        🔹 <strong>PIM</strong> — controls <em>how long a user holds privileged roles</em> (e.g., be Global Admin for only 2 hours with approval). Acts on role management.
    </div>
</details>
` }

                    { title: "2.1 Microsoft Purview Fundamentals", content: `
<h4>📌 Topic: What is Microsoft Purview?</h4>
<p><strong>Microsoft Purview</strong> is Microsoft's unified data governance, compliance, and information protection platform. It covers data in M365, Azure, on-premises environments, and third-party clouds.</p>
<p>Main pillars:</p>
<ul>
    <li>🛡️ <strong>Information Protection</strong></li>
    <li>🚫 <strong>Data Loss Prevention (DLP)</strong></li>
    <li>🔒 <strong>Data Lifecycle Management</strong></li>
    <li>⚠️ <strong>Insider Risk Management</strong></li>
    <li>💬 <strong>Communication Compliance</strong></li>
    <li>🔍 <strong>eDiscovery and Audit</strong></li>
    <li>🤖 <strong>DSPM for AI</strong> (Data Security Posture Management for AI)</li>
</ul>
<div class="macete">Purview = the "purity" of corporate data. It CLASSIFIES, PROTECTS, and GOVERNS data wherever it lives!</div>
<div class="separator"></div>

<h4>📌 Topic: Sensitivity Labels</h4>
<p><strong>Sensitivity Labels</strong> are metadata applied to documents and emails that define the confidentiality level and associated protections:</p>
<ul>
    <li>🏷️ <strong>Label examples:</strong> Public, Internal, Confidential, Highly Confidential</li>
    <li>🔐 <strong>Automatic protections:</strong> encryption, watermark, access restrictions</li>
    <li>📍 <strong>Persistent:</strong> the label travels with the file — even outside M365</li>
    <li>⚙️ <strong>Auto-labeling:</strong> Purview detects sensitive content and applies labels automatically</li>
</ul>
<div class="warning">🔄 Reinforcement (Module 1): Copilot M365 RESPECTS sensitivity labels — it cannot surface data from files the user doesn't have permission to view, even if a label is applied.</div>
<div class="separator"></div>

<h4>📌 Topic: Data Classification</h4>
<p>Purview classifies data using:</p>
<ul>
    <li>🔍 <strong>Sensitive Information Types (SITs):</strong> pre-defined patterns for SSN, credit cards, passports, etc.</li>
    <li>🤖 <strong>Trainable Classifiers:</strong> ML models for specific content (e.g., source code, legal contracts)</li>
    <li>📊 <strong>Content Explorer and Activity Explorer:</strong> dashboards to see where sensitive data lives and how it's used</li>
</ul>
<div class="tip">The <strong>Content Explorer</strong> shows WHERE sensitive data is stored (SharePoint, OneDrive, Exchange). The <strong>Activity Explorer</strong> shows WHAT is being done with it (who opened, copied, shared).</div>
<div class="separator"></div>

<h4>📌 Topic: DLP — Data Loss Prevention</h4>
<p><strong>DLP</strong> monitors and prevents unauthorized sharing of sensitive data:</p>
<ul>
    <li>📧 <strong>Email DLP:</strong> blocks/notifies sending emails with sensitive data (SSN, credit cards)</li>
    <li>📁 <strong>SharePoint/OneDrive DLP:</strong> prevents external sharing of files with protected data</li>
    <li>💬 <strong>Teams DLP:</strong> blocks messages with sensitive data in chats and channels</li>
    <li>🤖 <strong>Endpoint DLP:</strong> controls copy to USB, printing, upload to unapproved sites</li>
    <li>🧠 <strong>Microsoft 365 Copilot DLP:</strong> prevents Copilot from surfacing protected data in its responses</li>
</ul>
<div class="macete">DLP = "Detective" that intercepts sensitive data before it leaves the door!</div>

<h4>📌 Topic: Data Lifecycle Management (Retention)</h4>

        function getEffectiveTheme() { const s=localStorage.getItem(STORAGE_KEY_THEME); if(s) return s; return window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'; }

        let currentModule=0, completedLessons=new Set(), selectedAnswers={};

        function saveScrollPosition() { try{localStorage.setItem(STORAGE_KEY_SCROLL,JSON.stringify({module:currentModule,position:window.scrollY}));}catch(e){} }
        function debounce(fn,w){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn(...a),w);};}
        const debouncedSaveScroll=debounce(saveScrollPosition,500);
        function loadProgress() { try{const c=localStorage.getItem(STORAGE_KEY_COMPLETED);if(c)completedLessons=new Set(JSON.parse(c));const m=localStorage.getItem(STORAGE_KEY_MODULE);if(m)currentModule=parseInt(m);const a=localStorage.getItem(STORAGE_KEY_ANSWERS);if(a)selectedAnswers=JSON.parse(a);}catch(e){} }

        function renderTabs() { const c=document.getElementById('tabs'); courseData.modules.forEach((m,i)=>{const t=document.createElement('div');t.className=`tab ${i===0?'active':''}`;t.onclick=()=>loadModule(i);t.innerHTML=`<div class="tab-title">${m.title}</div><div class="tab-duration">${m.duration}</div><div class="tab-checkmark">✓</div>`;c.appendChild(t);}); }

        function renderModules() {
            const mc=document.getElementById('modules');
            courseData.modules.forEach((module,moduleIndex)=>{
                const md=document.createElement('div');
                md.className=`module ${moduleIndex===0?'active':''}`;
                md.id=`module-${moduleIndex}`;
                if(COURSE_STRUCTURE.modules[moduleIndex]&&COURSE_STRUCTURE.modules[moduleIndex].isSimulado){mc.appendChild(md);initSimuladoModule(md);return;}
                let lh='';
                module.lessons.forEach((lesson,li)=>{const lid=`${moduleIndex}-${li}`;lh+=`<div class="lesson"><div class="lesson-header"><h3>${lesson.title}</h3></div>${lesson.content}<div class="separator"></div><div style="text-align:center;margin-top:32px;"><button class="mark-complete" data-lesson="${lid}" onclick="toggleLesson('${lid}')">✓ Marcar como completo</button></div></div>`;});
                let eh='';
                if(module.exercises&&module.exercises.length>0){
                    eh=`<div class="exercises"><h3 data-i18n="exercises">✏️ Exercícios - ${module.title}</h3><div class="separator"></div>`;
                    module.exercises.forEach((ex,ei)=>{const qid=`${moduleIndex}-${ei}`;eh+=`<div class="exercise-card" id="card-${qid}"><div class="question">${ei+1}. ${ex.question}</div><ul class="options">`;ex.options.forEach((opt,oi)=>{eh+=`<li class="option" onclick="selectOption('${qid}',${oi})"><input type="radio" name="q-${qid}" value="${oi}" id="opt-${qid}-${oi}"><label for="opt-${qid}-${oi}">${opt}</label></li>`;});eh+=`</ul><div class="explanation" id="exp-${qid}">${ex.explanation}</div></div>`;});
                    eh+=`<button class="check-answers-btn" onclick="checkAnswers(${moduleIndex})">Verificar Respostas</button><div class="score" id="score-${moduleIndex}"></div></div>`;
                }
                md.innerHTML=lh+eh;
                mc.appendChild(md);
            });
            const total=courseData.modules.reduce((s,m)=>s+m.lessons.length,0);
            document.getElementById('totalLessons').textContent=total;
        }

        function loadModule(i,skip=false){document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));document.querySelectorAll('.module').forEach((m,j)=>m.classList.toggle('active',j===i));currentModule=i;updateNavButtons();updateProgress();saveProgress();if(!skip){window.scrollTo({top:0,behavior:'smooth'});saveScrollPosition();}}
        function navigateModule(d){if(d===1){const m=courseData.modules[currentModule];const hx=m.exercises&&m.exercises.length>0;const sc=document.getElementById(`score-${currentModule}`);const ck=sc&&sc.classList.contains('show');if(hx&&!ck){if(!confirm(translations[currentLang].skipExercisesConfirm))return;}autoCompleteModule(currentModule);}const n=currentModule+d;if(n>=0&&n<courseData.modules.length){saveScrollPosition();loadModule(n);}}
        function autoCompleteModule(mi){const t=translations[currentLang];const m=courseData.modules[mi];m.lessons.forEach((_,li)=>{const lid=`${mi}-${li}`;if(!completedLessons.has(lid)){completedLessons.add(lid);const b=document.querySelector(`[data-lesson="${lid}"]`);if(b){b.classList.add('completed');b.textContent=t.completed;}}});checkModuleCompletion();updateProgress();saveProgress();}
        function updateNavButtons(){document.getElementById('prevBtn').disabled=currentModule===0;document.getElementById('nextBtn').disabled=currentModule===courseData.modules.length-1;}
        function toggleLesson(lid){const t=translations[currentLang];const b=document.querySelector(`[data-lesson="${lid}"]`);if(completedLessons.has(lid)){completedLessons.delete(lid);b.classList.remove('completed');b.textContent=t.markComplete;}else{completedLessons.add(lid);b.classList.add('completed');b.textContent=t.completed;}updateProgress();checkModuleCompletion();saveProgress();}
        function restoreCompletedButtons(){const t=translations[currentLang];completedLessons.forEach(lid=>{const b=document.querySelector(`[data-lesson="${lid}"]`);if(b){b.classList.add('completed');b.textContent=t.completed;}});}
        function restoreSelectedAnswers(){Object.keys(selectedAnswers).forEach(qid=>{const oi=selectedAnswers[qid];const c=document.getElementById(`card-${qid}`);if(c){c.querySelectorAll('.option').forEach((o,i)=>{if(i===oi)o.classList.add('selected');});const r=document.getElementById(`opt-${qid}-${oi}`);if(r)r.checked=true;}});}
        function checkModuleCompletion(){courseData.modules.forEach((m,mi)=>{const all=m.lessons.every((_,li)=>completedLessons.has(`${mi}-${li}`));const t=document.querySelectorAll('.tab')[mi];if(all)t.classList.add('completed');else t.classList.remove('completed');});}
        function updateProgress(){const t=translations[currentLang];const total=courseData.modules.reduce((s,m)=>s+m.lessons.length,0);const done=completedLessons.size;const pct=(done/total*100).toFixed(0);document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=pct+'% '+t.progressComplete;document.getElementById('lessonsCompleted').textContent=done;}
        function selectOption(qid,oi){selectedAnswers[qid]=oi;const c=document.getElementById(`card-${qid}`);c.querySelectorAll('.option').forEach((o,i)=>o.classList.toggle('selected',i===oi));document.getElementById(`opt-${qid}-${oi}`).checked=true;saveProgress();}
        function checkAnswers(mi){const m=courseData.modules[mi];let ok=0,tot=m.exercises.length;m.exercises.forEach((ex,ei)=>{const qid=`${mi}-${ei}`;const c=document.getElementById(`card-${qid}`);const e=document.getElementById(`exp-${qid}`);const ua=selectedAnswers[qid];if(ua!==undefined){const good=ua===ex.correct;if(good){ok++;c.classList.add('correct');c.classList.remove('incorrect');}else{c.classList.add('incorrect');c.classList.remove('correct');}e.classList.add('show');c.querySelectorAll('.option').forEach((o,i)=>{if(i===ex.correct)o.classList.add('correct');else if(i===ua&&!good)o.classList.add('incorrect');});}});const sd=document.getElementById(`score-${mi}`);const pct=(ok/tot*100).toFixed(0);const t=translations[currentLang];sd.innerHTML=`<strong>${t.resultLabel}: ${ok}/${tot} ${t.correct} (${pct}%)</strong><br>${pct>=70?t.congratulations:t.tryAgain}`;sd.classList.add('show');autoCompleteModule(mi);sd.scrollIntoView({behavior:'smooth',block:'nearest'});}

        let examState={started:false,finished:false,currentQ:0,answers:{},flagged:new Set(),shuffledOrder:[],startTime:null,elapsedSeconds:0,autoSubmitted:false};
        let examTimerInterval=null;

        function clearExamState(){try{localStorage.removeItem(SIM_STORAGE_KEY);}catch(e){}examState={started:false,finished:false,currentQ:0,answers:{},flagged:new Set(),shuffledOrder:[],startTime:null,elapsedSeconds:0,autoSubmitted:false};}
        function initSimuladoModule(md){md.innerHTML=`<div class="simulado-container"><div class="sim-screen sim-intro active" id="sim-screen-intro"></div><div class="sim-screen sim-exam" id="sim-screen-exam"></div><div class="sim-screen sim-results" id="sim-screen-results"></div></div>`;renderSimIntro(md);const has=loadExamState();if(has&&examState.started&&!examState.finished){try{renderExamScreen();showSimScreen('exam');renderExamQuestion(examState.currentQ);updateExamNavGrid();startExamTimer();}catch(e){clearExamState();renderSimIntro(md);showSimScreen('intro');}}else if(has&&examState.finished){try{renderExamResults();showSimScreen('results');}catch(e){clearExamState();showSimScreen('intro');}}}
        function showSimScreen(n){['intro','exam','results'].forEach(x=>{const el=document.getElementById(`sim-screen-${x}`);if(el)el.classList.toggle('active',x===n);});}
        function renderSimIntro(md){const t=translations[currentLang];const el=document.getElementById('sim-screen-intro');if(!el)return;const dh=SIMULADO_DOMAINS.map(d=>`<div class="sim-domain-item"><div class="sim-domain-dot" style="background:${d.color}"></div><span class="sim-domain-name">${d.icon} ${d[currentLang]||d.pt}</span><span class="sim-domain-weight">${d.weight}</span></div>`).join('');const ih=(t.sim_instructions||[]).map(i=>`<li>${i}</li>`).join('');el.innerHTML=`<div class="sim-intro-hero"><h2>🎯 ${t.sim_title||'Simulado Final'}</h2><p>${t.sim_subtitle||''}</p></div><div class="sim-meta-grid"><div class="sim-meta-item"><div class="sim-meta-icon">⏱️</div><div class="sim-meta-value">${SIMULADO_CONFIG.timeLimit}</div><div class="sim-meta-label">${t.sim_meta_min||'min'}</div></div><div class="sim-meta-item"><div class="sim-meta-icon">📝</div><div class="sim-meta-value">${SIMULADO_CONFIG.questionCount}</div><div class="sim-meta-label">${t.sim_meta_questions||'Questões'}</div></div><div class="sim-meta-item"><div class="sim-meta-icon">🎯</div><div class="sim-meta-value">${SIMULADO_CONFIG.passScore}</div><div class="sim-meta-label">${t.sim_meta_pass||'Aprovação'}</div></div><div class="sim-meta-item"><div class="sim-meta-icon">📊</div><div class="sim-meta-value">${SIMULADO_CONFIG.totalScore}</div><div class="sim-meta-label">${t.sim_meta_score||'Pontuação'}</div></div></div><div class="sim-domains-list">${dh}</div><div class="sim-instructions"><strong>${t.sim_instructions_title||'📋 Instruções'}</strong><ul style="margin-top:10px">${ih}</ul></div><button class="sim-start-btn" onclick="startExam()">${t.sim_start||'🚀 Iniciar Simulado'}</button>`;}
        function startExam(){clearExamState();const o=SIMULADO_QUESTIONS.map((_,i)=>i);for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];}examState.started=true;examState.shuffledOrder=o;examState.currentQ=0;examState.startTime=Date.now();saveExamState();renderExamScreen();renderExamQuestion(0);updateExamNavGrid();startExamTimer();showSimScreen('exam');}
        function renderExamScreen(){const t=translations[currentLang];const nb=examState.shuffledOrder.map((_,i)=>`<button class="sim-nav-btn" id="sim-navbtn-${i}" onclick="jumpToQuestion(${i})">${i+1}</button>`).join('');document.getElementById('sim-screen-exam').innerHTML=`<div class="sim-timer-bar"><div class="sim-timer-fill" id="sim-timer-fill" style="width:100%"></div></div><div class="sim-exam-header"><div class="sim-timer" id="sim-timer-display">${SIMULADO_CONFIG.timeLimit}:00</div><div class="sim-q-counter" id="sim-q-counter">${t.sim_q_label||'Questão'} 1 ${t.sim_q_of||'de'} ${SIMULADO_CONFIG.questionCount}</div><button class="sim-flag-btn" id="sim-flag-btn" onclick="flagCurrentQuestion()">${t.sim_flag||'🚩 Marcar'}</button></div><div id="sim-question-area" class="sim-question-area"></div><div class="sim-exam-nav"><button class="sim-nav-prev" id="sim-prev-btn" onclick="navigateExam(-1)">${t.sim_prev||'← Anterior'}</button><button class="sim-submit-btn" onclick="confirmSubmitExam()">${t.sim_submit||'✅ Finalizar Prova'}</button><button class="sim-nav-next" id="sim-next-btn" onclick="navigateExam(1)">${t.sim_next||'Próxima →'}</button></div><div class="sim-nav-section" style="margin-top:24px"><div class="sim-nav-label">Navegação</div><div class="sim-nav-grid" id="sim-nav-grid">${nb}</div></div>`;}
        function renderExamQuestion(qi){examState.currentQ=qi;saveExamState();const t=translations[currentLang];const ri=examState.shuffledOrder[qi];const q=SIMULADO_QUESTIONS[ri];const area=document.getElementById('sim-question-area');if(!area)return;updateExamNavGrid();const ctr=document.getElementById('sim-q-counter');if(ctr)ctr.textContent=`${t.sim_q_label||'Questão'} ${qi+1} ${t.sim_q_of||'de'} ${SIMULADO_CONFIG.questionCount}`;const fb=document.getElementById('sim-flag-btn');if(fb){const fl=examState.flagged.has(qi);fb.textContent=fl?(t.sim_unflag||'🚩 Desmarcada'):(t.sim_flag||'🚩 Marcar');fb.classList.toggle('flagged',fl);}const pb=document.getElementById('sim-prev-btn');const nb=document.getElementById('sim-next-btn');if(pb)pb.disabled=qi===0;if(nb)nb.disabled=qi===examState.shuffledOrder.length-1;const tl={single:t.sim_type_single,multi:t.sim_type_multi,match:t.sim_type_match,order:t.sim_type_order,categorize:t.sim_type_categorize};const tb=`<div class="sim-question-type-badge">📋 ${tl[q.type]||q.type} &nbsp;·&nbsp; ${SIMULADO_DOMAINS[q.domain][currentLang]||SIMULADO_DOMAINS[q.domain].pt}</div>`;const sh=q.scenario?`<div class="sim-scenario">${q.scenario}</div>`:'';if(q.type==='single'||q.type==='multi'){const mh=q.type==='multi'?`<div class="sim-multi-hint">${typeof t.sim_multi_select_hint==='function'?t.sim_multi_select_hint(Array.isArray(q.correct)?q.correct.length:2):'Selecione as respostas corretas'}</div>`:'';const it=q.type==='multi'?'checkbox':'radio';const ca=examState.answers[qi];const oh=q.options.map((opt,oi)=>{let ck=false;if(q.type==='single')ck=ca===oi;else ck=Array.isArray(ca)&&ca.includes(oi);return`<li class="sim-option ${ck?'selected':''}" onclick="selectExamOption(${oi})"><input type="${it}" id="sim-opt-${oi}" name="sim-q" value="${oi}" ${ck?'checked':''} style="pointer-events:none"/><label>${opt}</label></li>`;}).join('');area.innerHTML=`${tb}${sh}<div class="sim-q-text">${qi+1}. ${q.question}</div>${mh}<ul class="sim-options">${oh}</ul>`;}else if(q.type==='match'){renderMatchQuestion(qi,q,area,tb,sh);}else if(q.type==='order'){renderOrderQuestion(qi,q,area,tb,sh);}else if(q.type==='categorize'){renderCategorizeQuestion(qi,q,area,tb,sh);}}

        function updateExamNavGrid(){examState.shuffledOrder.forEach((_,i)=>{const b=document.getElementById(`sim-navbtn-${i}`);if(!b)return;b.className='sim-nav-btn';const ha=examState.answers[i]!==undefined&&examState.answers[i]!==null&&!(Array.isArray(examState.answers[i])&&examState.answers[i].length===0);if(ha)b.classList.add('answered');if(examState.flagged.has(i))b.classList.add('flagged');if(i===examState.currentQ)b.classList.add('current');});}
        function startExamTimer(){if(examTimerInterval)clearInterval(examTimerInterval);examTimerInterval=setInterval(()=>{const elapsed=Math.floor((Date.now()-examState.startTime)/1000)+(examState.elapsedSeconds||0);const rem=SIMULADO_CONFIG.timeLimit*60-elapsed;if(rem<=0){clearInterval(examTimerInterval);examState.autoSubmitted=true;alert(translations[currentLang].sim_time_up||'⏰ Tempo esgotado!');finishExam();return;}const mm=String(Math.floor(rem/60)).padStart(2,'0');const ss=String(rem%60).padStart(2,'0');const disp=document.getElementById('sim-timer-display');const fill=document.getElementById('sim-timer-fill');const pct=(rem/(SIMULADO_CONFIG.timeLimit*60))*100;const warn=rem<=300;if(disp){disp.textContent=`${mm}:${ss}`;disp.classList.toggle('warning',warn);}if(fill){fill.style.width=pct+'%';fill.classList.toggle('warning',warn);}},1000);}

        function calculateExamResults(){let ds=SIMULADO_DOMAINS.map(d=>({id:d.id,correct:0,total:0}));let tc=0;examState.shuffledOrder.forEach((ri,qi)=>{const q=SIMULADO_QUESTIONS[ri];const a=examState.answers[qi];ds[q.domain].total++;if(isAnswerCorrect(q,a)){ds[q.domain].correct++;tc++;}});const tq=SIMULADO_CONFIG.questionCount;let sc=Math.round((tc/tq)*SIMULADO_CONFIG.totalScore);sc=Math.max(100,sc);return{domainStats:ds,totalCorrect:tc,totalQ:tq,scaledScore:sc};}
        function isAnswerCorrect(q,a){if(a===undefined||a===null)return false;if(q.type==='single')return a===q.correct;if(q.type==='multi'){if(!Array.isArray(a)||!Array.isArray(q.correct))return false;return a.length===q.correct.length&&[...q.correct].every(c=>a.includes(c));}if(q.type==='match'){if(!a||typeof a!=='object')return false;return q.pairs.every(p=>String(a[p.id])===String(p.id));}if(q.type==='order'){if(!Array.isArray(a))return false;return JSON.stringify(a)===JSON.stringify(q.correctOrder);}if(q.type==='categorize'){if(!a||typeof a!=='object')return false;return q.items.every(item=>a[item.id]===item.correctCategory);}return false;}
        function renderExamResults(){const t=translations[currentLang];const{domainStats,totalCorrect,totalQ,scaledScore}=calculateExamResults();const passed=scaledScore>=SIMULADO_CONFIG.passScore;const ts=examState.elapsedSeconds||0;const mm=String(Math.floor(ts/60)).padStart(2,'0');const ss=String(ts%60).padStart(2,'0');const sk=examState.shuffledOrder.filter((_,qi)=>{const a=examState.answers[qi];return a===undefined||a===null||(Array.isArray(a)&&a.length===0);}).length;const dh=domainStats.map((ds,i)=>{const d=SIMULADO_DOMAINS[i];const pct=ds.total>0?Math.round((ds.correct/ds.total)*100):0;let v,vc;if(pct>=85){v=t.sim_verdict_excellent||'✅ Excelente';vc='good';}else if(pct>=70){v=t.sim_verdict_good||'✅ Bom';vc='good';}else if(pct>=50){v=t.sim_verdict_improve||'⚠️ Precisa melhorar';vc='ok';}else{v=t.sim_verdict_critical||'❌ Área crítica';vc='bad';}return`<div class="sim-domain-row"><div class="sim-domain-row-header"><div class="sim-domain-row-name"><span style="color:${d.color}">${d.icon}</span> ${d[currentLang]||d.pt} <small style="color:var(--text-muted);font-weight:400">(${d.weight})</small></div><div class="sim-domain-row-pct">${ds.correct}/${ds.total}</div></div><div class="sim-domain-bar-bg"><div class="sim-domain-bar-fill" style="width:${pct}%;background:${d.color}"></div></div><div class="sim-domain-verdict ${vc}">${v} — ${pct}%</div></div>`;}).join('');const rh=domainStats.map((ds,i)=>{const d=SIMULADO_DOMAINS[i];const pct=ds.total>0?Math.round((ds.correct/ds.total)*100):0;if(pct>=70)return`<div class="sim-rec-item ok"><div class="sim-rec-icon">✅</div><div class="sim-rec-text"><strong>${d[currentLang]||d.pt}</strong> — Bom desempenho! Continue revisando para manter o nível.</div></div>`;else return`<div class="sim-rec-item"><div class="sim-rec-icon">📖</div><div class="sim-rec-text"><strong>${d[currentLang]||d.pt}</strong> — ${pct}% de acerto. Revise o módulo correspondente e refaça os exercícios desta área.</div></div>`;}).join('');document.getElementById('sim-screen-results').innerHTML=`<div class="sim-report-hero ${passed?'pass':'fail'}"><div class="sim-score-value">${scaledScore}</div><div class="sim-score-max">/ ${SIMULADO_CONFIG.totalScore}</div><div class="sim-pass-badge ${passed?'pass':'fail'}">${passed?(t.sim_pass||'✅ APROVADO'):(t.sim_fail||'❌ REPROVADO')}</div><div class="sim-report-stats"><span class="sim-report-stat">${t.sim_correct_count||'Corretas'}: <span>${totalCorrect}</span></span> &nbsp;·&nbsp; <span class="sim-report-stat">${t.sim_wrong_count||'Erradas'}: <span>${totalQ-totalCorrect-sk}</span></span> &nbsp;·&nbsp; <span class="sim-report-stat">${t.sim_skipped_count||'Não respondidas'}: <span>${sk}</span></span> &nbsp;·&nbsp; <span class="sim-report-stat">${t.sim_time_taken||'Tempo'}: <span>${mm}:${ss}</span></span></div><div style="color:rgba(255,255,255,0.7);font-size:0.85em;margin-top:12px">${t.sim_pass_score||'Nota de aprovação: 700'}</div></div><div class="sim-domain-chart"><h3>${t.sim_domain_chart_title||'Desempenho por Área'}</h3><p class="sim-domain-chart-subtitle">${t.sim_domain_chart_sub||''}</p>${dh}<p class="sim-domain-passing-note">${t.sim_domain_passing_note||''}</p></div><div class="sim-recommendations"><h3>${t.sim_rec_title||'📚 Recomendações'}</h3>${rh}</div><div class="sim-report-actions"><button class="sim-review-btn" onclick="showExamReview('all')">${t.sim_review_btn||'🔍 Revisar Questões'}</button><button class="sim-retry-btn" onclick="resetExam()">${t.sim_retry_btn||'🔄 Refazer Simulado'}</button></div>`;}
        function showExamReview(filter){const t=translations[currentLang];const filters=[{key:'all',label:t.sim_filter_all||'Todas'},{key:'correct',label:t.sim_filter_correct||'✅ Corretas'},{key:'wrong',label:t.sim_filter_wrong||'❌ Erradas'},{key:'skipped',label:t.sim_filter_skipped||'⏭️ Puladas'}];const fb=filters.map(f=>`<button class="sim-filter-btn ${filter===f.key?'active':''}" onclick="showExamReview('${f.key}')">${f.label}</button>`).join('');const cards=examState.shuffledOrder.map((ri,qi)=>{const q=SIMULADO_QUESTIONS[ri];const a=examState.answers[qi];const ok=isAnswerCorrect(q,a);const sk=a===undefined||a===null||(Array.isArray(a)&&a.length===0);if(filter==='correct'&&!ok)return'';if(filter==='wrong'&&(ok||sk))return'';if(filter==='skipped'&&!sk)return'';const cc=sk?'skipped':(ok?'correct':'incorrect');const nc=sk?'skipped':(ok?'correct':'incorrect');const dn=SIMULADO_DOMAINS[q.domain][currentLang]||SIMULADO_DOMAINS[q.domain].pt;const sh=q.scenario?`<div class="sim-scenario" style="margin-bottom:12px">${q.scenario}</div>`:'';let ah='';if(q.type==='single'||q.type==='multi'){ah=`<div class="sim-review-options">${q.options.map((opt,oi)=>{const ca=Array.isArray(q.correct)?q.correct:[q.correct];const ua=Array.isArray(a)?a:(a!==undefined?[a]:[]);const ico=ca.includes(oi);const iuo=ua.includes(oi);let cls='',ic='';if(iuo&&ico){cls='user-correct';ic='✅';}else if(iuo&&!ico){cls='user-wrong';ic='❌';}else if(!iuo&&ico){cls='missed-correct';ic='✓';}return`<div class="sim-review-option ${cls}"><span class="sim-review-option-icon">${ic||'○'}</span>${opt}</div>`;}).join('')}</div>`;}else{let ct='',ut='';if(q.type==='match'){ct=q.pairs.map(p=>`${p.source} → ${p.target}`).join('<br>');if(!sk&&a&&typeof a==='object'){ut=q.pairs.map(p=>{const pid=a[p.id];const ps=pid!==undefined?q.pairs.find(x=>String(x.id)===String(pid))?.source:null;const ic=String(pid)===String(p.id)?'✅':'❌';return`${ic} ${ps||'<em>vazio</em>'} → ${p.target}`;}).join('<br>');}}if(q.type==='order'){ct=q.items.slice().sort((x,y)=>q.correctOrder.indexOf(x.id)-q.correctOrder.indexOf(y.id)).map((item,i)=>`${i+1}. ${item.text}`).join('<br>');if(!sk&&Array.isArray(a)&&a.length>0){ut=a.map((id,i)=>{const item=q.items.find(it=>it.id===id);const cp=q.correctOrder[i]===id;return`${cp?'✅':'❌'} ${i+1}. ${item?item.text:'?'}`;}).join('<br>');}}if(q.type==='categorize'){ct=q.items.map(item=>{const cat=q.categories.find(c=>c.id===item.correctCategory);return`${item.text} → ${cat?cat.label:'?'}`;}).join('<br>');if(!sk&&a&&typeof a==='object'){ut=q.items.map(item=>{const uid=a[item.id];const uc=uid?q.categories.find(c=>c.id===uid):null;const gc=uid===item.correctCategory;return`${gc?'✅':(uc?'❌':'⬜')} ${item.text} → ${uc?uc.label:'<em>não classificado</em>'}`;}).join('<br>');}}const ub=sk?`<div class="sim-review-drag-answer"><strong>${t.sim_skipped_label||'Não respondida'}</strong></div>`:`<div class="sim-review-drag-answer ${ok?'correct':'incorrect'}"><strong>${ok?(t.sim_answer_correct||'Sua resposta: CORRETA ✅'):(t.sim_answer_wrong||'Sua resposta: INCORRETA ❌')}</strong>${ut?`<div style="margin-top:8px;line-height:1.8">${ut}</div>`:''}</div>`;ah=`${ub}${!ok&&!sk?`<div class="sim-review-drag-answer correct"><strong>${t.sim_correct_answer||'Resposta correta:'}</strong><div style="margin-top:8px;line-height:1.8">${ct}</div></div>`:''}`;}return`<div class="sim-review-card ${cc}"><div class="sim-review-q-header"><span class="sim-review-q-num ${nc}">Q${qi+1}</span><div class="sim-review-q-text">${q.question}</div><span class="sim-review-domain-tag">${dn}</span></div>${sh}${ah}<div class="sim-review-explanation">${q.explanation}</div></div>`;}).join('');document.getElementById('sim-screen-results').innerHTML=`<div class="sim-review-header"><div class="sim-review-title">${t.sim_review_title||'Revisão das Questões'}</div><div class="sim-review-filters">${fb}</div></div><div style="margin-bottom:16px"><button class="sim-retry-btn" style="margin-right:8px" onclick="renderExamResults();showSimScreen('results');">${t.sim_back_results||'← Voltar aos Resultados'}</button></div>${cards||'<p style="color:var(--text-muted);text-align:center;padding:40px">Nenhuma questão nesta categoria.</p>'}`;} 
        function resetExam(){if(examTimerInterval)clearInterval(examTimerInterval);clearExamState();showSimScreen('intro');const el=document.getElementById('sim-screen-intro');if(el)renderSimIntro(null);}
        function initDragEngine(container,itemSel,dropSel,onDrop,onHover){let drag=null;function getDT(x,y){for(const el of container.querySelectorAll(dropSel)){const r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return el;}return null;}container.addEventListener('pointerdown',e=>{const item=e.target.closest(itemSel);if(!item)return;e.preventDefault();item.setPointerCapture(e.pointerId);const rect=item.getBoundingClientRect();const ghost=item.cloneNode(true);ghost.className=item.className+' sim-drag-ghost';ghost.style.cssText=`position:fixed;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;pointer-events:none;`;document.body.appendChild(ghost);drag={item,ghost,ox:e.clientX-rect.left,oy:e.clientY-rect.top,pid:e.pointerId};item.classList.add('dragging');},{passive:false});container.addEventListener('pointermove',e=>{if(!drag||e.pointerId!==drag.pid)return;drag.ghost.style.left=(e.clientX-drag.ox)+'px';drag.ghost.style.top=(e.clientY-drag.oy)+'px';container.querySelectorAll(dropSel).forEach(el=>el.classList.remove('over'));const target=getDT(e.clientX,e.clientY);if(target){target.classList.add('over');if(onHover)onHover(drag.item,target);}});container.addEventListener('pointerup',e=>{if(!drag||e.pointerId!==drag.pid)return;drag.ghost.remove();drag.item.classList.remove('dragging');container.querySelectorAll(dropSel).forEach(el=>el.classList.remove('over'));const target=getDT(e.clientX,e.clientY);onDrop(drag.item,target);drag=null;});}
        function renderMatchQuestion(qi,q,area,tb,sh){const t=translations[currentLang];const saved=examState.answers[qi]||{};const sp=[...q.pairs].sort(()=>Math.random()-0.5);const pi=sp.map(p=>{const pl=Object.values(saved).map(String).includes(String(p.id));return`<div class="sim-match-item ${pl?'placed':''}" data-pair-id="${p.id}">${p.source}</div>`;}).join('');const tr=q.pairs.map(p=>{const ppid=Object.keys(saved).find(k=>String(k)===String(p.id)&&String(saved[k])!=='');const ps=ppid!==undefined?q.pairs.find(x=>String(x.id)===String(saved[ppid]))?.source:null;const sc=ps?`<div class="sim-match-item placed" data-pair-id="${p.id}">${ps}</div>`:`<span class="sim-match-slot-placeholder">${t.sim_drag_placeholder||'Arraste aqui'}</span>`;return`<div class="sim-match-target-row"><div class="sim-match-target-label">${p.target}</div><div class="sim-match-slot ${ps?'filled':''}" data-slot-id="${p.id}">${sc}</div></div>`;}).join('');area.innerHTML=`${tb}${sh}<div class="sim-q-text">${qi+1}. ${q.question}</div><div class="sim-match-container"><div><div class="sim-match-pool-label">${t.sim_drag_source||'ITENS'}</div><div class="sim-match-pool" id="sim-match-pool">${pi}</div></div><div><div class="sim-match-targets-label">${t.sim_drag_targets||'PARES'}</div><div class="sim-match-targets" id="sim-match-targets">${tr}</div></div></div>`;const ctr=area.querySelector('.sim-match-container');initDragEngine(ctr,'.sim-match-item','.sim-match-slot,.sim-match-pool',(item,target)=>{const pid=item.dataset.pairId;ctr.querySelectorAll('.sim-match-slot').forEach(slot=>{if(slot.contains(item)){slot.innerHTML=`<span class="sim-match-slot-placeholder">${t.sim_drag_placeholder||'Arraste aqui'}</span>`;slot.classList.remove('filled');}});const pool=ctr.querySelector('#sim-match-pool');if(pool&&pool.contains(item))pool.removeChild(item);if(target&&target.classList.contains('sim-match-slot')){const ex=target.querySelector('.sim-match-item');if(ex){ex.classList.remove('placed');pool.appendChild(ex);}target.innerHTML='';item.classList.add('placed');target.appendChild(item);target.classList.add('filled');}else{item.classList.remove('placed');pool.appendChild(item);}const ans={};ctr.querySelectorAll('.sim-match-slot').forEach(slot=>{const pi=slot.querySelector('.sim-match-item');if(pi)ans[slot.dataset.slotId]=pi.dataset.pairId;});examState.answers[qi]=ans;updateExamNavGrid();saveExamState();});}
        function renderOrderQuestion(qi,q,area,tb,sh){const t=translations[currentLang];const saved=examState.answers[qi];let co;if(saved&&Array.isArray(saved)&&saved.length===q.items.length){co=saved.map(id=>q.items.find(it=>it.id===id));}else{co=[...q.items].sort(()=>Math.random()-0.5);}function buildList(){return co.map((item,i)=>`<div class="sim-order-item" data-item-id="${item.id}"><span class="sim-order-handle">⠿</span><span class="sim-order-num">${i+1}.</span><span class="sim-order-text">${item.text}</span></div>`).join('');}area.innerHTML=`${tb}${sh}<div class="sim-q-text">${qi+1}. ${q.question}</div><p style="font-size:0.83em;color:var(--text-muted);margin-bottom:12px">${t.sim_order_instruction||'Arraste os itens para ordenar corretamente'}</p><div class="sim-order-list" id="sim-order-list">${buildList()}</div>`;const list=area.querySelector('#sim-order-list');let de=null,ph=null;function saveOrder(){const ids=[...list.querySelectorAll('.sim-order-item')].map(el=>parseInt(el.dataset.itemId));examState.answers[qi]=ids;updateExamNavGrid();saveExamState();list.querySelectorAll('.sim-order-item').forEach((el,i)=>{el.querySelector('.sim-order-num').textContent=`${i+1}.`;});}list.addEventListener('pointerdown',e=>{de=e.target.closest('.sim-order-item');if(!de)return;e.preventDefault();de.setPointerCapture(e.pointerId);de.classList.add('dragging');ph=document.createElement('div');ph.className='sim-order-item';ph.style.opacity='0';ph.style.height=de.offsetHeight+'px';de.parentNode.insertBefore(ph,de.nextSibling);},{passive:false});list.addEventListener('pointermove',e=>{if(!de)return;const items=[...list.querySelectorAll('.sim-order-item:not(.dragging)')].filter(el=>el!==ph);for(const item of items){const r=item.getBoundingClientRect();if(e.clientY<r.top+r.height/2){list.insertBefore(ph,item);break;}else if(item===items[items.length-1]){list.appendChild(ph);}}});list.addEventListener('pointerup',e=>{if(!de)return;de.classList.remove('dragging');list.insertBefore(de,ph);ph.remove();de=null;saveOrder();});}
        function renderCategorizeQuestion(qi,q,area,tb,sh){const t=translations[currentLang];const saved=examState.answers[qi]||{};const pi=q.items.filter(item=>!saved[item.id]).map(item=>`<div class="sim-categorize-item" data-item-id="${item.id}">${item.text}</div>`).join('');const bh=q.categories.map(cat=>{const ci=q.items.filter(item=>saved[item.id]===cat.id).map(item=>`<div class="sim-categorize-item" data-item-id="${item.id}" data-cat="${cat.id}">${item.text}</div>`).join('');return`<div class="sim-bucket" data-cat-id="${cat.id}"><div class="sim-bucket-header">${cat.label}</div><div class="sim-bucket-body" data-cat-id="${cat.id}">${ci}</div></div>`;}).join('');area.innerHTML=`${tb}${sh}<div class="sim-q-text">${qi+1}. ${q.question}</div><p style="font-size:0.83em;color:var(--text-muted);margin-bottom:12px">${t.sim_categorize_pool_label||'Arraste os itens abaixo para as categorias'}</p><div class="sim-categorize-pool" id="sim-cat-pool">${pi}</div><div class="sim-categorize-buckets" id="sim-cat-buckets">${bh}</div>`;function saveCats(){const ans={};area.querySelectorAll('.sim-bucket-body').forEach(body=>{const cid=body.dataset.catId;body.querySelectorAll('.sim-categorize-item').forEach(item=>{ans[item.dataset.itemId]=cid;});});examState.answers[qi]=ans;updateExamNavGrid();saveExamState();}initDragEngine(area,'.sim-categorize-item','.sim-bucket,.sim-categorize-pool',(item,target)=>{if(!target){document.getElementById('sim-cat-pool').appendChild(item);}else if(target.classList.contains('sim-categorize-pool')){target.appendChild(item);}else{const body=target.querySelector('.sim-bucket-body')||target;body.appendChild(item);}saveCats();});}

        window.onload = init;
